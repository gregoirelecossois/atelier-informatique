/* ---- animations & effets du démon ---- */
/* anim de fond vers laquelle on revient après un coup (idle / channeling_fire / channel_horde / boucle_roar) */
function bossBase(anim){ B.bossBaseAnim=anim||'idle'; if(B.boss) actorPlay(B.boss, B.bossBaseAnim, {loop:true}); }
/* tremblement de l'écran : 'quake' = fort (rugissement), 'shake' = léger (dégât/impact) */
function fieldQuake(cls,ms){ if(!B.field) return; const c=cls||'quake'; B.field.classList.remove(c); void B.field.offsetWidth; B.field.classList.add(c);
  if(B._quakeT) clearTimeout(B._quakeT); B._quakeT=setTimeout(()=>{ if(B.field) B.field.classList.remove(c); }, ms||700); }
/* flash rouge plein écran (le démon encaisse) */
function dmgFlash(){ const pl=document.getElementById('phaseLayer'); if(!pl) return; const f=document.createElement('div'); f.className='dmg-flash'; pl.appendChild(f); setTimeout(()=>{try{f.remove();}catch(e){}},300); }
/* illumination brève du sprite (boule de feu qui part de lui) */
function bossFlash(){ if(!B.boss) return; B.boss.el.classList.remove('lit'); void B.boss.el.offsetWidth; B.boss.el.classList.add('lit'); setTimeout(()=>{ if(B.boss) B.boss.el.classList.remove('lit'); },230); }
/* le démon encaisse un coup : taking_hit RALENTI + clignotement lumineux rétro + secousses + flash + grognement (accéléré).
   Ne se joue qu'à la FIN des phases où l'on tape le démon (les clics répétés ne font qu'un bossFlash). */
function bossHurt(){ if(!B.boss) return;
  B.boss.el.classList.remove('shake'); void B.boss.el.offsetWidth; B.boss.el.classList.add('shake');
  B.boss.el.classList.remove('hurtblink'); void B.boss.el.offsetWidth; B.boss.el.classList.add('hurtblink');
  if(B._hurtBlinkT) clearTimeout(B._hurtBlinkT);
  B._hurtBlinkT=setTimeout(()=>{ if(B.boss) B.boss.el.classList.remove('hurtblink'); }, 1300);
  actorPlay(B.boss,'hurt',{loop:false, then:B.bossBaseAnim||'idle', fps:7});   // ralenti (≈1,3 s)
  fieldQuake('shake',420); dmgFlash(); demonSound('growl',{rate:1.6}); }
/* durée approx. de l'anim taking_hit (9 frames @ 7 fps) — pour attendre qu'elle finisse avant les popups */
const HURT_MS=1300;
/* RUGISSEMENT : roar + gros tremblement + son, puis retombe sur 'then' (idle par défaut, boucle_roar en finale) */
function bossRoar(then){ if(!B.boss) return; const t=then||'idle'; actorPlay(B.boss,'roar',{loop:false, then:t, fps:6}); B.bossBaseAnim=t; fieldQuake('quake',850); demonSound('roar'); }
/* RUGISSEMENT D'INTRO (début du jeu) : le sprite roar boucle 2× (≈ le double du temps) ;
   l'écran tremble pendant TOUTE l'anim, secousses moins amples mais plus régulières. */
const INTRO_ROAR_MS=3000;
function bossRoarLong(then){ if(!B.boss) return; const t=then||'idle';
  actorPlay(B.boss,'roar',{loop:true, fps:6});   // boucle fluide du rugissement (≈2 cycles)
  B.bossBaseAnim=t;
  pTimeout(()=>{ if(!B.stopped && B.boss && B.boss.anim==='roar') actorPlay(B.boss,t,{loop:true}); }, INTRO_ROAR_MS);
  fieldQuake('quakeReg', INTRO_ROAR_MS); demonSound('roar'); }
/* LANCE LE FEU : fire_begin → channeling_fire en boucle (anim de fond pendant la pluie de feu) */
function bossBeginFire(){ if(!B.boss) return; actorPlay(B.boss,'fire_begin',{loop:false, then:'channeling_fire'}); B.bossBaseAnim='channeling_fire'; beep('fire'); }
/* INVOQUE LA HORDE : horde_cast → channel_horde en boucle */
function bossBeginHorde(){ if(!B.boss) return; actorPlay(B.boss,'horde_cast',{loop:false, then:'channel_horde'}); B.bossBaseAnim='channel_horde'; beep('fire'); }
/* entrée d'une phase « boules de feu » : rugissement de reprise, puis fire_begin → channeling_fire */
function bossEnterFire(){ bossRoarLong('idle'); pTimeout(()=>{ if(!B.stopped) bossBeginFire(); }, INTRO_ROAR_MS); }
/* ENTRÉE DE PHASE : après la popup, le démon reste IDLE ~1 s (calme et visible),
   PUIS joue son anim d'entrée (roar / feu / horde), PUIS seulement le combat démarre (dangers via combat()). */
function bossPhaseIntro(kind, combat, delay){
  B.fireActive=false; B.bossMove=false; clearFireballs();   // aucun danger pendant la pause
  bossBase('idle');
  pTimeout(()=>{
    if(B.stopped) return;
    if(kind==='fire')           bossEnterFire();              // rugissement → feu (assaut)
    else if(kind==='firetaunt'){ bossBeginFire(); demonTaunt(); }  // feu SANS roar + provocation en fond
    else if(kind==='horde'){    bossBeginHorde(); demonTaunt(); }  // invocation (pas de roar → provocation)
    else if(kind==='imprison')  bossRoar('boucle_roar');
    else                        bossRoar('idle');
    const ms = (kind==='fire') ? INTRO_ROAR_MS : 300;        // pour l'assaut : on attend la fin du long rugissement d'intro
    pTimeout(()=>{ if(!B.stopped && combat) combat(); }, ms);
  }, delay||1000);
}
function damageBossTo(target){
  B.hp=Math.max(0,target);
  bossHurt();
  beep('good'); updateBossHud();
}
function heroHitFx(){ B.hero.el.classList.remove('shake'); void B.hero.el.offsetWidth; B.hero.el.classList.add('shake'); actorPlay(B.hero,'hurt',{loop:false, then:'idle'}); }
function loseLife(reason){
  B.lives--; beep('bad'); heroHitFx();
  B.field.classList.add('shake'); setTimeout(()=>B.field.classList.remove('shake'),250);
  updateBossHud();
  if(reason) toast(reason);
  if(B.lives<=0){ bossFail(); return true; }
  return false;
}
function phaseSucceed(targetHp){
  clearPhase(); damageBossTo(targetHp);
  if(B.hp<=0) return bossDefeated();
  // on laisse l'anim « taking_hit » se terminer + un petit temps avant la popup suivante
  pTimeout(()=>nextPhase(), HURT_MS+450);
}
function nextPhase(){
  if(B.stopped) return;
  if(B.phaseIdx>=B.phases.length) return bossDefeated();
  const ph=B.phases[B.phaseIdx++];
  showBriefing(ph);
}
/* Briefing entre les phases : explication détaillée + bouton « En garde ! » que le joueur déclenche */
function closeBriefing(){ if(B.brief){ try{B.brief.remove();}catch(e){} B.brief=null; } }
function showBriefing(ph){
  B.curPhase=ph;
  if(!B.field){ if(B.running) ph.start(ph); return; }
  closeBriefing();
  /* on met les dangers en pause pendant l'explication */
  B.fireActive=false; clearFireballs(); B.bossMove=false;
  const ov=document.createElement('div'); ov.className='boss-brief';
  let html='';
  if(ph.story) html+='<div class="bf-story">'+ph.story+'</div>';
  html+='<div class="bf-title">'+ph.banner+'</div>';
  html+='<div class="bf-how">'+(ph.brief||ph.sub||'')+'</div>';
  html+='<button class="bf-go" id="bfGo">'+(ph.btn||'⚔️ En garde !')+'</button>';
  ov.innerHTML=html; B.field.appendChild(ov); B.brief=ov; beep('ding');
  document.getElementById('bfGo').onclick=()=>{ closeBriefing(); if(!B.stopped) ph.start(ph); };
}
function bossFail(){
  B.running=false; B.stopped=true; B.curPhase=null; if(B.raf) cancelAnimationFrame(B.raf); stopBossMusic(); clearPhase();
  modal.className='modal bad';
  modal.innerHTML='<span class="m-emoji">💀</span><h2>Le démon t\'a vaincu…</h2>'
    +'<div class="howto test" style="margin-top:4px"><p class="h-head">💡 Courage !</p><p>Tu as perdu tous tes cœurs. Recommence le combat — tu vas y arriver, chevalier !</p></div>'
    +'<div class="m-actions"><button class="m-btn primary" id="retryBoss">↺ Reprendre le combat</button></div>';
  openOverlay();
  document.getElementById('retryBoss').onclick=()=>{ closeOverlay(); audioCtx(); launchGame(); };
}
function bossDefeated(){
  B.stopped=true; B.curPhase=null; stopBossMusic(); B.hp=0; clearPhase(); updateBossHud();
  // mise en scène : le démon SEUL, agrandi (×2,3) et centré, pendant son anim de mort
  if(B.field) B.field.classList.add('boss-finale');
  const slot=document.getElementById('bossSlot');
  if(slot){ slot.style.left='50%'; slot.style.top='50%'; slot.style.transform='translate(-50%,-50%)'; }
  if(B.boss){ B.boss.el.classList.remove('hurtblink','shake','lit'); B.boss.el.classList.add('dying'); }
  const FRAMES=13, deathMs=5000, FPS=FRAMES/(deathMs/1000);      // anim de mort très ralentie : dure 5 s
  actorPlay(B.boss,'death',{loop:false, fps:FPS});               // s'arrête et reste sur la dernière frame
  demonSound('death'); beep('win');
  // anim terminée à 5 s (dernière frame conservée) → popup victoire à 7 s
  pTimeout(()=>{
    burstAt(B.field, B.field.clientWidth/2, B.field.clientHeight*0.5); confetti();
    bossBanner('🏆 VICTOIRE !','Le démon est vaincu !', ()=>{ B.running=false; cancelAnimationFrame(B.raf); onWin(); });
  }, deathMs+2000);
}

/* ---- sous-systèmes : feu permanent, déplacement du boss, jauge, dégâts, grille ---- */
function bossDamage(n){
  B.hp=Math.max(0,B.hp-n);
  bossHurt(); beep('good'); updateBossHud();
}
function bossMoveTick(dt){
  if(!B.bossMove) return;
  B.bossX+=B.bossDir*B.bossSpeed*dt;
  if(B.bossX<B.bossXMin){ B.bossX=B.bossXMin; B.bossDir=1; } else if(B.bossX>B.bossXMax){ B.bossX=B.bossXMax; B.bossDir=-1; }
  const slot=document.getElementById('bossSlot'); if(slot) slot.style.left=B.bossX+'%';
}
function clearFireballs(){ (B.fireballs||[]).forEach(f=>{ try{ stopImgFrames(f.el&&f.el.querySelector('img')); f.el.remove(); }catch(e){} }); B.fireballs=[]; }
function spawnFireball(){
  if(!B.fireLayer||!B.boss) return;
  const fre=B.field.getBoundingClientRect(), br=B.boss.el.getBoundingClientRect(), hr=B.hero.el.getBoundingClientRect();
  const bx=br.left+br.width/2-fre.left, by=br.top+br.height*0.55-fre.top;

  let ang, sp;
  if(B.fireChaos){ ang=rnd(0,6.2832); sp=rnd(95,150)*bd().speedMul; }      // direction folle au départ
  else { ang=Math.atan2(hy-by,hx-bx)+rnd(-0.28,0.28); sp=rnd(125,175)*bd().speedMul; }
  const el=document.createElement('div'); el.className='fireball';
  const fimg=document.createElement('img'); fimg.className='fireball-img'; fimg.alt='🔥'; el.appendChild(fimg);
  playImgFrames(fimg, pick(FIREBALL_ANIMS), {fps:12, loop:true});   // 1 des 4 anims au hasard
  el.style.left=bx+'px'; el.style.top=by+'px'; B.fireLayer.appendChild(el);
  const f={el,x:bx,y:by,vx:Math.cos(ang)*sp,vy:Math.sin(ang)*sp,
           chaos:B.fireChaos, age:0, homeAt:rnd(0.9,1.6)};
  el.addEventListener('click',ev=>{ ev.stopPropagation(); sparkAt(B.field,f.x,f.y); beep('click'); removeFireball(f); });
  B.fireballs.push(f);
  B.firstFireDone=true;   // le démon a lancé sa 1re boule de feu (débloque les cristaux du piège)

}
function removeFireball(f){ const i=B.fireballs.indexOf(f); if(i>=0)B.fireballs.splice(i,1); try{ stopImgFrames(f.el&&f.el.querySelector('img')); f.el.remove(); }catch(e){} }
function fireTick(dt){
  if(B.fireActive){ B.fireSpawnT-=dt; if(B.fireSpawnT<=0){ spawnFireball(); B.fireSpawnT=B.fireRate*bd().fireMul; } }
  if(!B.fireballs.length) return;
  const fr=B.field, hr=B.hero.el.getBoundingClientRect(), fre=fr.getBoundingClientRect();
  const hx=hr.left+hr.width/2-fre.left, hy=hr.top+hr.height/2-fre.top;
  const W=fr.clientWidth, H=fr.clientHeight;
  for(const f of B.fireballs.slice()){
    if(f.chaos){
      f.age+=dt;
      if(f.age<f.homeAt){
        // phase chaotique : rebondit sur les bords pour rester à l'écran (dure à cliquer)
        if((f.x<26&&f.vx<0)||(f.x>W-26&&f.vx>0)) f.vx*=-1;
        if((f.y<26&&f.vy<0)||(f.y>H-26&&f.vy>0)) f.vy*=-1;
      } else {
        // puis se dirige progressivement vers le chevalier
        const tang=Math.atan2(hy-f.y,hx-f.x), cang=Math.atan2(f.vy,f.vx);
        let d=tang-cang; while(d>Math.PI)d-=6.2832; while(d<-Math.PI)d+=6.2832;
        const maxTurn=3.2*dt, turn=Math.max(-maxTurn,Math.min(maxTurn,d));
        const na=cang+turn, spd=Math.hypot(f.vx,f.vy);
        f.vx=Math.cos(na)*spd; f.vy=Math.sin(na)*spd;
      }
    }
    f.x+=f.vx*dt; f.y+=f.vy*dt; f.el.style.left=f.x+'px'; f.el.style.top=f.y+'px';
    if(Math.hypot(f.x-hx,f.y-hy)<42){ removeFireball(f); if(loseLife('Aïe ! Une boule de feu t\'a touché.')) return; }
    else if(f.y>H+50||f.x<-50||f.x>W+50){ removeFireball(f); }
  }
}

function startGauge(opts){ B.gauge={val:opts.start||0, decay:opts.decay*bd().gaugeDecay, perClick:opts.perClick*bd().gaugeGain, onFull:opts.onFull, onEmpty:opts.onEmpty, done:false}; updateGaugeUI(); }
function gaugeClick(){ if(!B.gauge||B.gauge.done) return; B.gauge.val=Math.min(100,B.gauge.val+B.gauge.perClick); updateGaugeUI();
  if(B.gauge.val>=100){ B.gauge.done=true; const cb=B.gauge.onFull; B.gauge=null; cb&&cb(); } }
function gaugeTick(dt){ if(!B.gauge||B.gauge.done) return; B.gauge.val=Math.max(0,B.gauge.val-B.gauge.decay*dt); updateGaugeUI();
  if(B.gauge.val<=0 && B.gauge.onEmpty){ B.gauge.done=true; const cb=B.gauge.onEmpty; B.gauge=null; cb&&cb(); } }

function placeGrid(n, z){
  const cols=Math.min(5,n), rows=Math.ceil(n/cols), out=[];
  for(let i=0;i<n;i++){ const r=Math.floor(i/cols), c=i%cols;
    const x=z.x0+(z.x1-z.x0)*((c+0.5)/cols);
    const y=z.y0+(z.y1-z.y0)*(rows>1?(r/(rows-1)):0.5);
    out.push({x,y}); }
  return out;
}
/* placement dispersé (en %) évitant le boss, le héros (et options) — jamais de superposition */
function scatterPositions(n, opts){
  opts=opts||{};
  const fr=B.field.getBoundingClientRect();
  const W=B.field.clientWidth||1, H=B.field.clientHeight||1;
  const avoid=[];
  const addAvoid=(el,padPx)=>{ if(!el) return; const r=el.getBoundingClientRect();
    avoid.push({x:(r.left+r.width/2-fr.left)/W*100, y:(r.top+r.height/2-fr.top)/H*100,
      rx:Math.max(7,(r.width/2+padPx)/W*100), ry:Math.max(9,(r.height/2+padPx)/H*100)}); };
  const pad=opts.pad!=null?opts.pad:28;
  addAvoid(B.boss&&B.boss.el,pad); addAvoid(B.hero&&B.hero.el,pad);
  (opts.avoid||[]).forEach(el=>addAvoid(el, opts.avoidPad!=null?opts.avoidPad:20));
  const margin=opts.margin||7, x0=margin, x1=100-margin, y0=opts.y0||24, y1=opts.y1||80;
  const baseSep=opts.sep||14, out=[];
  for(let relax=0; relax<5 && out.length<n; relax++){
    const sep=baseSep*(1-relax*0.18); let tries=0;
    while(out.length<n && tries<n*300){
      tries++;
      const x=x0+Math.random()*(x1-x0), y=y0+Math.random()*(y1-y0);
      if(avoid.some(a=>Math.hypot((x-a.x)/a.rx,(y-a.y)/a.ry)<1)) continue;
      if(out.some(p=>Math.hypot(x-p.x,y-p.y)<sep)) continue;
      out.push({x,y});
    }
  }
  while(out.length<n){ out.push({x:x0+Math.random()*(x1-x0), y:y0+Math.random()*(y1-y0)}); }
  return out;
}

function bingrDrag(e,el,it,cau,onGood){

}

/* ---- Phase horde : BEAUCOUP de monstres, ils foncent sur le joueur, pas de feu ---- */
function phaseHorde(ph){
  const total=ph.count||22, speed=ph.speed||5.5;
  const pl=document.getElementById('phaseLayer');
  const pr=prompt('🔲 Encadre les monstres au lasso — jamais la fée 🧚 !');
  const MAX_FAIRIES=ph.fairies||3;
  B.hordeRemaining=total; let toSpawn=total, spawnT=0.3, fairies=0, started=false;
  // l'invocation (horde_cast → channel_horde) + provocation, PUIS la horde déferle
  bossPhaseIntro('horde', ()=>{ B.fireActive=false; clearFireballs(); B.bossMove=false; started=true; });
  function spawnMinion(enemy){
    const key=enemy?pick(['slime','bat']):'fairy';
    const a=makeActor(key,'minion-actor'); a.el.classList.add('minion');
    let m;
    if(enemy){
      // ennemis : arrivent par le haut ou les côtés, puis foncent sur le chevalier
      let x,y; const edge=Math.random();
      if(edge<0.5){ x=rnd(4,96); y=rnd(1,6); }          // bord haut, partout
      else if(edge<0.75){ x=rnd(1,6); y=rnd(3,50); }     // côté gauche, moitié haute
      else { x=rnd(94,99); y=rnd(3,50); }                // côté droit, moitié haute
      a.el.style.left=x+'%'; a.el.style.top=y+'%';
      m={a, el:a.el, x, y, enemy:true, alive:true, sel:false};
    } else {
      // fées : traversent l'écran de gauche à droite (ou inverse) en volant de façon erratique
      const fromLeft=Math.random()<0.5;
      const x=fromLeft?rnd(-5,1):rnd(99,105), y=rnd(14,68);
      a.el.style.left=x+'%'; a.el.style.top=y+'%';
      m={a, el:a.el, x, y, enemy:false, alive:true, sel:false,
         vx:(fromLeft?1:-1)*rnd(11,17), ph0:Math.random()*6.28, wob:rnd(2.4,4.2), amp:rnd(14,24)};
    }
    a.el.style.position='absolute'; a.el.style.transform='translate(-50%,-50%)';
    pl.appendChild(a.el); actorPlay(a, key==='slime'?'idle':'fly',{loop:true}); B.actors.push(a);
    B.minions.push(m);
  }
  function heroPct(){ const r=B.hero.el.getBoundingClientRect(), fr=B.field.getBoundingClientRect(); return {x:(r.left+r.width/2-fr.left)/B.field.clientWidth*100, y:(r.top+r.height/2-fr.top)/B.field.clientHeight*100}; }
  B.phaseUpdate=(dt)=>{
    if(!started) return;   // la horde n'arrive qu'après l'anim d'invocation
    spawnT-=dt;
    if(spawnT<=0){ if(toSpawn>0){ spawnMinion(true); toSpawn--; } if(Math.random()<0.17 && fairies<MAX_FAIRIES){ spawnMinion(false); fairies++; } spawnT=0.34; }
    const h=heroPct();
    for(const m of B.minions){ if(!m.alive) continue;
      if(m.enemy){
        const dx=h.x-m.x, dy=h.y-m.y, d=Math.hypot(dx,dy)||1;    // foncent droit sur le chevalier
        m.x+=dx/d*speed*dt; m.y+=dy/d*speed*dt;
        m.el.style.left=m.x+'%'; m.el.style.top=m.y+'%';
        if(d<4.5){ m.alive=false; try{m.el.remove();}catch(e){}
          B.hordeRemaining--; if(loseLife('Un monstre a atteint le chevalier !')) return; checkHordeDone(); }
      } else {
        // fée : traverse horizontalement avec un vol sinusoïdal erratique
        m.ph0+=m.wob*dt;
        m.x+=m.vx*dt;
        m.y+=Math.sin(m.ph0)*m.amp*dt;
        if(m.y<8) m.y=8; else if(m.y>74) m.y=74;
        m.el.style.left=m.x+'%'; m.el.style.top=m.y+'%';
        if(m.x<-7||m.x>107){ m.alive=false; try{m.el.remove();}catch(e){} }
      }
    }
  };
  function checkHordeDone(){ if(toSpawn<=0 && B.hordeRemaining<=0) phaseSucceed(ph.target); }
  bossOn(B.field,'pointerdown',startBossLasso);
  function startBossLasso(e){
    if(e.target.closest('.ctxmenu')||e.target.closest('.boss-prompt')||e.target.closest('.boss-gauge')||e.target.closest('.health-potion')) return;
    e.preventDefault();
    const fr=B.field.getBoundingClientRect(); const x0=e.clientX-fr.left, y0=e.clientY-fr.top;
    const box=document.createElement('div'); box.className='selbox'; pl.appendChild(box);
    const move=ev=>{ const x=ev.clientX-fr.left, y=ev.clientY-fr.top, L=Math.min(x0,x),T=Math.min(y0,y),W=Math.abs(x-x0),H=Math.abs(y-y0);
      box.style.left=L+'px'; box.style.top=T+'px'; box.style.width=W+'px'; box.style.height=H+'px';
      B.minions.forEach(m=>{ if(!m.alive) return; const r=m.el.getBoundingClientRect(); const cx=r.left+r.width/2-fr.left, cy=r.top+r.height/2-fr.top;
        m.sel=cx>=L&&cx<=L+W&&cy>=T&&cy<=T+H; m.el.classList.toggle('lassosel',m.sel); }); };
    const up=()=>{ document.removeEventListener('pointermove',move); document.removeEventListener('pointerup',up); try{box.remove();}catch(e){} resolveLasso(); };
    document.addEventListener('pointermove',move); document.addEventListener('pointerup',up);
    (B.phaseCleanup=B.phaseCleanup||[]).push(()=>{ document.removeEventListener('pointermove',move); document.removeEventListener('pointerup',up); try{box.remove();}catch(e){} });
  }
  function resolveLasso(){
    const sel=B.minions.filter(m=>m.alive&&m.sel);
    if(!sel.length) return;
    if(sel.some(m=>!m.enemy)){ beep('bad'); toast('Tu as encadré la fée ! Ne sélectionne que les monstres.');
      B.minions.forEach(m=>{ m.sel=false; m.el.classList.remove('lassosel'); }); return; }
    beep('good');
    sel.forEach(m=>{ m.alive=false; actorPlay(m.a,'pop',{loop:false}); smokePuffAtEl(m.el); const el=m.el; pTimeout(()=>{try{el.remove();}catch(e){}},300); B.hordeRemaining--; });
    checkHordeDone();
  }
}

/* ---- Phase grimoire : 5 sorts à chercher, grimoire à droite, feu + boss mobile à gauche ---- */
const GRIMOIRE_NAMES=['Sort de Lumière','Potion de Force','Bouclier Runique','Flamme Bleue','Vol du Corbeau','Soin Mineur','Mur de Pierre','Éclair Ancien','Brume Grise','Chant des Elfes','Givre Éternel','Racine Profonde','Œil du Dragon','Vent Hurlant','Cendre Noire','Or des Nains','Larme de Lune','Griffe d\'Ours','Aile de Fée','Souffle Glacé','Feu Follet','Pas de l\'Ombre'];
function phaseGrimoire(ph){
  const total=ph.total||5;
  bossPhaseIntro('firetaunt', ()=>{
    B.fireRate=1.1; B.fireSpawnT=0.8;
    B.bossMove=true; B.bossSpeed=16; B.bossXMin=14; B.bossXMax=54;
    B.fireActive=true;
  });
  const pl=document.getElementById('phaseLayer');
  const pr=prompt('📖 Molette pour défiler — clique le sort qui brille ✨');
  let found=0;
  const g=document.createElement('div'); g.className='grimoire side'; g.innerHTML='<div class="gpages" id="gpages"></div>'; pl.appendChild(g);
  function build(){
    const pages=document.getElementById('gpages'); pages.innerHTML=''; pages.scrollTop=0;
    const N=16+Math.floor(rnd(0,9)), sealed=Math.floor(rnd(5,N-2));
    for(let i=0;i<N;i++){ const row=document.createElement('div');
      if(i===sealed){ row.className='gpage sealed'; row.innerHTML='✨ <b>Sort scellé</b> — clique ! <span class="seal">🔒</span>';
        row.addEventListener('click',()=>{ if(found>=total) return; found++; beep('win'); boltFx(); bossDamage(1);
          pr.innerHTML='📖 Sorts brisés : <b>'+found+' / '+total+'</b>';
          if(found>=total){ pTimeout(()=>phaseSucceed(ph.target),450); } else { build(); } }); }
      else { row.className='gpage'; row.textContent='📜 '+pick(GRIMOIRE_NAMES); }
      pages.appendChild(row);
    }
  }
  build();
}

/* ---- Phase finale : enfermer le démon — il hurle et tremble sur place (facile à cliquer),
       mais la jauge chute très vite et part de la moitié. Si elle tombe à 0 → on rejoue le piège. ---- */
function phaseImprison(ph){
  prompt('⛓️ Clique vite et sans cesse — la jauge chute très vite !');
  gaugeUI('⛓️ Piège');
  B.boss.el.style.cursor='pointer';
  // chaque clic : seulement un clignotement lumineux (pas de taking_hit pendant le martèlement)
  bossOn(B.boss.el,'click',()=>{ gaugeClick(); slashFx(); bossFlash(); beep('good'); });
  // le démon RUGIT puis enchaîne en boucle de rugissement (boucle_roar) ; le piège (jauge) ne démarre qu'ensuite
  bossPhaseIntro('imprison', ()=>{
    B.bossMove=false;  // le démon ne fuit plus : il reste centré (facile à cliquer)
    // il garde sa hauteur de base (CSS) : pas de « descente » quand il se débat
    let wob=0;
    B.phaseUpdate=(dt)=>{ wob+=dt; const slot=document.getElementById('bossSlot'); if(slot) slot.style.left=(50+Math.sin(wob*26)*2.4)+'%'; };
    startGauge({start:50, perClick:3.5, decay:17,
      onFull:()=>{ B.phaseUpdate=null; const slot=document.getElementById('bossSlot'); if(slot) slot.style.left='50%'; bossDefeated(); },
      onEmpty:()=>{
        B.phaseUpdate=null;
        // pause + popup centrée que le joueur doit valider pour retourner au piège de cristal
        B.running=false; if(B.raf) cancelAnimationFrame(B.raf); pauseBossMusic();
        clearPhase(); closeBriefing();
        const trapIdx=B.phases.findIndex(p=>p.trap); if(trapIdx>=0) B.phaseIdx=trapIdx;
        const ov=document.createElement('div'); ov.className='boss-brief';
        ov.innerHTML='<div class="bf-story">💥 Le démon s\'est échappé !</div>'
          +'<div class="bf-title">Le piège a cédé !</div>'
          +'<div class="bf-how">Recharge le <b>piège de cristal</b> 💎, puis réessaie !</div>'
          +'<button class="bf-go" id="imprisonRetry">😤 J\'y retourne !</button>';
        B.field.appendChild(ov); B.brief=ov;
        document.getElementById('imprisonRetry').onclick=()=>{
          closeBriefing();
          B.running=true; B.last=0; B.raf=requestAnimationFrame(bossLoop); resumeBossMusic();
          nextPhase();
        };
      }});
  });
}

/* =========================================================
   FLOW : étapes, popups, validation auto
   ========================================================= */
function startStep(idx){
  playIdx=idx; currentStep=STEPS[idx];
  stopGame(); renderIdle();
  updateProgress(); updateBanner();
  openRoundPopup();
}
function renderIdle(){
  stage.innerHTML='<div style="text-align:center;color:var(--muted);font-weight:800;padding:60px 20px;">'
    + '<div style="font-size:2.6rem;margin-bottom:10px;">'+currentStep.emoji+'</div>'
    + 'Prépare ta souris… puis clique sur <b>C\'est parti&nbsp;!</b>'
    + '</div>';
}
function updateProgress(){
  const track=document.getElementById('track'); track.innerHTML='';
  STEPS.forEach((st,i)=>{
    const d=document.createElement('div');
    const mile=st.kind==='jalon';
    d.className='seg'+(mile?' milestone':'');
    if(i<progressIdx) d.classList.add('done');
    if(i===playIdx) d.classList.add('current');
    if(mile) d.textContent=(i<progressIdx?'🏆':'🚩');
    if(i<=progressIdx){
      d.classList.add('clickable');
      d.title=(i===playIdx?'Manche en cours : ':'Revenir à ')+st.label+' · '+st.title;
      d.onclick=()=>{ if(i<=progressIdx) startStep(i); };
    }
    track.appendChild(d);
  });
  const shown=Math.min(playIdx+1, STEPS.length);
  document.getElementById('stepCount').textContent='Niveau '+currentLevel+' · '+STEPS[playIdx].label+' ('+shown+'/'+STEPS.length+')';
}
function updateBanner(){
  const b=document.getElementById('banner');
  b.className='banner'+(currentStep.kind==='jalon'?' test':'')+(reviewing()?' review':'');
  document.getElementById('bEmoji').textContent=currentStep.emoji;
  document.getElementById('bTitle').textContent=(reviewing()?'Révision · ':'')+currentStep.label+' : '+currentStep.title;
  document.getElementById('bSub').innerHTML='<span class="b-goal-label">Objectif :</span> '+stripTags(currentStep.desc);
}
function stripTags(s){ return s.replace(/<[^>]+>/g,''); }

function openRoundPopup(){
  const s=currentStep, jalon=s.kind==='jalon';
  if(s && s.mode==='boss') return openBossGate();   // popup dédiée au boss (choix du mode + consignes)
  modal.className='modal'+(jalon?' test-modal':'');
  modal.innerHTML=
    '<span class="m-emoji">'+s.emoji+'</span>'
    + '<div class="kicker">'+(reviewing()?'Entraînement':s.label)+'</div>'
    + '<h2>'+s.title+'</h2>'
    + '<div class="howto'+(jalon?' test':'')+'"><p class="h-head">'+(jalon?'🏆 Le défi :':'👉 Ta manche :')+'</p><p>'+s.desc+'</p></div>'
    + '<div class="demo"><span class="mouse-emoji">🖱️</span><span>'+gameHintLine()+'</span></div>'
    + '<div class="m-actions"><button class="m-btn primary'+(jalon?' test':'')+'" id="goBtn">C\'est parti ! 🚀</button></div>';
  openOverlay();
  // si une partie est déjà en cours (popup rouvert via « Revoir la consigne »), on reprend
  // simplement la pause ; sinon (premier lancement) on démarre le jeu.
  document.getElementById('goBtn').onclick=()=>{
    if(activeGame){ closeOverlay(); audioCtx(); resumeActive(); }
    else { closeOverlay(); audioCtx(); launchGame(); }
  };
}
/* Popup d'arrivée devant le boss : portrait + consignes + choix du mode (Facile / Moyen / Difficile).
   Si un combat est déjà en cours (rouvert via « Revoir la consigne »), on propose simplement de reprendre. */

    +   '🧪 Quand tu as besoin, <b>clic droit sur la potion de vie</b> (en bas à gauche) pour récupérer <b>2 cœurs</b> ❤️❤️ !</p></div>';

    html += '<div class="m-actions"><button class="m-btn primary test" id="bossResume">⚔️ Reprendre le combat</button></div>';
  } else {
    html += '<p style="font-weight:800;color:#7a5b1e;margin:6px 0 0">Choisis ton mode :</p>'
      + '<div class="boss-modes">'

            + '<span class="bm-txt"><span class="bm-name">'+m.label+'</span><span class="bm-sub">'+m.sub+'</span></span>'

function gameHintLine(){
  const g=LEVELS[currentLevel-1].game;
  return ({
    click:'Vise et fais un <b>clic gauche</b> sur chaque cible.',
    drag:'<b>Attrape</b>, déplace, puis <b>relâche</b> au bon endroit.',
    dblclick:'Fais <b>deux clics rapides</b> pour ouvrir.',
    context:'Fais un <b>clic droit</b> puis choisis la bonne action.',
    select:'Trace un <b>cadre</b> en gardant le bouton gauche appuyé.',
    scroll:'Tourne la <b>molette</b> pour monter et descendre.',
    boss:'Utilise <b>toutes</b> tes compétences : clic, double-clic, glisser, clic droit, lasso, molette !'
  })[g]||'';
}
function launchGame(){
  const g=LEVELS[currentLevel-1].game;
  if(g==='click') return startClick(currentStep);
  if(g==='drag') return startDrag(currentStep);
  if(g==='dblclick') return startDbl(currentStep);
  if(g==='context') return startContext(currentStep);
  if(g==='select') return startSelect(currentStep);
  if(g==='scroll') return startScroll(currentStep);
  if(g==='boss') return startBoss(currentStep);
}
function onWin(){
  if(reviewing()){
    modal.className='modal good';
    modal.innerHTML='<span class="m-emoji">💪</span><h2>Bien joué !</h2>'
      +'<p>Tu as refait cette manche. On revient à <b>ta manche en cours</b>, ta progression est gardée.</p>'
      +'<div class="m-actions"><button class="m-btn primary green" id="bk">Revenir à ma manche</button></div>';
    openOverlay();
    document.getElementById('bk').onclick=()=>{ closeOverlay(); if(progressIdx>=STEPS.length) courseFinish(); else startStep(progressIdx); };
    return;
  }
  const last=playIdx===STEPS.length-1;
  if(last){ progressIdx=STEPS.length; saveProgress(); return levelComplete(); }
  progressIdx=Math.max(progressIdx, playIdx+1); saveProgress();
  const jalon=currentStep.kind==='jalon';
  modal.className='modal good';
  modal.innerHTML='<span class="m-emoji">'+(jalon?'🏆':'✅')+'</span>'
    +'<h2>'+(jalon?'Défi réussi !':'Manche réussie !')+'</h2>'
    +'<p>'+(jalon?'Bravo, tu maîtrises ! Passe à la suite.':'Super, tu progresses bien. En route pour la manche suivante !')+'</p>'
    +'<div class="m-actions"><button class="m-btn primary green" id="next">Continuer →</button></div>';
  openOverlay(); if(jalon) confetti();
  document.getElementById('next').onclick=()=>{ closeOverlay(); startStep(playIdx+1); };
}
function onFail(reason, tip){
  modal.className='modal bad';
  modal.innerHTML='<span class="m-emoji">🙈</span><h2>'+reason+'</h2>'
    +'<div class="howto test" style="margin-top:4px"><p class="h-head">💡 Astuce</p><p>'+tip+'</p></div>'
    +'<div class="m-actions"><button class="m-btn primary" id="retry">↺ Je réessaie</button></div>';
  openOverlay();
  document.getElementById('retry').onclick=()=>{ closeOverlay(); audioCtx(); launchGame(); };
}

/* =========================================================
   NIVEAUX : chargement, intro, déblocage
   ========================================================= */
function loadLevel(n, stepIdx, showIntro){
  n=Math.max(1,Math.min(LEVELS.length,n));
  currentLevel=n; const lvl=LEVELS[n-1];
  STEPS=lvl.rounds;
  progressIdx=(typeof stepIdx==='number')?stepIdx:getSavedStep(n);
  if(isNaN(progressIdx)||progressIdx<0) progressIdx=0;
  if(progressIdx>STEPS.length) progressIdx=STEPS.length;
  document.getElementById('lvlTitle').innerHTML='La souris <span class="dot">·</span> '+lvl.subtitle;
  store.set('ms_curlevel', String(n));
  refreshLevelBtn();
  const startIdx=Math.min(progressIdx, STEPS.length-1);
  // pour le boss, la popup d'intro générique est remplacée par le « portail » (openBossGate via startStep)
  if(showIntro && lvl.game!=='boss') openLevelIntro(n, ()=>startStep(startIdx));
  else startStep(startIdx);
}
function openLevelIntro(n, cont){
  const lvl=LEVELS[n-1], it=lvl.intro;
  const tools=(it.tools||[]).map(t=>'<li><span class="ni-glyph">'+t.g+'</span> '+t.n+'</li>').join('');
  modal.className='modal';
  modal.innerHTML=
    '<span class="m-emoji">'+it.emoji+'</span>'
    + '<div class="kicker">Niveau '+n+'</div>'
    + '<h2>'+lvl.title+'</h2>'
    + '<p>'+it.lead+'</p>'
    + '<div class="howto"><p class="h-head">👉 Comment faire :</p><p>'+it.teach+'</p></div>'
    + (tools?'<ul class="newtools">'+tools+'</ul>':'')
    + '<div class="m-actions"><button class="m-btn primary green" id="lvlGo">C\'est parti ! 🚀</button></div>';
  openOverlay();
  document.getElementById('lvlGo').onclick=()=>{ closeOverlay(); audioCtx(); cont&&cont(); };
}
function refreshLevelBtn(){ const b=document.getElementById('levelBtn'); if(b) b.textContent='🗺️ Niveau '+currentLevel+'/'+LEVELS.length; }

function levelComplete(){
  stopGame();
  if(currentLevel>=LEVELS.length) return courseFinish();
  const nextN=currentLevel+1;
  store.set('ms_unlocked', String(Math.max(getUnlocked(), nextN)));
  store.set('ms_step_l'+nextN, '0');

  playUnlock(nextN, ()=>openLevelUnlockedModal(nextN));
}

/* ---- animation cadenas ---- */
function playUnlock(nextN, done){
  const reduce=window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const st=document.createElement('div'); st.className='lock-stage';
  st.innerHTML='<div class="lock-box">'
    +'<div class="lock-glow"></div><div class="lock-burst"></div><div class="lock-burst lb2"></div>'
    +'<div class="lock-emoji">🔒</div><div class="lock-cap">Niveau '+nextN+' débloqué !</div></div>';
  document.body.appendChild(st);
  const box=st.querySelector('.lock-box'), emoji=st.querySelector('.lock-emoji');
  const bursts=st.querySelectorAll('.lock-burst'), glow=st.querySelector('.lock-glow');
  const cols=['#ffd76a','#ff9a30','#ff6b6b','#a78bfa','#34d399','#60a5fa','#f472b6','#fff'];
  function explode(){
    emoji.textContent='🔓';
    bursts.forEach((b,i)=>setTimeout(()=>b.classList.add('go'),i*150));
    glow.classList.add('go');
    for(let i=0;i<18;i++){
      const s=document.createElement('div'); s.className='lock-star';
      s.style.setProperty('--angle',(i/18*360)+'deg');
      s.style.setProperty('--delay',(i*18)+'ms');
      s.style.setProperty('--dur',(.5+Math.random()*.5)+'s');
      s.style.background=cols[i%cols.length];
      s.style.borderRadius=(i%3===0?'2px':'50%');
      const sz=(7+Math.random()*6)+'px'; s.style.width=sz; s.style.height=sz;
      box.appendChild(s);
    }
    confetti(); beep('win');
  }
  let finished=false;
  function finish(){ if(finished) return; finished=true; setTimeout(()=>st.classList.add('fade'),900); setTimeout(()=>{ st.remove(); done&&done(); },1300); }
  // filet de sécurité : si l'animation est gelée (onglet en arrière-plan), on débloque quand même
  const SAFETY=setTimeout(()=>{ if(!finished){ try{ explode(); }catch(e){} finish(); } }, 4000);
  const _done=done; done=function(){ clearTimeout(SAFETY); _done&&_done(); };
  if(reduce || typeof box.animate!=='function'){ setTimeout(()=>{ explode(); },450); finish(); return; }
  const back='cubic-bezier(.18,.9,.32,1.3)';
  box.animate([{transform:'scale(.3)',opacity:0},{transform:'scale(1)',opacity:1}],{duration:380,easing:back,fill:'both'})
    .finished.then(()=>box.animate([
      {transform:'rotate(0deg) translateX(0)'},{transform:'rotate(-12deg) translateX(-8px)'},
      {transform:'rotate(10deg) translateX(8px)'},{transform:'rotate(-8deg) translateX(-5px)'},
      {transform:'rotate(7deg) translateX(5px)'},{transform:'rotate(0deg) translateX(0)'}
    ],{duration:1100,easing:'ease-in-out'}).finished)
    .then(()=>{ explode(); return box.animate([
      {transform:'scale(1)'},{transform:'scale(1.45) rotate(-8deg)',offset:.4},{transform:'scale(1.12) rotate(0deg)'}
    ],{duration:700,easing:back,fill:'forwards'}).finished; })
    .then(finish).catch(finish);
}

  document.getElementById('cR').onclick=()=>{ closeOverlay(); resumeActive(); };
  document.getElementById('dR').onclick=()=>{ closeOverlay(); progressIdx=0; saveProgress(); startStep(0); };
};

document.getElementById('restartBtn').onclick=()=>{ if(currentStep){ audioCtx(); launchGame(); } };

  modal.className='modal';
  if(B.curPhase){
    // pendant le combat de boss : astuce propre à la phase en cours + rappel de la potion
    const ph=B.curPhase;

      +'<h2>'+ph.banner+'</h2>'

/* =========================================================
   OVERLAY / TOAST / CONFETTI
   ========================================================= */
function openOverlay(){ pauseActive(); overlay.classList.add('open'); }
function closeOverlay(){ overlay.classList.remove('open'); }
let toastTimer=null;
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2200); }
function confetti(){
  const wrap=document.createElement('div'); wrap.className='confetti';
  const cols=['#2563eb','#f59e0b','#16a34a','#e11d48','#7c3aed'];
  for(let i=0;i<70;i++){
    const p=document.createElement('i');
    p.style.left=Math.random()*100+'%'; p.style.background=cols[i%cols.length];
    p.style.animationDuration=(2.4+Math.random()*1.6)+'s';
    p.style.animationDelay=(Math.random()*.5)+'s';
    p.style.transform='rotate('+Math.random()*360+'deg)';
    wrap.appendChild(p);
  }
  document.body.appendChild(wrap); setTimeout(()=>wrap.remove(),4200);
}

/* =========================================================
   INIT
   ========================================================= */
(function init(){
  refreshSoundBtn();
  const go=/[?&]go=(\d+)(?:[.\-_](\d+))?/.exec(location.search);
  if(go){
    const L=Math.max(1,Math.min(LEVELS.length, parseInt(go[1],10)));
    store.set('ms_unlocked', String(Math.max(getUnlocked(), L)));
    store.set('ms_curlevel', String(L));
    if(go[2]!=null) store.set('ms_step_l'+L, String(Math.max(0, parseInt(go[2],10))));
  }
  let lvl=parseInt(store.get('ms_curlevel')||'1',10);
  if(isNaN(lvl)||lvl<1||lvl>LEVELS.length) lvl=1;
  lvl=Math.min(lvl, getUnlocked());
  loadLevel(lvl, getSavedStep(lvl), !go);
})();

/* =========================================================
   ACCÈS DÉVELOPPEUR
   ========================================================= */
(function devkit(){
  function steps(lv){ return lv.rounds; }
  const UNLOCK='ms_unlocked', CUR='ms_curlevel', STEP='ms_step_l', HOME='la-souris.html';
  const css=`
  #devkit{position:fixed;right:14px;bottom:14px;z-index:300;font-family:"Nunito",system-ui,sans-serif;}
  #devkit .dk-toggle{display:inline-flex;align-items:center;gap:6px;background:#1e2733;color:#e7eef6;border:none;
    border-radius:999px;padding:9px 14px;font-weight:800;font-size:.85rem;cursor:pointer;box-shadow:0 6px 18px rgba(0,0,0,.28);}
  #devkit .dk-toggle:hover{background:#2a3645;}
  #devkit .dk-panel{display:none;position:absolute;right:0;bottom:48px;width:312px;max-height:72vh;overflow:auto;
    background:#1e2733;color:#e7eef6;border-radius:14px;padding:12px 12px 14px;box-shadow:0 16px 40px rgba(0,0,0,.42);}
  #devkit.open .dk-panel{display:block;}
  #devkit .dk-head{font-weight:800;font-size:.95rem;margin:0 0 2px;}
  #devkit .dk-note{color:#9fb0c4;font-size:.72rem;margin:0 0 6px;line-height:1.35;}
  #devkit .dk-lv{font-weight:800;color:#9fc3ff;margin:11px 0 4px;font-size:.78rem;text-transform:uppercase;letter-spacing:.04em;}
  #devkit .dk-step{display:block;width:100%;text-align:left;background:#2b3949;color:#e7eef6;border:1px solid #3a4a5c;
    border-radius:8px;padding:6px 9px;margin:3px 0;cursor:pointer;font-size:.78rem;line-height:1.3;}
  #devkit .dk-step:hover{background:#37485c;border-color:#5a7088;}
  #devkit .dk-step.jalon{border-color:#f6b73c;}
  #devkit .dk-step b{color:#ffd479;}
  #devkit .dk-actions{display:flex;gap:6px;margin-top:12px;}
  #devkit .dk-act{flex:1;background:#33455a;color:#e7eef6;border:1px solid #44586e;border-radius:8px;padding:7px;
    font-weight:700;font-size:.74rem;cursor:pointer;}
  #devkit .dk-act:hover{background:#3d5167;}`;
  const style=document.createElement('style'); style.textContent=css; document.head.appendChild(style);
  const root=document.createElement('div'); root.id='devkit';
  let html='<button class="dk-toggle" id="dkToggle">🛠️ Dev</button>'
    +'<div class="dk-panel"><p class="dk-head">🛠️ Accès développeur</p>'
    +'<p class="dk-note">Saute à une manche : tout ce qui précède est considéré comme réussi.</p>';
  LEVELS.forEach(lv=>{
    html+='<div class="dk-lv">Niveau '+lv.n+' — '+lv.title+'</div>';
    steps(lv).forEach((d,i)=>{
      const isJ=(d.kind==='jalon');
      html+='<button class="dk-step'+(isJ?' jalon':'')+'" data-l="'+lv.n+'" data-s="'+i+'">'
        +'<b>'+(d.label||('Manche '+(i+1)))+'</b> · '+(d.title||'')+'</button>';
    });
  });
  html+='<div class="dk-actions"><button class="dk-act" id="dkUnlockAll">🔓 Tout débloquer</button>'
    +'<button class="dk-act" id="dkReset">🧹 Reset complet</button></div></div>';
  root.innerHTML=html; document.body.appendChild(root);
  function devJump(L,S){
    L=Math.max(1,Math.min(LEVELS.length,L));
    const maxS=steps(LEVELS[L-1]).length-1; S=Math.max(0,Math.min(maxS, S||0));
    store.set(UNLOCK, String(Math.max(getUnlocked(), L)));
    store.set(CUR, String(L)); store.set(STEP+L, String(S));
    closeOverlay(); loadLevel(L, S, false);
  }
  document.getElementById('dkToggle').onclick=()=>root.classList.toggle('open');
  root.querySelectorAll('.dk-step').forEach(b=>{
    b.onclick=()=>{ root.classList.remove('open'); devJump(+b.getAttribute('data-l'), +b.getAttribute('data-s')); };
  });
  document.getElementById('dkUnlockAll').onclick=()=>{ store.set(UNLOCK, String(LEVELS.length)); refreshLevelBtn(); };
  document.getElementById('dkReset').onclick=()=>{
    const keys=[UNLOCK,CUR]; for(let i=1;i<=LEVELS.length;i++) keys.push(STEP+i);
    keys.forEach(k=>{ try{ localStorage.removeItem(k); }catch(e){} });
    location.href=HOME;
  };
})();
</script>
