<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La souris — Atelier informatique</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;700;800&family=Pixelify+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#22303f; --muted:#5a6b7b;
    --blue:#2563eb; --blue-d:#1d4ed8;
    --amber:#f59e0b; --amber-d:#b45309;
    --green:#16a34a; --green-d:#15803d;
    --red:#ef4444; --red-d:#b91c1c;
    --paper:#ffffff; --line:#d7e0ea; --line-2:#e7eef6;
    --shell:#e9eff7; --canvas:#dde6f1; --sky:#eaf3ff;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:"Nunito",system-ui,sans-serif;color:var(--ink);
    background:var(--shell);min-height:100vh;display:flex;flex-direction:column;
  }
  button{font-family:inherit;cursor:pointer;}
  .display{font-family:"Fredoka",sans-serif;}

  /* ---------- Top bar ---------- */
  .topbar{background:#fff;border-bottom:2px solid var(--line);
    display:flex;align-items:center;gap:14px;padding:10px 18px;flex-wrap:wrap;}
  .back{display:inline-flex;align-items:center;gap:7px;text-decoration:none;color:var(--blue-d);
    font-weight:800;font-size:.98rem;padding:8px 12px;border-radius:10px;}
  .back:hover{background:#eef4ff;}
  .topbar h1{font-family:"Fredoka",sans-serif;font-weight:600;font-size:1.15rem;margin:0;flex:1;}
  .topbar h1 .dot{color:var(--blue);}
  .step-count{font-weight:800;color:var(--muted);font-size:.95rem;}
  .reset-btn{border:2px solid var(--line);background:#fff;color:var(--muted);font-weight:700;
    border-radius:10px;padding:7px 11px;font-size:.85rem;}
  .reset-btn:hover{border-color:var(--blue);color:var(--blue-d);}
  .reset-btn.danger:hover{border-color:var(--red);color:var(--red-d);}

  /* ---------- Progress ---------- */
  .progress-wrap{background:#fff;padding:8px 18px 14px;border-bottom:2px solid var(--line);}
  .track{display:flex;gap:6px;align-items:center;max-width:1000px;margin:0 auto;}
  .seg{position:relative;flex:1;height:14px;border-radius:8px;background:var(--line-2);}
  .seg.done{background:var(--green);}
  .seg.current{background:var(--blue);box-shadow:0 0 0 3px #bcd2ff;}
  .seg.milestone{height:20px;display:flex;align-items:center;justify-content:center;font-size:1rem;background:#fdebc4;}
  .seg.milestone.done{background:#facc15;}
  .seg.milestone.current{background:var(--amber);box-shadow:0 0 0 3px #fde2a8;}
  .seg.clickable{cursor:pointer;transition:transform .12s ease, filter .12s ease, box-shadow .12s ease;}
  .seg.clickable:hover{filter:brightness(1.07);transform:translateY(-2px);}
  .seg.clickable.done:hover{box-shadow:0 0 0 3px #b9eccd;}

  /* ---------- Mission banner ---------- */
  .banner{max-width:1000px;margin:12px auto 0;width:calc(100% - 36px);
    background:#fff;border:2px solid var(--line);border-left:7px solid var(--blue);
    border-radius:14px;padding:12px 16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
  .banner.test{border-left-color:var(--amber);}
  .banner.review{border-left-color:var(--green);}
  .banner .b-emoji{font-size:1.8rem;line-height:1;}
  .banner .b-txt{flex:1;min-width:200px;}
  .banner .b-title{font-family:"Fredoka",sans-serif;font-weight:600;font-size:1.08rem;}
  .banner .b-sub{color:#3a4a59;font-weight:700;font-size:1rem;margin-top:4px;line-height:1.45;}
  .banner .b-goal-label{font-weight:800;color:var(--blue-d);margin-right:3px;}
  .banner.test .b-goal-label{color:var(--amber-d);}
  .banner .b-btn{border:2px solid var(--line);background:#f5f9ff;color:var(--blue-d);font-weight:800;
    border-radius:10px;padding:8px 13px;font-size:.9rem;white-space:nowrap;}
  .banner .b-btn:hover{border-color:var(--blue);}

  /* ---------- Stage ---------- */
  .stage-wrap{max-width:1000px;margin:12px auto;width:calc(100% - 36px);
    background:#fff;border:2px solid var(--line);border-radius:16px;
    box-shadow:0 18px 40px -28px rgba(34,48,63,.5);overflow:hidden;}
  /* pas de sélection de texte pendant le jeu (évite les conflits clic/double-clic) */
  #stage,#stage *{user-select:none;-webkit-user-select:none;-ms-user-select:none;-webkit-touch-callout:none;}
  .hud{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:10px 16px;
    background:linear-gradient(#fbfcfe,#eef3fa);border-bottom:2px solid var(--line);}
  .hud .lives{font-size:1.15rem;letter-spacing:2px;}
  .hud .lives .lost{filter:grayscale(1);opacity:.35;}
  .hud .meter{flex:1;min-width:140px;height:14px;background:#e2e8f0;border-radius:8px;overflow:hidden;}
  .hud .meter > i{display:block;height:100%;width:0;background:var(--green);border-radius:8px;transition:width .2s ease;}
  .hud .count{font-weight:800;color:var(--muted);font-size:.95rem;white-space:nowrap;}
  .hud .timer{font-weight:800;color:var(--amber-d);font-size:.95rem;white-space:nowrap;}
  .hud .task-prompt{font-weight:800;color:var(--ink);font-size:1rem;flex-basis:100%;line-height:1.4;}
  .hud .task-prompt b{color:var(--blue-d);}

  /* ---------- Game field ---------- */
  .mfield{position:relative;height:clamp(380px,56vh,560px);overflow:hidden;
    background:radial-gradient(120% 90% at 50% 0%,#eaf3ff 0%,#dbeafe 60%,#cfe6f7 100%);}
  .mfield.shake{animation:fieldShake .25s;}
  @keyframes fieldShake{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}}

  /* targets (click games) */
  .target{position:absolute;transform:translate(-50%,-50%);border:none;background:transparent;
    display:flex;align-items:center;justify-content:center;padding:0;cursor:pointer;z-index:5;
    will-change:transform,top,left;}
  .target .bub{width:100%;height:100%;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:1.7rem;background:radial-gradient(circle at 34% 28%,#ffffff88,var(--tc));
    border:3px solid #ffffffcc;box-shadow:0 6px 14px -4px rgba(0,0,0,.4),0 0 0 3px var(--tc) inset;
    animation:tBob 2.2s ease-in-out infinite;}
  @keyframes tBob{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}
  .target.pop .bub{animation:tPop .25s ease forwards;}
  @keyframes tPop{to{transform:scale(1.6);opacity:0;}}
  .target.mole{transform:translate(-50%,-50%);}
  .target.mole .hole{position:absolute;left:50%;bottom:-6px;width:84%;height:26%;transform:translateX(-50%);
    background:#3f2d22;border-radius:50%;filter:blur(.5px);z-index:-1;}
  .target.mole .bub{animation:moleUp .18s ease;}
  @keyframes moleUp{from{transform:translateY(40%) scale(.6);opacity:.2;}to{transform:translateY(0) scale(1);opacity:1;}}
  .target.mole.leaving .bub{animation:moleDown .25s ease forwards;}
  @keyframes moleDown{to{transform:translateY(60%) scale(.5);opacity:0;}}

  .ripple{position:absolute;width:14px;height:14px;border-radius:50%;border:3px solid #2563eb88;
    transform:translate(-50%,-50%);pointer-events:none;z-index:8;animation:rip .45s ease-out forwards;}
  @keyframes rip{to{width:54px;height:54px;opacity:0;}}

  .burst{position:absolute;pointer-events:none;z-index:20;}
  .spark{position:absolute;width:9px;height:9px;border-radius:50%;top:0;left:0;
    transform:translate(-50%,-50%);animation:sparkFly .5s ease-out forwards;}
  @keyframes sparkFly{0%{transform:translate(-50%,-50%) scale(1);opacity:1;}
    100%{transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(0);opacity:0;}}
  /* étincelles fines (boss / cristaux / boules de feu) */
  .spark-thin{position:absolute;width:3px;height:3px;border-radius:0;top:0;left:0;
    transform:translate(-50%,-50%);animation:sparkFly .45s ease-out forwards;}
  /* éclaboussures cauldron */
  .spark-splash{position:absolute;width:7px;height:7px;border-radius:50%;top:0;left:0;
    transform:translate(-50%,-50%);animation:sparkFly .55s ease-out forwards;}
  /* nuage de fumée (disparition monstres horde) */
  .smoke-blob{position:absolute;border-radius:50%;top:0;left:0;pointer-events:none;
    transform:translate(-50%,-50%);animation:smokeFade .6s ease-out forwards;}
  @keyframes smokeFade{
    0%  {transform:translate(-50%,-50%) scale(.25);opacity:.75;}
    60% {opacity:.45;}
    100%{transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(1.4);opacity:0;}}

  /* timer bar */
  .timebar{position:absolute;left:0;top:0;height:6px;background:linear-gradient(90deg,#f59e0b,#ef4444);
    width:100%;z-index:9;transition:width .15s linear;}

  /* ---------- Drag & drop ---------- */
  .dragfield{display:flex;flex-direction:column;}
  .tray{display:flex;flex-wrap:wrap;gap:14px;justify-content:center;align-items:center;
    padding:18px;min-height:42%;}
  .zones{display:flex;flex-wrap:wrap;gap:16px;justify-content:center;align-items:stretch;
    padding:10px 18px 22px;margin-top:auto;}
  .dragitem{width:72px;height:72px;border-radius:16px;background:#fff;border:2px solid var(--line);
    display:flex;align-items:center;justify-content:center;font-size:2.1rem;cursor:grab;
    box-shadow:0 6px 14px -8px rgba(0,0,0,.4);touch-action:none;user-select:none;transition:transform .12s ease;}
  .dragitem:hover{transform:translateY(-3px);}
  .dragitem.dragging{opacity:.25;}
  .dragitem.flyback{transition:left .25s ease,top .25s ease;}
  .drag-ghost{position:fixed;width:72px;height:72px;border-radius:16px;background:#fff;border:2px solid var(--blue);
    display:flex;align-items:center;justify-content:center;font-size:2.1rem;z-index:200;pointer-events:none;
    box-shadow:0 12px 24px -8px rgba(0,0,0,.5);transform:translate(-50%,-50%) rotate(-6deg) scale(1.08);}
  .dropzone{min-width:130px;flex:1;max-width:230px;border-radius:18px;border:3px dashed #b9c6d8;
    background:#ffffffcc;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
    padding:14px 12px;transition:background .15s,border-color .15s,transform .12s;}
  .dropzone .dz-emoji{font-size:2.4rem;line-height:1;}
  .dropzone .dz-label{font-weight:800;color:var(--muted);font-size:.95rem;}
  .dropzone .dz-got{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin-top:2px;font-size:1.15rem;}
  .dropzone.hot{border-color:var(--blue);background:#eaf2ff;transform:scale(1.04);}
  .dropzone.good{border-style:solid;border-color:var(--green);background:#effaf1;}
  .dropzone.nope{animation:dzNope .3s;}
  @keyframes dzNope{0%,100%{transform:translateX(0);}30%{transform:translateX(-7px);}70%{transform:translateX(7px);}}

  /* ---------- Desktop icons (dbl-click) ---------- */
  .desk{display:grid;grid-template-columns:repeat(auto-fit,minmax(108px,1fr));gap:16px;
    padding:22px;align-content:start;height:100%;overflow:auto;}
  .icon{display:flex;flex-direction:column;align-items:center;gap:7px;border-radius:14px;padding:14px 8px;
    background:transparent;border:2px solid transparent;cursor:pointer;user-select:none;transition:transform .12s,background .12s;}
  .icon .ic-emoji{font-size:2.8rem;line-height:1;filter:drop-shadow(0 4px 6px rgba(0,0,0,.18));transition:transform .15s;}
  .icon .ic-label{font-weight:800;color:#33485c;font-size:.9rem;text-align:center;}
  .icon:hover{background:#ffffffaa;}
  .icon.sel{background:#dbeafe;border-color:var(--blue);}
  .icon.opening .ic-emoji{animation:icoOpen .5s ease forwards;}
  @keyframes icoOpen{0%{transform:scale(1);}40%{transform:scale(1.4) rotate(-8deg);}100%{transform:scale(0) rotate(8deg);}}
  .icon.done{opacity:.55;}
  .icon.done .ic-emoji{filter:grayscale(.3) drop-shadow(0 4px 6px rgba(0,0,0,.18));}
  .icon .ic-check{position:absolute;margin-top:-6px;margin-left:42px;font-size:1.2rem;opacity:0;transition:opacity .2s;}
  .icon.done .ic-check{opacity:1;}

  /* ---------- Context menu (right-click) ---------- */
  .ctxgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:16px;padding:22px;align-content:start;height:100%;overflow:auto;}
  .ctxgrid .icon.target-pulse .ic-emoji{animation:ctxPulse 1.1s ease-in-out infinite;}
  @keyframes ctxPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.12);}}
  .ctxmenu{position:absolute;z-index:60;min-width:188px;background:#fff;border:1px solid #cdd8e6;
    border-radius:12px;box-shadow:0 18px 40px -12px rgba(0,0,0,.45);padding:6px;animation:ctxIn .12s ease;}
  @keyframes ctxIn{from{opacity:0;transform:scale(.94);}to{opacity:1;transform:scale(1);}}
  .ctxmenu .ctx-item{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:transparent;
    border:none;border-radius:8px;padding:9px 11px;font-weight:700;font-size:.96rem;color:var(--ink);}
  .ctxmenu .ctx-item:hover{background:#eef4ff;color:var(--blue-d);}
  .ctxmenu .ctx-item .cx-ic{font-size:1.15rem;width:22px;text-align:center;}
  .ctxmenu .ctx-sep{height:1px;background:var(--line-2);margin:4px 6px;}
  .ctxmenu .ctx-item.danger:hover{background:#fdecec;color:var(--red-d);}
  .action-flash{position:absolute;z-index:65;font-family:"Fredoka",sans-serif;font-weight:700;font-size:1.1rem;
    color:#fff;background:var(--green);padding:8px 16px;border-radius:999px;transform:translate(-50%,-50%);
    box-shadow:0 8px 18px -6px rgba(0,0,0,.5);animation:actFlash 1s ease forwards;pointer-events:none;}
  @keyframes actFlash{0%{opacity:0;transform:translate(-50%,-50%) scale(.6);}20%{opacity:1;transform:translate(-50%,-50%) scale(1.1);}
    80%{opacity:1;}100%{opacity:0;transform:translate(-50%,-90%) scale(1);}}

  /* ---------- Selection (lasso) ---------- */
  .selfield{position:relative;}
  .selitem{position:absolute;transform:translate(-50%,-50%);width:66px;height:66px;border-radius:14px;
    background:#fff;border:2px solid var(--line);display:flex;flex-direction:column;align-items:center;justify-content:center;
    font-size:1.9rem;user-select:none;box-shadow:0 5px 12px -7px rgba(0,0,0,.4);z-index:5;transition:box-shadow .1s;}
  .selitem .si-label{font-size:.62rem;font-weight:800;color:var(--muted);}
  .selitem.sel{border-color:var(--blue);background:#eaf2ff;box-shadow:0 0 0 3px #bcd2ff;}
  .selitem.grab{cursor:grab;}
  .selbox{position:absolute;border:2px solid var(--blue);background:#2563eb22;border-radius:4px;z-index:10;pointer-events:none;}
  .seldrop{position:absolute;right:18px;bottom:16px;width:120px;height:120px;border-radius:18px;border:3px dashed #b9c6d8;
    background:#ffffffcc;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;z-index:4;}
  .seldrop.hot{border-color:var(--blue);background:#eaf2ff;}
  .seldrop .sd-emoji{font-size:2.6rem;}
  .seldrop .sd-label{font-weight:800;color:var(--muted);font-size:.85rem;}
  .sel-hint{position:absolute;left:50%;top:10px;transform:translateX(-50%);background:#ffffffdd;border:2px solid var(--line);
    border-radius:999px;padding:6px 16px;font-weight:800;color:var(--blue-d);font-size:.9rem;z-index:6;}

  /* ---------- Scroll (molette) ---------- */
  .scrollwrap{position:relative;height:100%;}
  .scrolllist{height:100%;overflow-y:auto;padding:10px 16px 30px;scroll-behavior:smooth;}
  .scrollrow{display:flex;align-items:center;gap:12px;background:#fff;border:2px solid var(--line);border-radius:12px;
    padding:13px 16px;margin:9px 0;font-weight:700;color:#46586b;}
  .scrollrow .sr-num{font-family:"Fredoka",sans-serif;color:#9aa8b8;font-weight:700;min-width:30px;}
  .scrollrow.star{border-color:var(--amber);background:linear-gradient(#fffaf0,#fff3d6);cursor:pointer;}
  .scrollrow.star .sr-star{font-size:1.6rem;margin-left:auto;animation:starSpin 2.5s linear infinite;}
  @keyframes starSpin{to{transform:rotate(360deg);}}
  .scrollrow.star:hover{box-shadow:0 0 0 3px #fde2a8;}
  .scrollrow.got{border-color:var(--green);background:#effaf1;cursor:default;}
  .scrollrow.got .sr-star{animation:none;}
  .scroll-cue{position:absolute;left:50%;transform:translateX(-50%);background:var(--blue);color:#fff;
    font-weight:800;border-radius:999px;padding:7px 16px;font-size:.9rem;z-index:7;box-shadow:0 8px 18px -6px rgba(0,0,0,.5);
    display:flex;align-items:center;gap:7px;pointer-events:none;animation:cueBob 1s ease-in-out infinite;}
  .scroll-cue.bottom{bottom:14px;}
  .scroll-cue.top{top:14px;}
  @keyframes cueBob{0%,100%{transform:translateX(-50%) translateY(0);}50%{transform:translateX(-50%) translateY(5px);}}

  /* ---------- Action bar ---------- */
  .actions{max-width:1000px;margin:10px auto 22px;width:calc(100% - 36px);display:flex;gap:12px;justify-content:flex-start;flex-wrap:wrap;}
  .btn{border:none;border-radius:13px;padding:13px 20px;font-weight:800;font-size:1.02rem;display:inline-flex;align-items:center;gap:9px;}
  .btn:active{transform:translateY(1px);}
  .btn-hint{background:#fff;color:var(--amber-d);border:2px solid var(--amber);}
  .btn-hint:hover{background:#fff8ec;}
  .btn-restart{background:#fff;color:var(--muted);border:2px solid var(--line);}
  .btn-restart:hover{border-color:var(--blue);color:var(--blue-d);}

  /* ---------- Modal ---------- */
  .overlay{position:fixed;inset:0;background:rgba(20,30,42,.55);backdrop-filter:blur(2px);
    display:none;align-items:center;justify-content:center;z-index:100;padding:18px;}
  .overlay.open{display:flex;}
  .modal{background:#fff;border-radius:22px;max-width:560px;width:100%;padding:22px 26px 20px;
    box-shadow:0 30px 70px -30px rgba(0,0,0,.6);animation:pop .22s ease;max-height:92vh;overflow:auto;}
  @keyframes pop{from{transform:scale(.92);opacity:0;}to{transform:scale(1);opacity:1;}}
  .modal .m-emoji{font-size:2.5rem;line-height:1;display:block;margin-bottom:4px;}
  .modal h2{font-family:"Fredoka",sans-serif;font-weight:600;font-size:1.45rem;margin:0 0 9px;}
  .modal p{font-size:1.03rem;line-height:1.55;margin:0 0 12px;color:var(--ink);}
  .modal .kicker{font-weight:800;letter-spacing:.05em;text-transform:uppercase;font-size:.78rem;color:var(--blue-d);}
  .modal.test-modal .kicker{color:var(--amber-d);}
  .howto{background:#f4f8ff;border:2px solid #dbe7ff;border-radius:14px;padding:13px 15px;margin:0 0 14px;}
  .howto .h-head{font-weight:800;margin:0 0 6px;color:var(--blue-d);}
  .howto p{margin:0;font-size:1rem;line-height:1.6;}
  .howto.test{background:#fffaf0;border-color:#fbe2b0;}
  .howto.test .h-head{color:var(--amber-d);}
  .demo{display:flex;align-items:center;justify-content:center;gap:14px;margin:10px 0 2px;font-size:1.05rem;font-weight:700;color:var(--muted);}
  .demo .mouse-emoji{font-size:2.2rem;}
  .modal .m-actions{display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap;margin-top:8px;
    position:sticky;bottom:0;background:#fff;padding-top:10px;border-top:1px solid var(--line-2);}
  .m-btn{border:none;border-radius:13px;padding:13px 22px;font-weight:800;font-size:1.05rem;}
  .m-btn.primary{background:var(--blue);color:#fff;}
  .m-btn.primary:hover{background:var(--blue-d);}
  .m-btn.primary.test{background:var(--amber);}
  .m-btn.primary.test:hover{background:var(--amber-d);}
  .m-btn.primary.green{background:var(--green);}
  .m-btn.primary.green:hover{background:var(--green-d);}
  .m-btn.ghost{background:#eef2f7;color:var(--muted);}
  .m-btn.ghost:hover{background:#e2e8f0;}
  .modal.good{border-top:8px solid var(--green);}
  .modal.bad{border-top:8px solid var(--red);}
  .modal.warn{border-top:8px solid var(--amber);}

  .newtools{list-style:none;margin:0 0 16px;padding:0;display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .newtools li{display:flex;align-items:center;gap:9px;background:#f4f8ff;border:2px solid #dbe7ff;
    border-radius:12px;padding:9px 11px;font-weight:700;font-size:.95rem;color:var(--ink);}
  .ni-glyph{display:inline-flex;align-items:center;justify-content:center;min-width:32px;height:30px;
    background:#fff;border:2px solid #c7d8f2;border-radius:8px;font-weight:800;color:var(--blue-d);flex:0 0 auto;font-size:1.1rem;}

  /* level selector */
  .lvl-grid{display:grid;gap:10px;margin:6px 0 18px;}
  .lvl-card{display:grid;grid-template-columns:auto 1fr;grid-template-rows:auto auto;column-gap:14px;align-items:center;
    text-align:left;border:2px solid var(--line);background:#fbfdff;border-radius:14px;padding:13px 16px;color:var(--ink);}
  .lvl-card .lc-badge{grid-row:1 / span 2;font-size:1.5rem;width:44px;height:44px;display:flex;align-items:center;justify-content:center;
    background:#eef4ff;border-radius:12px;}
  .lvl-card .lc-n{font-family:"Fredoka",sans-serif;font-weight:700;font-size:1.02rem;}
  .lvl-card .lc-t{color:var(--muted);font-weight:700;font-size:.88rem;}
  .lvl-card:not(.locked):hover{border-color:var(--blue);background:#f1f6ff;transform:translateY(-2px);}
  .lvl-card.current{border-color:var(--green);background:#f1fbf4;}
  .lvl-card.current .lc-badge{background:#d8f5e3;}
  .lvl-card.locked{opacity:.6;cursor:not-allowed;filter:grayscale(.3);}

  /* ---------- toast / confetti ---------- */
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;font-weight:700;padding:12px 18px;border-radius:12px;
    opacity:0;transition:.25s;z-index:120;max-width:90%;text-align:center;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .confetti{position:fixed;inset:0;pointer-events:none;z-index:140;overflow:hidden;}
  .confetti i{position:absolute;top:-10px;width:10px;height:14px;opacity:.9;animation:fall linear forwards;}
  @keyframes fall{to{transform:translateY(110vh) rotate(540deg);}}

  /* ---------- Animation cadenas (déblocage) ---------- */
  .lock-stage{position:fixed;inset:0;z-index:130;display:flex;align-items:center;justify-content:center;
    background:rgba(14,22,34,.82);backdrop-filter:blur(5px);transition:opacity .4s;}
  .lock-stage.fade{opacity:0;}
  .lock-box{position:relative;display:flex;flex-direction:column;align-items:center;gap:10px;}
  .lock-emoji{position:relative;z-index:2;font-size:6.5rem;line-height:1;
    filter:drop-shadow(0 0 18px rgba(255,220,60,.6)) drop-shadow(0 14px 24px rgba(0,0,0,.5));}
  .lock-glow{position:absolute;left:50%;top:44%;width:220px;height:220px;margin:-110px 0 0 -110px;
    border-radius:50%;background:radial-gradient(circle,rgba(255,230,80,.85) 0%,rgba(255,140,30,.5) 40%,transparent 70%);
    opacity:0;pointer-events:none;z-index:1;transform:scale(0);}
  .lock-glow.go{animation:lockGlow .95s ease-out forwards;}
  @keyframes lockGlow{0%{opacity:0;transform:scale(.2);}25%{opacity:1;}100%{opacity:0;transform:scale(3.5);}}
  .lock-burst{position:absolute;left:50%;top:44%;width:90px;height:90px;margin:-45px 0 0 -45px;
    border-radius:50%;border:6px solid rgba(255,215,80,.95);opacity:0;pointer-events:none;z-index:3;}
  .lock-burst.lb2{width:130px;height:130px;margin:-65px 0 0 -65px;border-color:rgba(255,140,40,.8);border-width:5px;}
  .lock-burst.go{animation:lockBurst .95s ease-out forwards;}
  .lock-burst.lb2.go{animation:lockBurst 1s .18s ease-out forwards;}
  @keyframes lockBurst{0%{opacity:.95;transform:scale(.15);}100%{opacity:0;transform:scale(7.5);}}
  .lock-cap{font-family:"Fredoka",sans-serif;font-weight:700;font-size:1.5rem;color:#fff;
    background:var(--amber);padding:6px 20px;border-radius:999px;box-shadow:0 8px 20px -8px rgba(0,0,0,.6);}
  .lock-star{position:absolute;left:calc(50% - 5px);top:calc(50% - 5px);width:10px;height:10px;
    pointer-events:none;z-index:4;animation:starFly var(--dur,.7s) var(--delay,0ms) ease-out forwards;}
  @keyframes starFly{0%{opacity:1;transform:rotate(var(--angle,0deg)) translateX(6px) scale(1.4);}
    70%{opacity:.85;}100%{opacity:0;transform:rotate(var(--angle,0deg)) translateX(140px) scale(.1);}}

  /* ---------- Combat de Boss (Niveau 7) ---------- */
  .bossfield{position:relative;height:clamp(440px,62vh,620px);overflow:hidden;
    background:linear-gradient(#2a1530 0%,#3a1d2e 42%,#241018 74%,#160a10 100%);}
  .bossfield::after{content:'';position:absolute;left:0;right:0;bottom:0;height:24%;
    background:repeating-linear-gradient(90deg,#3a2a3a 0 42px,#322232 42px 84px);
    border-top:4px solid #140810;opacity:.6;pointer-events:none;}
  .boss-hud{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;gap:12px;padding:10px 14px;z-index:14;}
  .boss-hearts{font-size:1.3rem;letter-spacing:2px;display:inline-flex;align-items:center;gap:2px;}
  .boss-hearts .lost{filter:grayscale(1);opacity:.4;}
  .boss-hearts .bheart{width:26px;height:26px;object-fit:contain;image-rendering:pixelated;user-select:none;-webkit-user-drag:none;}
  .boss-portrait{width:46px;height:46px;flex:0 0 auto;object-fit:contain;image-rendering:pixelated;
    border:2px solid #ffd76a;border-radius:10px;background:rgba(0,0,0,.35);padding:2px;box-shadow:0 0 12px rgba(255,90,60,.45);user-select:none;-webkit-user-drag:none;}
  .boss-hpwrap{flex:1;}
  .boss-name{font-family:"Pixelify Sans",sans-serif;color:#ffe9c2;font-weight:600;font-size:1.15rem;text-shadow:0 2px 6px #000;margin-bottom:3px;}
  .boss-mode-tag{font-family:"Nunito",sans-serif;font-size:.72rem;font-weight:800;color:#0b0b0b;background:#ffd76a;
    padding:1px 8px;border-radius:999px;margin-left:6px;vertical-align:middle;}
  /* popup de sélection du mode + portrait de référence */
  .boss-gate-portrait{width:120px;height:120px;object-fit:contain;image-rendering:pixelated;margin:2px auto 0;display:block;
    filter:drop-shadow(0 6px 14px rgba(0,0,0,.45));user-select:none;-webkit-user-drag:none;}
  .boss-modes{display:flex;flex-direction:column;gap:9px;margin:6px 0 2px;}
  .boss-mode-btn{display:flex;align-items:center;gap:12px;width:100%;text-align:left;cursor:pointer;
    background:#fff;border:2px solid #e7d3a8;border-radius:14px;padding:11px 14px;transition:transform .08s,border-color .12s,box-shadow .12s;}
  .boss-mode-btn:hover{border-color:#f59e0b;box-shadow:0 6px 16px -6px rgba(245,158,11,.5);transform:translateY(-1px);}
  .boss-mode-btn .bm-ic{font-size:1.9rem;line-height:1;flex:0 0 auto;}
  .boss-mode-btn .bm-txt{display:flex;flex-direction:column;}
  .boss-mode-btn .bm-name{font-family:"Fredoka",sans-serif;font-weight:700;font-size:1.08rem;color:#3a2a12;}
  .boss-mode-btn .bm-sub{font-size:.82rem;font-weight:700;color:#8a7a5c;}
  .boss-mode-btn .bm-tag{margin-left:auto;font-size:.72rem;font-weight:800;color:#0b0b0b;background:#ffe08a;border-radius:999px;padding:3px 10px;white-space:nowrap;}
  .boss-mode-btn.is-hard .bm-tag{background:#fca5a5;}
  .boss-mode-btn.is-easy{border-color:#bbf7d0;}
  .boss-mode-btn.is-easy .bm-tag{background:#86efac;}
  .boss-hpbar{height:16px;border-radius:0;background:rgba(0,0,0,.5);border:3px solid #000;overflow:hidden;box-shadow:2px 2px 0 #000,inset 1px 1px 0 rgba(0,0,0,.6);image-rendering:pixelated;}
  .boss-hpbar > i{display:block;height:100%;width:100%;background:#e53e3e;transition:width .35s ease;}
  /* position de base du démon : partie HAUTE, juste sous la barre d'attaque/piège (90-112px),
     identique dans toutes les phases (l'override n'existe que pour « les sortilèges », plus bas) */
  .boss-slot{position:absolute;top:120px;left:50%;transform:translateX(-50%);z-index:4;}
  .hero-slot{position:absolute;bottom:15%;left:50%;transform:translateX(-50%);z-index:5;}
  .actor{position:relative;display:flex;align-items:flex-end;justify-content:center;}
  .actor-img{width:100%;height:100%;object-fit:contain;image-rendering:pixelated;display:none;user-select:none;-webkit-user-drag:none;pointer-events:none;}
  .actor{user-select:none;-webkit-user-select:none;}
  .actor-emoji{user-select:none;-webkit-user-select:none;}
  .actor-emoji{display:flex;align-items:center;justify-content:center;line-height:1;}
  .boss-actor.shake{animation:bossHurtA .42s;}
  @keyframes bossHurtA{0%,100%{transform:none;}30%{transform:translateX(-9px) scale(1.05);}60%{transform:translateX(9px);}}
  /* clignotement lumineux rétro pendant l'anim « taking_hit » (style vieux jeux vidéo) */
  .boss-actor.hurtblink .actor-img,.boss-actor.hurtblink .actor-emoji{animation:hurtBlink 1.3s steps(1,end);}
  @keyframes hurtBlink{
    0%,16%,33%,50%,66%,83%{filter:brightness(3.4) contrast(1.5) drop-shadow(0 0 10px #fff);}
    8%,25%,41%,58%,74%,91%,100%{filter:none;}}
  /* illumination du sprite quand une boule de feu part de lui */
  .boss-actor.lit .actor-img,.boss-actor.lit .actor-emoji{filter:brightness(1.7) drop-shadow(0 0 14px #ff7a3c) drop-shadow(0 0 6px #fde047);}
  /* finale : le démon seul, agrandi et centré pendant l'anim de mort */
  .bossfield.boss-finale{background:radial-gradient(circle at 50% 48%,rgba(60,10,10,.5),rgba(0,0,0,.94));}
  .bossfield.boss-finale .boss-hud,
  .bossfield.boss-finale .hero-slot,
  .bossfield.boss-finale .health-potion,
  .bossfield.boss-finale .fire-layer{opacity:0;transition:opacity .45s;pointer-events:none;}
  .bossfield.boss-finale::after{opacity:0;transition:opacity .45s;}   /* on retire la bande rayée du sol */
  .boss-actor.dying{transform:scale(2.3);transform-origin:center center;transition:transform .55s ease;
    z-index:30;filter:drop-shadow(0 0 24px rgba(255,80,30,.6));}
  /* tremblement de l'arène : léger (dégât) et fort (rugissement) */
  .bossfield.shake{animation:fieldShake .25s;}
  .bossfield.quake{animation:bossQuake .7s;}
  @keyframes bossQuake{0%,100%{transform:translate(0,0);}
    12%{transform:translate(-10px,5px);}25%{transform:translate(9px,-6px);}38%{transform:translate(-8px,-4px);}
    50%{transform:translate(8px,5px);}62%{transform:translate(-6px,3px);}75%{transform:translate(5px,-3px);}88%{transform:translate(-3px,2px);}}
  /* secousse longue du rugissement d'intro : amplitude FAIBLE mais oscillation RÉGULIÈRE, en boucle */
  .bossfield.quakeReg{animation:bossQuakeReg .14s linear infinite;}
  @keyframes bossQuakeReg{0%{transform:translate(0,0);}25%{transform:translate(-4px,2px);}
    50%{transform:translate(4px,-2px);}75%{transform:translate(-3px,2px);}100%{transform:translate(0,0);}}
  /* flash rouge plein écran quand le démon encaisse un coup */
  .dmg-flash{position:absolute;inset:0;z-index:18;pointer-events:none;
    background:radial-gradient(circle,rgba(255,80,40,0) 45%,rgba(255,60,30,.55) 100%);animation:dmgFlash .28s ease-out forwards;}
  @keyframes dmgFlash{0%{opacity:0;}30%{opacity:1;}100%{opacity:0;}}
  .hero-actor.shake{animation:heroHurtA .42s;}
  @keyframes heroHurtA{0%,100%{transform:none;}35%{transform:translateX(8px) rotate(6deg);filter:brightness(.6) sepia(1) saturate(4) hue-rotate(-30deg);}}
  .actor-emoji.emo-idle,.actor-emoji.emo-fly{animation:emoBob 2s ease-in-out infinite;}
  @keyframes emoBob{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
  .actor-emoji.emo-attack,.actor-emoji.emo-cast,.actor-emoji.emo-roar{animation:emoAtk .4s;}
  @keyframes emoAtk{0%{transform:translateY(0);}50%{transform:translateY(-10px) scale(1.14);}100%{transform:translateY(0);}}
  .actor-emoji.emo-hurt{animation:emoHurt .4s;}
  @keyframes emoHurt{0%,100%{transform:none;}40%{transform:rotate(-12deg) translateX(-6px);}}
  .actor-emoji.emo-death,.actor-emoji.emo-pop{animation:emoDeath .9s ease forwards;}
  @keyframes emoDeath{to{transform:scale(.1) rotate(220deg);opacity:0;}}
  .actor-emoji.emo-win{animation:emoWin .8s ease-in-out infinite;}
  @keyframes emoWin{0%,100%{transform:translateY(0) rotate(0);}50%{transform:translateY(-12px) rotate(-7deg);}}

  .phase-layer{position:absolute;inset:0;z-index:6;pointer-events:none;}
  .phase-layer .fireball,.phase-layer .bcrystal,.phase-layer .bingr,.phase-layer .ctxmenu,.phase-layer .grimoire{pointer-events:auto;}
  /* consignes du jeu : placées EN BAS, sous le chevalier, pour dégager le haut (barres + démon) */
  .boss-prompt{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);max-width:74%;text-align:center;
    background:rgba(0,0,0,.62);color:#fff;font-weight:600;padding:8px 16px;border-radius:999px;z-index:17;font-size:1.05rem;
    font-family:"Pixelify Sans",sans-serif;}
  .boss-prompt b{color:#fde047;}
  .boss-banner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    z-index:20;background:radial-gradient(circle,rgba(0,0,0,.25),rgba(0,0,0,.55));text-align:center;padding:16px;pointer-events:none;}
  .boss-banner .bb-title{font-family:"Pixelify Sans",sans-serif;font-weight:700;font-size:clamp(1.9rem,6.5vw,3.2rem);color:#fff;
    text-shadow:0 0 18px #ff7a3c,0 4px 0 #b91c1c;animation:bbIn .4s ease both;}
  @keyframes bbIn{0%{transform:scale(.4) rotate(-8deg);opacity:0;}100%{transform:scale(1) rotate(0);opacity:1;}}
  .boss-banner .bb-sub{margin-top:8px;color:#ffe9b0;font-weight:600;font-size:1.2rem;text-shadow:0 2px 6px #000;font-family:"Pixelify Sans",sans-serif;}
  /* panneau de briefing entre les phases (déclenché par le joueur) */
  .boss-brief{position:absolute;inset:0;z-index:30;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:13px;padding:20px;text-align:center;pointer-events:auto;overflow-y:auto;
    background:radial-gradient(circle,rgba(20,8,16,.82),rgba(10,4,8,.93));animation:bbIn .35s ease both;}
  .boss-brief .bf-story{color:#fca5a5;font-weight:600;font-size:1.3rem;max-width:92%;text-shadow:0 2px 6px #000;font-family:"Pixelify Sans",sans-serif;}
  .boss-brief .bf-title{font-family:"Pixelify Sans",sans-serif;font-weight:700;font-size:clamp(2rem,6.5vw,3rem);color:#fff;
    text-shadow:0 0 16px #ff7a3c,0 3px 0 #b91c1c;}
  .boss-brief .bf-how{color:#fff;font-weight:600;font-size:1.3rem;line-height:1.9;max-width:600px;
    font-family:"Pixelify Sans",sans-serif;
    background:rgba(0,0,0,.42);padding:16px 22px;border-radius:14px;border:2px solid rgba(255,215,106,.45);}
  .boss-brief .bf-how b{color:#fde047;}
  .boss-brief .bf-go{font-family:"Pixelify Sans",sans-serif;font-weight:700;font-size:1.4rem;color:#fff;
    background:linear-gradient(#f59e0b,#b45309);border:none;border-radius:999px;padding:13px 32px;
    box-shadow:0 8px 18px -6px rgba(0,0,0,.6);cursor:pointer;animation:emoBob 1.9s ease-in-out infinite;}
  .boss-brief .bf-go:hover{filter:brightness(1.08);}
  .fireball{position:absolute;transform:translate(-50%,-50%);font-size:1.9rem;z-index:9;cursor:pointer;filter:drop-shadow(0 0 7px #ff7a3c);}
  .fireball-img{width:48px;height:48px;object-fit:contain;image-rendering:pixelated;display:block;pointer-events:none;user-select:none;-webkit-user-drag:none;}
  .bcrystal{position:absolute;transform:translate(-50%,-50%);font-size:2.5rem;cursor:pointer;z-index:9;user-select:none;filter:drop-shadow(0 0 8px #7dd3fc);}
  .bcrystal.charged{filter:drop-shadow(0 0 16px #fde047) brightness(1.25);}
  .bcrystal-img{width:62px;height:62px;object-fit:contain;image-rendering:pixelated;display:block;pointer-events:none;user-select:none;-webkit-user-drag:none;}
  /* chaudron : à GAUCHE du chevalier (même hauteur), pas centré sous lui */
  .cauldron{position:absolute;left:38%;bottom:17%;transform:translateX(-50%);font-size:3.1rem;z-index:7;filter:drop-shadow(0 0 10px #a855f7);}
  .cauldron-img{width:84px;height:84px;object-fit:contain;image-rendering:pixelated;display:block;pointer-events:none;user-select:none;-webkit-user-drag:none;}
  /* légère vibration du chaudron quand on y met un bon ingrédient (0.5s) */
  .cauldron.vibrate .cauldron-img{animation:cauldronVibrate .5s ease-in-out;}
  @keyframes cauldronVibrate{0%,100%{transform:translate(0,0) rotate(0);}15%{transform:translate(-2px,1px) rotate(-2deg);}30%{transform:translate(2px,-1px) rotate(2deg);}45%{transform:translate(-2px,1px) rotate(-1.5deg);}60%{transform:translate(2px,-1px) rotate(1.5deg);}75%{transform:translate(-1px,1px) rotate(-1deg);}}
  .bingr{position:absolute;transform:translate(-50%,-50%);font-size:2.1rem;cursor:grab;z-index:9;user-select:none;touch-action:none;}
  .bingr.good{filter:drop-shadow(0 0 9px #fde047);}
  .bingr-img{width:52px;height:52px;object-fit:contain;image-rendering:pixelated;display:block;pointer-events:none;user-select:none;-webkit-user-drag:none;}
  .boss-aura{position:absolute;transform:translate(-50%,-50%);font-size:2.2rem;z-index:7;pointer-events:none;animation:emoBob 1.4s ease-in-out infinite;}
  .bolt-fx{position:absolute;transform:translate(-50%,-50%);font-size:3.2rem;z-index:15;pointer-events:none;animation:boltZap .6s ease forwards;}
  @keyframes boltZap{0%{transform:translate(-50%,-50%) scale(.3);opacity:0;}30%{opacity:1;transform:translate(-50%,-50%) scale(1.3);}100%{opacity:0;transform:translate(-50%,-50%) scale(1);}}
  .minion.lassosel{outline:3px solid #60a5fa;outline-offset:2px;border-radius:8px;background:rgba(96,165,250,.18);}
  .grimoire{position:absolute;inset:9% 11% 11%;background:#3b2a1a;border:5px solid #1f140a;border-radius:12px;overflow:hidden;z-index:7;display:flex;flex-direction:column;box-shadow:0 16px 40px -10px rgba(0,0,0,.6);}
  .grimoire .gpages{flex:1;overflow-y:auto;padding:10px;}
  .gpage{background:#e8d5a8;border:2px solid #b79b66;border-radius:7px;margin:8px 0;padding:11px 14px;font-weight:600;color:#5a4423;font-family:"Pixelify Sans",sans-serif;font-size:1rem;}
  .gpage.sealed{background:linear-gradient(#fff3c4,#ffe08a);border-color:#f59e0b;cursor:pointer;
    animation:sealPulse 1.1s ease-in-out infinite;}
  @keyframes sealPulse{
    0%,100%{box-shadow:0 0 6px 2px rgba(245,158,11,.5),0 0 0 3px #fde2a8;}
    50%{box-shadow:0 0 22px 8px rgba(253,224,71,.95),0 0 0 3px #fde2a8,0 0 36px 14px rgba(255,200,0,.45);}}
  .gpage.sealed:hover{filter:brightness(1.06);}
  .gpage .seal{float:right;}
  .grimoire.side{inset:22% 2% 7% auto;width:34%;}
  .fire-layer{position:absolute;inset:0;z-index:11;pointer-events:none;}
  .fire-layer .fireball{pointer-events:auto;}
  .boss-gauge{position:absolute;top:90px;left:50%;transform:translateX(-50%);width:min(440px,82%);z-index:13;display:flex;align-items:center;gap:9px;}
  .boss-gauge .bg-label{color:#fff;font-weight:600;font-size:1rem;text-shadow:0 1px 3px #000;white-space:nowrap;font-family:"Pixelify Sans",sans-serif;}
  .boss-gauge .bg-track{flex:1;height:18px;background:rgba(0,0,0,.5);border:3px solid #000;border-radius:0;overflow:hidden;box-shadow:2px 2px 0 #000,inset 1px 1px 0 rgba(0,0,0,.6);image-rendering:pixelated;}
  .boss-gauge .bg-track > i{display:block;height:100%;width:0;background:#16a34a;transition:width .08s linear;}
  .boss-aura.weak{display:flex;flex-direction:column;align-items:center;gap:3px;z-index:19;
    background:rgba(12,5,14,.78);border:3px solid #ffd76a;border-radius:16px;padding:7px 14px 10px;
    box-shadow:0 8px 22px -6px rgba(0,0,0,.75),0 0 26px rgba(255,120,60,.55);animation:weakPulse 1s ease-in-out infinite;}
  @keyframes weakPulse{0%,100%{box-shadow:0 8px 22px -6px rgba(0,0,0,.75),0 0 18px rgba(255,120,60,.45);}50%{box-shadow:0 8px 22px -6px rgba(0,0,0,.75),0 0 34px rgba(255,160,60,.8);}}
  .boss-aura.weak::after{content:'';position:absolute;bottom:-12px;left:50%;transform:translateX(-50%);
    border:9px solid transparent;border-top-color:#ffd76a;}
  .boss-aura.weak .aw-tag{font-size:.74rem;font-weight:800;color:#fff;background:#ef4444;padding:2px 12px;border-radius:999px;white-space:nowrap;box-shadow:0 2px 6px rgba(0,0,0,.5);}
  .boss-aura.weak .aw-icon{font-size:3.1rem;line-height:1;animation:emoBob 1.2s ease-in-out infinite;filter:drop-shadow(0 0 8px #ffd76a);}
  .health-potion{position:absolute;left:14px;bottom:12px;z-index:16;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;user-select:none;}
  .health-potion .hp-bottle{width:96px;height:96px;object-fit:contain;image-rendering:pixelated;filter:drop-shadow(0 0 8px #ff6b9d);animation:emoBob 2.4s ease-in-out infinite;user-select:none;-webkit-user-drag:none;}
  .health-potion .hp-hint{font-size:1.2rem;font-weight:800;color:#ffe9b0;background:rgba(0,0,0,.5);padding:4px 12px;border-radius:999px;white-space:nowrap;}
  .health-potion.empty{cursor:default;}
  .health-potion.empty .hp-bottle{opacity:.6;animation:none;filter:none;}
  .health-potion.empty .hp-hint{display:none;}

  @media (max-width:560px){
    .newtools{grid-template-columns:1fr;}
    .btn{flex:1;justify-content:center;}
  }
  @media (prefers-reduced-motion: reduce){
    .confetti i{animation:none;display:none;}
    .modal{animation:none;}
    .lock-burst,.lock-glow,.lock-star{animation:none;}
    .target .bub,.target.pop .bub,.scrollrow.star .sr-star{animation:none!important;}
  }
</style>
</head>
<body>

   ========================================================= */
let actx=null;
function audioCtx(){ if(!actx){ try{ actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ actx=null; } } return actx; }
/* ---- musique du combat de boss (boucle) ---- */
let bossMusic=null;
function startBossMusic(){
  if(!bossMusic){ bossMusic=new Audio('musics/musique_gruk.mp3'); bossMusic.loop=true; bossMusic.volume=0.45; }
  if(!soundOn) return;
  try{ bossMusic.currentTime=0; const p=bossMusic.play(); if(p&&p.catch) p.catch(()=>{}); }catch(e){}
}
function stopBossMusic(){ if(bossMusic){ try{ bossMusic.pause(); bossMusic.currentTime=0; }catch(e){} } }
function pauseBossMusic(){ if(bossMusic){ try{ bossMusic.pause(); }catch(e){} } }
function resumeBossMusic(){ if(bossMusic && soundOn){ try{ const p=bossMusic.play(); if(p&&p.catch) p.catch(()=>{}); }catch(e){} } }
function beep(kind){
  if(!soundOn) return; const a=audioCtx(); if(!a) return;
  const now=a.currentTime;
  function tone(freq,dur,type,vol,delay){
    const o=a.createOscillator(),g=a.createGain();
    o.type=type||'sine'; o.frequency.value=freq;
    o.connect(g); g.connect(a.destination);
    const t=now+(delay||0); g.gain.setValueAtTime(vol||.12,t);
    g.gain.exponentialRampToValueAtTime(.0001,t+dur);
    o.start(t); o.stop(t+dur);
  }
  if(kind==='click'){ tone(420,.04,'square',.06); }
  else if(kind==='good'){ tone(740,.09,'sine',.12); tone(1180,.09,'sine',.08,.02); }
  else if(kind==='bad'){ tone(150,.16,'square',.12); }
  else if(kind==='ding'){ tone(880,.12,'sine',.12); tone(1320,.16,'sine',.1,.08); }
  else if(kind==='win'){ [523,659,784,1046].forEach((f,i)=>tone(f,.18,'triangle',.12,i*.09)); }
  else if(kind==='roar'){ tone(150,.5,'sawtooth',.14); tone(95,.55,'sawtooth',.12,.04); tone(70,.6,'square',.08,.05); }
  else if(kind==='fire'){ tone(330,.18,'sawtooth',.1); tone(180,.26,'sawtooth',.09,.05); }
}

};
const _demonAudio={};
function demonSound(key,opts){
  if(!soundOn) return; opts=opts||{};
  const file=DEMON_SOUNDS[key]; if(!file) return;
  let a=_demonAudio[key];
  if(!a){ a=new Audio(DEMON_SND_ROOT+file); _demonAudio[key]=a; }
  try{ a.pause(); a.currentTime=0; a.volume=opts.vol!=null?opts.vol:0.65; a.playbackRate=opts.rate||1;
    const p=a.play(); if(p&&p.catch) p.catch(()=>{}); }catch(e){}
}
function demonTaunt(){ demonSound(pick(['noMercy','noMore','provoke'])); }   // provocation aléatoire
function refreshSoundBtn(){ document.getElementById('soundBtn').textContent=(soundOn?'🔊':'🔈')+' Son'; }
document.getElementById('soundBtn').onclick=()=>{ soundOn=!soundOn; store.set('ms_sound', soundOn?'1':'0'); refreshSoundBtn(); if(soundOn){ audioCtx(); beep('good'); if(B.running) resumeBossMusic(); } else { pauseBossMusic(); } };

let activeGame=null;   // {stop(), pause?(), resume?()}
let gamePaused=false;
const MG={};           // état du jeu courant
function mgStop(){
  MG.running=false;
  if(MG.raf) cancelAnimationFrame(MG.raf);
  if(MG.iv) clearInterval(MG.iv);
  (MG.cleanup||[]).forEach(f=>{ try{f();}catch(e){} });
  MG.cleanup=[];
}
function on(el,ev,fn,opts){ el.addEventListener(ev,fn,opts); (MG.cleanup=MG.cleanup||[]).push(()=>el.removeEventListener(ev,fn,opts)); }
function stopGame(){ if(activeGame){ try{activeGame.stop();}catch(e){} activeGame=null; } gamePaused=false; }
function pauseActive(){ if(activeGame && activeGame.pause){ try{activeGame.pause();}catch(e){} } gamePaused=true; }
function resumeActive(){ if(gamePaused && activeGame && activeGame.resume){ try{activeGame.resume();}catch(e){} } gamePaused=false; }

/* HUD partagé */
function hudHTML(opts){
  opts=opts||{};
  return '<div class="hud">'
    + (opts.lives? '<span class="lives" id="hudLives"></span>':'')
    + '<span class="count" id="hudCount"></span>'
    + (opts.timer? '<span class="timer" id="hudTimer"></span>':'')
    + '<div class="meter"><i id="hudMeter"></i></div>'
    + (opts.prompt? '<div class="task-prompt" id="hudPrompt"></div>':'')
    + '</div>';
}
function setHud(cleared,target,lives,maxLives){
  if(maxLives){ let h=''; for(let i=0;i<maxLives;i++) h+=(i<lives?'❤️':'<span class="lost">🖤</span>');
    const el=document.getElementById('hudLives'); if(el) el.innerHTML=h; }
  const c=document.getElementById('hudCount'); if(c) c.textContent=cleared+' / '+target+' réussies';
  const m=document.getElementById('hudMeter'); if(m) m.style.width=Math.min(100,cleared/target*100)+'%';
}

/* particules */
function burstAt(field, xPx, yPx){
  const N=12, burst=document.createElement('div'); burst.className='burst';
  burst.style.left=xPx+'px'; burst.style.top=yPx+'px';
  for(let i=0;i<N;i++){
    const angle=(i/N)*2*Math.PI, dist=34+Math.random()*30;
    const sp=document.createElement('div'); sp.className='spark';
    sp.style.setProperty('--dx',(Math.cos(angle)*dist)+'px');
    sp.style.setProperty('--dy',(Math.sin(angle)*dist)+'px');
    sp.style.background=TCOLORS[i%TCOLORS.length];
    sp.style.animationDelay=(Math.random()*0.06)+'s';
    burst.appendChild(sp);
  }
  field.appendChild(burst); setTimeout(()=>burst.remove(),520);
}
function rippleAt(field,xPx,yPx){
  const r=document.createElement('div'); r.className='ripple';
  r.style.left=xPx+'px'; r.style.top=yPx+'px';
  field.appendChild(r); setTimeout(()=>r.remove(),460);
}
/* étincelles fines or/blanc (boss, cristaux, boules de feu) */
function sparkAt(field, xPx, yPx){
  const N=14, burst=document.createElement('div'); burst.className='burst';
  burst.style.left=xPx+'px'; burst.style.top=yPx+'px';
  const colors=['#fde047','#fff','#fde047','#fffbe0','#fbbf24','#fff'];
  for(let i=0;i<N;i++){
    const angle=(i/N)*2*Math.PI + (Math.random()-.5)*.6;
    const dist=22+Math.random()*32;
    const sp=document.createElement('div'); sp.className='spark-thin';
    sp.style.setProperty('--dx',(Math.cos(angle)*dist)+'px');
    sp.style.setProperty('--dy',(Math.sin(angle)*dist)+'px');
    sp.style.background=colors[i%colors.length];
    sp.style.animationDelay=(Math.random()*0.05)+'s';
    burst.appendChild(sp);
  }
  field.appendChild(burst); setTimeout(()=>burst.remove(),500);
}
function sparkAtEl(el){ const r=el.getBoundingClientRect(), fr=B.field.getBoundingClientRect(); sparkAt(B.field, r.left+r.width/2-fr.left, r.top+r.height/2-fr.top); }
/* éclaboussures cauldron */
function splashAt(field, xPx, yPx, color){
  const N=10, burst=document.createElement('div'); burst.className='burst';
  burst.style.left=xPx+'px'; burst.style.top=yPx+'px';
  for(let i=0;i<N;i++){
    const angle=(i/N)*2*Math.PI + (Math.random()-.5)*.5;
    const dist=18+Math.random()*28;
    const sp=document.createElement('div'); sp.className='spark-splash';
    sp.style.setProperty('--dx',(Math.cos(angle)*dist)+'px');
    sp.style.setProperty('--dy',(Math.sin(angle)*dist)+'px');

    sp.style.animationDelay=(Math.random()*0.07)+'s';
    burst.appendChild(sp);
  }
  field.appendChild(burst); setTimeout(()=>burst.remove(),600);
}
function splashAtEl(el, color){ const r=el.getBoundingClientRect(), fr=B.field.getBoundingClientRect(); splashAt(B.field, r.left+r.width/2-fr.left, r.top+r.height/2-fr.top, color); }
/* nuage de fumée (monstres horde) */
function smokePuffAt(field, xPx, yPx){
  const N=4, burst=document.createElement('div'); burst.className='burst';

function smokePuffAtEl(el){ const r=el.getBoundingClientRect(), fr=B.field.getBoundingClientRect(); smokePuffAt(B.field, r.left+r.width/2-fr.left, r.top+r.height/2-fr.top); }

/* ---------------------------------------------------------
   JEU 1 — CLIC (variantes pop / move / mole)
   --------------------------------------------------------- */
function startClick(step){
  stopGame(); MG.cleanup=[];
  const lives=step.lives||0;
  stage.innerHTML=hudHTML({lives:lives, timer:!!step.timeMs})
    + (step.timeMs? '<div class="mfield clickfield" id="mfield"><div class="timebar" id="timebar"></div></div>'
                   : '<div class="mfield clickfield" id="mfield"></div>');
  const field=document.getElementById('mfield');
  Object.assign(MG,{
    step, field, items:[], cleared:0, lives, maxLives:lives, target:step.target,
    running:true, last:0, nextSpawn:0, raf:0,
    timeLeft:step.timeMs||0, emoji:step.emoji
  });
  setHud(0,step.target,lives,lives);
  // ripple feedback sur clic dans le vide
  on(field,'pointerdown',e=>{ if(e.target===field){ const r=field.getBoundingClientRect(); rippleAt(field,e.clientX-r.left,e.clientY-r.top); beep('click'); } });
  activeGame={
    stop:mgStop,
    pause(){ MG.running=false; cancelAnimationFrame(MG.raf); },
    resume(){ if(!MG.running){ MG.running=true; MG.last=0; MG.raf=requestAnimationFrame(clickLoop); } }
  };
  MG.raf=requestAnimationFrame(clickLoop);
}
function clickEmoji(){
  const v=MG.step.variant;
  if(v==='move') return pick(['🦋','🐞','🐝','🐠','🐙','🦜']);
  if(v==='mole') return MG.step.emoji==='⚡' ? pick(['🐹','🐰','🦔']) : '🐹';
  return pick(['🎈','🫧','🎈','🟡','🔵','🟣']);
}
function spawnTarget(){
  const step=MG.step, v=step.variant, field=MG.field;
  const W=field.clientWidth, H=field.clientHeight, size=step.size;
  const mx=size/2/W*100+3, my=size/2/H*100+3;
  const x=rnd(mx,100-mx), y=rnd(my,100-my);
  const el=document.createElement('button');
  el.className='target'+(v==='mole'?' mole':'');
  el.style.left=x+'%'; el.style.top=y+'%';
  el.style.width=size+'px'; el.style.height=size+'px';
  const color=pick(TCOLORS);
  const emo=clickEmoji();
  el.innerHTML=(v==='mole'?'<span class="hole"></span>':'')+'<span class="bub" style="--tc:'+color+'">'+emo+'</span>';
  const item={el,x,y,vx:0,vy:0,born:performance.now()};
  if(v==='move'){
    const sp=step.speed||14, ang=rnd(0,2*Math.PI);
    item.vx=Math.cos(ang)*sp; item.vy=Math.sin(ang)*sp;
  }
  on(el,'click',ev=>{ ev.stopPropagation(); popTarget(item); });
  field.appendChild(el); MG.items.push(item);
}
function removeItem(item){ const i=MG.items.indexOf(item); if(i>=0) MG.items.splice(i,1); }
function popTarget(item){
  if(item.popped) return; item.popped=true;
  const field=MG.field, r=field.getBoundingClientRect();
  const xPx=item.x/100*field.clientWidth, yPx=item.y/100*field.clientHeight;
  burstAt(field,xPx,yPx);
  removeItem(item); item.el.classList.add('pop'); const el=item.el; setTimeout(()=>el.remove(),250);
  MG.cleared++; beep('good'); setHud(MG.cleared,MG.target,MG.lives,MG.maxLives);
  if(MG.cleared>=MG.target) return clickWin();
}
function expireMole(item){
  if(item.popped) return; item.popped=true;
  removeItem(item); item.el.classList.add('leaving'); const el=item.el; setTimeout(()=>el.remove(),250);
  if(MG.maxLives){ MG.lives--; beep('bad'); MG.field.classList.add('shake'); setTimeout(()=>MG.field.classList.remove('shake'),250);
    setHud(MG.cleared,MG.target,MG.lives,MG.maxLives);
    if(MG.lives<=0) return clickFail('Trop de hamsters se sont échappés !','Clique plus vite sur le hamster dès qu\'il sort de son trou. Vise celui qui est sorti depuis le plus longtemps.');
  }
}
function clickLoop(ts){
  if(!MG.running) return;
  if(!MG.last) MG.last=ts;
  const dt=Math.min(.05,(ts-MG.last)/1000); MG.last=ts;
  const step=MG.step;
  // timer
  if(step.timeMs){
    MG.timeLeft-=dt*1000;
    const tb=document.getElementById('timebar'); if(tb) tb.style.width=Math.max(0,MG.timeLeft/step.timeMs*100)+'%';
    const ht=document.getElementById('hudTimer'); if(ht) ht.textContent='⏱️ '+Math.max(0,Math.ceil(MG.timeLeft/1000))+'s';
    if(MG.timeLeft<=0) return clickFail('Le temps est écoulé !','Clique sans t\'arrêter sur les cibles. Vise d\'abord celles qui sont les plus proches du pointeur.');
  }
  // spawn
  if(ts>=MG.nextSpawn && MG.items.length<step.maxOn){ spawnTarget(); MG.nextSpawn=ts+step.spawnMs; }
  // move
  if(step.variant==='move'){
    const W=MG.field.clientWidth, H=MG.field.clientHeight, size=step.size;
    const mx=size/2/W*100, my=size/2/H*100;
    for(const it of MG.items){
      it.x+=it.vx*dt; it.y+=it.vy*dt;
      if(it.x<mx){ it.x=mx; it.vx=Math.abs(it.vx); } else if(it.x>100-mx){ it.x=100-mx; it.vx=-Math.abs(it.vx); }
      if(it.y<my){ it.y=my; it.vy=Math.abs(it.vy); } else if(it.y>100-my){ it.y=100-my; it.vy=-Math.abs(it.vy); }
      it.el.style.left=it.x+'%'; it.el.style.top=it.y+'%';
    }
  }
  // mole expiry
  if(step.variant==='mole'){
    for(const it of MG.items.slice()){ if(ts-it.born>=step.life) expireMole(it); }
  }
  MG.raf=requestAnimationFrame(clickLoop);
}
function clickWin(){ mgStop(); beep('win'); onWin(); }
function clickFail(reason,tip){ mgStop(); onFail(reason,tip); }

/* ---------------------------------------------------------
   JEU 2 — GLISSER-DÉPOSER
   --------------------------------------------------------- */
function startDrag(step){
  stopGame(); MG.cleanup=[];
  stage.innerHTML=hudHTML({})+'<div class="mfield dragfield"><div class="tray" id="tray"></div><div class="zones" id="zones"></div></div>';
  const tray=document.getElementById('tray'), zones=document.getElementById('zones');
  Object.assign(MG,{step, placed:0, total:step.items.length, zoneEls:[]});
  setHud(0, MG.total, 0, 0);
  // zones
  step.zones.forEach(z=>{
    const el=document.createElement('div'); el.className='dropzone'; el.dataset.type=z.t;
    el.innerHTML='<div class="dz-emoji">'+z.e+'</div><div class="dz-label">'+z.label+'</div><div class="dz-got"></div>';
    zones.appendChild(el); MG.zoneEls.push(el);
  });
  // items
  shuffle(step.items).forEach(it=>{
    const el=document.createElement('div'); el.className='dragitem'; el.dataset.type=it.t; el.textContent=it.e;
    tray.appendChild(el);
    on(el,'pointerdown',e=>startDragItem(e,el,it));
  });
  activeGame={ stop:mgStop, pause(){}, resume(){} };
}
function startDragItem(e,el,it){
  e.preventDefault();
  const ghost=document.createElement('div'); ghost.className='drag-ghost'; ghost.textContent=it.e;
  document.body.appendChild(ghost);
  const move=ev=>{
    ghost.style.left=ev.clientX+'px'; ghost.style.top=ev.clientY+'px';
    el.classList.add('dragging');
    MG.zoneEls.forEach(z=>z.classList.remove('hot'));
    const zone=zoneUnder(ev.clientX,ev.clientY);
    if(zone) zone.classList.add('hot');
  };
  const up=ev=>{
    document.removeEventListener('pointermove',move);
    document.removeEventListener('pointerup',up);
    ghost.remove(); el.classList.remove('dragging');
    MG.zoneEls.forEach(z=>z.classList.remove('hot'));
    const zone=zoneUnder(ev.clientX,ev.clientY);
    if(zone && zone.dataset.type===it.t){
      // bon dépôt
      const got=zone.querySelector('.dz-got'); const b=document.createElement('span'); b.textContent=it.e; got.appendChild(b);
      zone.classList.add('good'); setTimeout(()=>zone.classList.remove('good'),500);
      el.remove(); MG.placed++; beep('good'); setHud(MG.placed,MG.total,0,0);
      if(MG.placed>=MG.total){ mgStop(); beep('win'); onWin(); }
    } else if(zone){
      zone.classList.add('nope'); setTimeout(()=>zone.classList.remove('nope'),320); beep('bad');
      toast('Pas le bon dossier ! Regarde bien à quoi sert chaque zone.');
    } else { beep('bad'); }
  };
  ghost.style.left=e.clientX+'px'; ghost.style.top=e.clientY+'px';
  document.addEventListener('pointermove',move);
  document.addEventListener('pointerup',up);
  MG.cleanup.push(()=>{ document.removeEventListener('pointermove',move); document.removeEventListener('pointerup',up); ghost.remove(); });
}
function zoneUnder(cx,cy){
  for(const z of MG.zoneEls){ const r=z.getBoundingClientRect(); if(cx>=r.left&&cx<=r.right&&cy>=r.top&&cy<=r.bottom) return z; }
  return null;
}

/* ---------------------------------------------------------
   JEU 3 — DOUBLE-CLIC
   --------------------------------------------------------- */
function startDbl(step){
  stopGame(); MG.cleanup=[];
  stage.innerHTML=hudHTML({timer:!!step.timeMs})+'<div class="mfield"><div class="desk" id="desk"></div>'
    + (step.timeMs?'<div class="timebar" id="timebar"></div>':'')+'</div>';
  const desk=document.getElementById('desk');
  Object.assign(MG,{step, opened:0, total:step.target, running:true, last:0, raf:0, timeLeft:step.timeMs||0, singleWarned:false});
  setHud(0,MG.total,0,0);
  step.items.forEach((it,i)=>{
    const el=document.createElement('div'); el.className='icon';
    el.innerHTML='<span class="ic-check">✅</span><span class="ic-emoji">'+it.e+'</span><span class="ic-label">'+escapeHtml(it.l)+'</span>';
    desk.appendChild(el);
    on(el,'click',()=>{ if(el.classList.contains('done')) return; el.classList.add('sel');
      if(!MG.singleWarned){ MG.singleWarned=true; toast('Un seul clic = sélectionner. Fais DEUX clics rapides pour ouvrir !'); } });
    on(el,'dblclick',()=>openIcon(el));
  });
  activeGame={ stop:mgStop, pause(){ MG.running=false; cancelAnimationFrame(MG.raf); },
    resume(){ if(step.timeMs && !MG.running){ MG.running=true; MG.last=0; MG.raf=requestAnimationFrame(dblLoop); } } };
  if(step.timeMs) MG.raf=requestAnimationFrame(dblLoop);
}
function openIcon(el){
  if(el.classList.contains('done')) return;
  el.classList.remove('sel'); el.classList.add('opening');
  const emoji=el.querySelector('.ic-emoji');
  setTimeout(()=>{ el.classList.remove('opening'); el.classList.add('done'); emoji.style.transform=''; },480);
  MG.opened++; beep('good'); setHud(MG.opened,MG.total,0,0);
  if(MG.opened>=MG.total){ mgStop(); beep('win'); setTimeout(onWin,300); }
}
function dblLoop(ts){
  if(!MG.running) return;
  if(!MG.last) MG.last=ts;
  const dt=Math.min(.05,(ts-MG.last)/1000); MG.last=ts;
  MG.timeLeft-=dt*1000;
  const tb=document.getElementById('timebar'); if(tb) tb.style.width=Math.max(0,MG.timeLeft/MG.step.timeMs*100)+'%';
  const ht=document.getElementById('hudTimer'); if(ht) ht.textContent='⏱️ '+Math.max(0,Math.ceil(MG.timeLeft/1000))+'s';
  if(MG.timeLeft<=0){ mgStop(); return onFail('Le temps est écoulé !','Double-clique vite : deux petits clics rapprochés sur chaque élément.'); }
  MG.raf=requestAnimationFrame(dblLoop);
}

/* ---------------------------------------------------------
   JEU 4 — CLIC DROIT (menu contextuel)
   --------------------------------------------------------- */
const CTX_MENU=[
  {action:'open',  label:'Ouvrir',     ic:'📂'},
  {action:'copy',  label:'Copier',     ic:'📋'},
  {action:'rename',label:'Renommer',   ic:'✏️'},
  {action:'props', label:'Propriétés', ic:'⚙️'},
  {action:'delete',label:'Supprimer',  ic:'🗑️', danger:true}
];
const ACTION_VERB={open:'Ouvre',copy:'Copie',rename:'Renomme',props:'Ouvre les Propriétés de',delete:'Supprime'};
const ACTION_ICO={open:'📂',copy:'📋',rename:'✏️',props:'⚙️',delete:'🗑️'};
function startContext(step){
  stopGame(); MG.cleanup=[];
  stage.innerHTML=hudHTML({prompt:true})+'<div class="mfield" id="mfield"><div class="ctxgrid" id="ctxgrid"></div></div>';
  const grid=document.getElementById('ctxgrid'), field=document.getElementById('mfield');
  Object.assign(MG,{step, field, taskIdx:0, total:step.tasks.length, iconEls:{}, menu:null});
  setHud(0,MG.total,0,0);
  step.items.forEach(it=>{
    const el=document.createElement('div'); el.className='icon'; el.style.position='relative';
    el.innerHTML='<span class="ic-emoji">'+it.e+'</span><span class="ic-label">'+escapeHtml(it.l)+'</span>';
    grid.appendChild(el); MG.iconEls[it.id]=el;
    on(el,'contextmenu',e=>{ e.preventDefault(); e.stopPropagation(); onCtxRight(e,it,el); });
    on(el,'click',()=>{ if(!MG.menu) toast('Utilise le bouton DROIT de la souris sur cet élément !'); });
  });
  // bloque le menu natif sur tout le terrain
  on(field,'contextmenu',e=>{ e.preventDefault(); closeCtxMenu(); });
  showCtxPrompt();
  activeGame={ stop(){ closeCtxMenu(); mgStop(); }, pause(){}, resume(){} };
}
function curTask(){ return MG.step.tasks[MG.taskIdx]; }
function showCtxPrompt(){
  const t=curTask(); const it=MG.step.items.find(i=>i.id===t.item);
  const p=document.getElementById('hudPrompt');
  if(p) p.innerHTML='Consigne '+(MG.taskIdx+1)+'/'+MG.total+' : <b>'+ACTION_VERB[t.action]+'</b> '+ACTION_ICO[t.action]+' le fichier <b>'+escapeHtml(it.l)+'</b> '+it.e;
  // pulse l'élément cible pour guider
  Object.values(MG.iconEls).forEach(e=>e.classList.remove('target-pulse'));
  const tgt=MG.iconEls[t.item]; if(tgt) tgt.classList.add('target-pulse');
}
function onCtxRight(e,it,el){
  closeCtxMenu();
  const t=curTask();
  if(it.id!==t.item){ beep('bad'); toast('Ce n\'est pas le bon élément. Relis la consigne en haut !'); return; }
  // ouvre le menu
  const menu=document.createElement('div'); menu.className='ctxmenu';
  CTX_MENU.forEach((m,i)=>{
    if(i===CTX_MENU.length-1){ const sep=document.createElement('div'); sep.className='ctx-sep'; menu.appendChild(sep); }
    const b=document.createElement('button'); b.className='ctx-item'+(m.danger?' danger':'');
    b.innerHTML='<span class="cx-ic">'+m.ic+'</span>'+m.label;
    b.onclick=ev=>{ ev.stopPropagation(); onCtxAction(m.action, el); };
    menu.appendChild(b);
  });
  MG.field.appendChild(menu); MG.menu=menu;
  // position dans le terrain
  const fr=MG.field.getBoundingClientRect();
  let mx=e.clientX-fr.left, my=e.clientY-fr.top;
  menu.style.left=Math.min(mx, MG.field.clientWidth-menu.offsetWidth-6)+'px';
  menu.style.top=Math.min(my, MG.field.clientHeight-menu.offsetHeight-6)+'px';
  beep('click');
  // fermer si on clique ailleurs
  const off=ev=>{ if(MG.menu && !MG.menu.contains(ev.target)) closeCtxMenu(); };
  setTimeout(()=>{ document.addEventListener('pointerdown',off,{once:false}); MG.cleanup.push(()=>document.removeEventListener('pointerdown',off)); MG._ctxOff=off; },0);
}

function startSelect(step){
  stopGame(); MG.cleanup=[];
  stage.innerHTML=hudHTML({})+'<div class="mfield selfield" id="mfield"><div class="sel-hint" id="selHint"></div></div>';
  const field=document.getElementById('mfield');
  Object.assign(MG,{step, field, items:[], selDone:false, moving:false});
  const wanted=step.items.filter(i=>i.w).length;
  setHud(0, step.move?wanted+1:wanted, 0, 0);
  document.getElementById('selHint').textContent = step.move ? '🔲 Trace un cadre autour des bons objets' : '🔲 Trace un cadre de sélection autour des bons objets';
  // items
  step.items.forEach(it=>{
    const el=document.createElement('div'); el.className='selitem';
    el.style.left=it.x+'%'; el.style.top=it.y+'%';
    el.innerHTML=it.e+(it.l?'<span class="si-label">'+it.l+'</span>':'');
    field.appendChild(el);
    MG.items.push({el, wanted:!!it.w, x:it.x, y:it.y});
  });
  // zone de dépôt (si déplacement)
  if(step.move){
    const dz=document.createElement('div'); dz.className='seldrop'; dz.id='selDrop';
    dz.innerHTML='<div class="sd-emoji">'+step.move.e+'</div><div class="sd-label">'+step.move.label+'</div>';
    field.appendChild(dz); MG.dropEl=dz;
  }
  // lasso
  on(field,'pointerdown',startLasso);
  activeGame={ stop:mgStop, pause(){}, resume(){} };
}
function startLasso(e){
  if(MG.selDone) return;           // après sélection valide on passe en mode déplacement
  if(e.target.closest('.selitem')) return;
  e.preventDefault();
  const field=MG.field, fr=field.getBoundingClientRect();
  const x0=e.clientX-fr.left, y0=e.clientY-fr.top;
  const box=document.createElement('div'); box.className='selbox'; field.appendChild(box);
  const move=ev=>{
    const x=ev.clientX-fr.left, y=ev.clientY-fr.top;
    const L=Math.min(x0,x), T=Math.min(y0,y), Wd=Math.abs(x-x0), Hd=Math.abs(y-y0);
    box.style.left=L+'px'; box.style.top=T+'px'; box.style.width=Wd+'px'; box.style.height=Hd+'px';
    MG.items.forEach(it=>{
      const r=it.el.getBoundingClientRect();
      const cx=r.left+r.width/2-fr.left, cy=r.top+r.height/2-fr.top;
      const inside=cx>=L&&cx<=L+Wd&&cy>=T&&cy<=T+Hd;
      it.el.classList.toggle('sel',inside); it.selNow=inside;
    });
  };
  const up=()=>{
    document.removeEventListener('pointermove',move); document.removeEventListener('pointerup',up);
    box.remove();
    checkSelection();
  };
  document.addEventListener('pointermove',move); document.addEventListener('pointerup',up);
  MG.cleanup.push(()=>{ document.removeEventListener('pointermove',move); document.removeEventListener('pointerup',up); box.remove(); });
}
function checkSelection(){
  let okWanted=0, badPicked=0, wantedTotal=0;
  MG.items.forEach(it=>{ if(it.wanted){ wantedTotal++; if(it.selNow) okWanted++; } else if(it.selNow) badPicked++; });
  const perfect = (okWanted===wantedTotal && badPicked===0);
  if(!perfect){
    beep('bad');
    if(badPicked>0) toast('Tu as sélectionné un objet en trop ! Entoure seulement les bons.');
    else toast('Il en manque ! Entoure bien TOUS les bons objets d\'un coup.');
    MG.items.forEach(it=>{ it.el.classList.remove('sel'); it.selNow=false; });
    return;
  }
  // sélection parfaite
  beep('good'); MG.selDone=true;
  setHud(MG.step.move?1:1, MG.step.move?2:1, 0, 0);
  if(!MG.step.move){ mgStop(); beep('win'); setTimeout(onWin,300); return; }
  // mode déplacement groupé
  document.getElementById('selHint').textContent='📦 Glisse les objets sélectionnés dans le '+MG.step.move.label;
  MG.items.filter(i=>i.wanted).forEach(it=>{
    it.el.classList.add('grab');
    on(it.el,'pointerdown',ev=>startGroupMove(ev));
  });
}
function startGroupMove(e){
  e.preventDefault();
  const field=MG.field, fr=field.getBoundingClientRect();
  const sel=MG.items.filter(i=>i.wanted);
  const start={x:e.clientX,y:e.clientY};
  const origins=sel.map(it=>({it, x:it.x, y:it.y}));
  const move=ev=>{
    const dxp=(ev.clientX-start.x)/field.clientWidth*100, dyp=(ev.clientY-start.y)/field.clientHeight*100;
    origins.forEach(o=>{ o.it.x=o.x+dxp; o.it.y=o.y+dyp; o.it.el.style.left=o.it.x+'%'; o.it.el.style.top=o.it.y+'%'; });
    if(MG.dropEl){ const r=MG.dropEl.getBoundingClientRect(); MG.dropEl.classList.toggle('hot', ev.clientX>=r.left&&ev.clientX<=r.right&&ev.clientY>=r.top&&ev.clientY<=r.bottom); }
  };
  const up=ev=>{
    document.removeEventListener('pointermove',move); document.removeEventListener('pointerup',up);
    if(MG.dropEl) MG.dropEl.classList.remove('hot');
    const r=MG.dropEl.getBoundingClientRect();
    const inZone = ev.clientX>=r.left&&ev.clientX<=r.right&&ev.clientY>=r.top&&ev.clientY<=r.bottom;
    if(inZone){
      sel.forEach(it=>{ it.el.style.transition='transform .25s ease,opacity .25s'; it.el.style.opacity='0'; it.el.style.transform='translate(-50%,-50%) scale(.3)'; });
      beep('good'); setHud(2,2,0,0);
      mgStop(); beep('win'); setTimeout(onWin,350);
    } else { beep('bad'); toast('Dépose-les bien dans le '+MG.step.move.label+' !'); }
  };
  document.addEventListener('pointermove',move); document.addEventListener('pointerup',up);
  MG.cleanup.push(()=>{ document.removeEventListener('pointermove',move); document.removeEventListener('pointerup',up); });
}

const SCROLL_ITEMS=['Photo','Chanson','Dossier','Vidéo','Document','Jeu','Dessin','Note','Recette','Devoir','Image','Album','Carte','Lettre','Liste','Film','Histoire','Poème','Calcul','Leçon'];
function startScroll(step){
  stopGame(); MG.cleanup=[];
  stage.innerHTML=hudHTML({})+'<div class="mfield"><div class="scrollwrap" id="swrap"><div class="scrolllist" id="slist"></div></div></div>';
  const list=document.getElementById('slist'), wrap=document.getElementById('swrap');
  Object.assign(MG,{step, got:0, total:step.targets.length, list, wrap});
  setHud(0,MG.total,0,0);
  const tset=new Set(step.targets);
  for(let i=0;i<step.listLen;i++){
    const row=document.createElement('div');
    if(tset.has(i)){
      row.className='scrollrow star'; row.dataset.i=i;
      row.innerHTML='<span class="sr-num">'+(i+1)+'</span> Étoile à attraper ! <span class="sr-star">⭐</span>';
      on(row,'click',()=>grabStar(row));
    } else {
      row.className='scrollrow';
      row.innerHTML='<span class="sr-num">'+(i+1)+'</span> '+pick(SCROLL_ITEMS)+' '+pick(['📄','🎵','📁','🖼️','🎮','📝']);
    }
    list.appendChild(row);
  }
  if(step.startBottom){ list.scrollTop=list.scrollHeight; }
  // indice de défilement
  const cue=document.createElement('div'); cue.className='scroll-cue '+(step.startBottom?'top':'bottom');
  cue.innerHTML=step.startBottom?'<span>⬆️ Remonte avec la molette</span>':'<span>⬇️ Descends avec la molette</span>';
  wrap.appendChild(cue); MG.cue=cue;
  on(list,'scroll',()=>updateScrollCue());
  updateScrollCue();
  activeGame={ stop:mgStop, pause(){}, resume(){} };
}
function updateScrollCue(){
  if(!MG.cue) return;
  // cache l'indice quand une étoile non prise est visible
  const lr=MG.list.getBoundingClientRect();
  let visibleStar=false, anyBelow=false, anyAbove=false;
  MG.list.querySelectorAll('.scrollrow.star:not(.got)').forEach(s=>{
    const r=s.getBoundingClientRect();
    if(r.top>=lr.top-4 && r.bottom<=lr.bottom+4) visibleStar=true;
    if(r.top>lr.bottom) anyBelow=true;
    if(r.bottom<lr.top) anyAbove=true;
  });
  if(visibleStar || (!anyBelow && !anyAbove)){ MG.cue.style.display='none'; return; }
  MG.cue.style.display='flex';
  if(anyBelow && !anyAbove){ MG.cue.className='scroll-cue bottom'; MG.cue.innerHTML='<span>⬇️ Continue à descendre</span>'; }
  else if(anyAbove && !anyBelow){ MG.cue.className='scroll-cue top'; MG.cue.innerHTML='<span>⬆️ Remonte encore</span>'; }
  else { MG.cue.className='scroll-cue bottom'; MG.cue.innerHTML='<span>🔍 Cherche en haut et en bas</span>'; }
}
function grabStar(row){
  if(row.classList.contains('got')) return;
  row.classList.add('got'); row.querySelector('.sr-star').textContent='✅';
  row.childNodes[1].nodeValue=' Étoile attrapée ! ';
  MG.got++; beep('good'); setHud(MG.got,MG.total,0,0);
  updateScrollCue();
  if(MG.got>=MG.total){ mgStop(); beep('win'); setTimeout(onWin,300); }
}

/* ---- Système de sprites (frames PixelLab + repli emoji) ---- */
const SPRITE_ROOT='sprites/';
// Registre des personnages. folder = dossier d'export PixelLab (null = pas encore livré → emoji).
// dir = direction utilisée ('north' = dos pour le chevalier, 'south' = face sinon).
const CHARS={
  boss:  { folder:'a_chunky_red_horned_demon', dir:'south', emoji:'🐲', size:160,
           anims:{idle:'idle',hurt:'taking_hit',roar:'roar',boucle_roar:'boucle_roar',death:'death',
                  fire_begin:'fire_begin',channeling_fire:'channeling_fire',
                  horde_cast:'horde_cast',channel_horde:'channel_horde'} },
  hero:  { folder:null, dir:'north', emoji:'🧙', size:84,
           anims:{idle:'idle',attack:'attack',cast:'cast',hurt:'hurt',win:'win'} },
  slime: { folder:'green_slime', dir:'south', emoji:'🟢', size:29, anims:{idle:'idle',pop:'idle'} },   // sprite réduit de moitié (horde)
  bat:   { folder:'bat', dir:'south', emoji:'🦇', size:54, anims:{fly:'fly',pop:'fly'} },
  fairy: { folder:null, dir:'south', emoji:'🧚', size:46, anims:{idle:'idle'} }
};
const spriteCache={};   // charKey -> {static:Image|null, anims:{logical:[Image,...]}} | null
function preloadImg(src){ const im=new Image(); im.src=src; return im; }
/* génère une liste de chemins de frames : seq('animations/idle/south/frame_',9,3,0) -> [...frame_000.png..frame_008.png] */
function seq(prefix,count,pad,start){ const out=[]; start=start||0; for(let i=0;i<count;i++){ out.push(prefix+String(start+i).padStart(pad,'0')+'.png'); } return out; }
/* Manifeste des frames EMBARQUÉ dans le JS : indispensable pour que les sprites s'affichent
   quand le jeu est ouvert en local (file://), car fetch(metadata.json) y est bloqué par le navigateur. */
const SPRITE_FRAMES={
  a_chunky_red_horned_demon:{
    rotation:'rotations/south.png',
    anims:{
      idle:           seq('animations/idle/south/frame_',9,3,0),
      roar:           seq('animations/roar/south/frame_',9,3,0),
      taking_hit:     seq('animations/taking_hit/south/frame_',9,3,0),
      fire_begin:     seq('animations/fire_begin/south/frame_',13,3,0),
      channeling_fire:seq('animations/channeling_fire/south/frame_',4,3,0),
      horde_cast:     seq('animations/horde_cast/south/frame_',9,3,0),
      death:          seq('animations/death/south/frame_',13,3,0),
      boucle_roar:    seq('animations/boucle_roar/boucle_roar_',3,4,1),
      channel_horde:  seq('animations/channel_horde/channel_horde_',3,4,1)
    }
  },
  // monstres de la horde : dossiers de frames « à plat » (pas de rotation), animation en boucle
  green_slime:{ anims:{ idle: seq('frame_',9,3,0) } },                 // frame_000…frame_008
  bat:        { anims:{ fly:  seq('untitled_',9,4,1) } }               // untitled_0001…untitled_0009
};
function loadChar(key){
  const c=CHARS[key];
  if(!c || !c.folder) return Promise.resolve(null);
  if(spriteCache[key]!==undefined) return Promise.resolve(spriteCache[key]);
  // 1) chemin embarqué (marche en file:// comme en http) — aucune requête réseau
  const data=SPRITE_FRAMES[c.folder];
  if(data){
    const base=SPRITE_ROOT+c.folder+'/';
    const out={static:data.rotation?preloadImg(base+data.rotation):null, anims:{}};
    for(const logical in c.anims){
      const list=data.anims[c.anims[logical]];   // c.anims[logical] = nom physique exact de l'anim
      if(list && list.length) out.anims[logical]=list.map(p=>preloadImg(base+p));
    }
    spriteCache[key]=out; return Promise.resolve(out);
  }
  // 2) repli : lecture du metadata.json (seulement si servi en http)
  return fetch(SPRITE_ROOT+c.folder+'/metadata.json')
    .then(r=>{ if(!r.ok) throw 0; return r.json(); })
    .then(json=>{
      const st=json.states && json.states[0]; if(!st) throw 0;
      const base=SPRITE_ROOT+c.folder+'/';
      const out={static:null, anims:{}};
      const rot=st.frames && st.frames.rotations;
      if(rot && rot[c.dir]) out.static=preloadImg(base+rot[c.dir]);
      const anims=(st.frames && st.frames.animations)||{};
      const has=k=>anims[k] && anims[k][c.dir] && anims[k][c.dir].length;
      for(const logical in c.anims){
        const kw=c.anims[logical].toLowerCase();
        let chosen=null;
        for(const animKey in anims){ if(animKey.toLowerCase()===kw && has(animKey)){ chosen=animKey; break; } }   // correspondance exacte d'abord
        if(!chosen) for(const animKey in anims){ if(animKey.toLowerCase().indexOf(kw)>=0 && has(animKey)){ chosen=animKey; break; } }
        if(chosen) out.anims[logical]=anims[chosen][c.dir].map(p=>preloadImg(base+p));
      }
      spriteCache[key]=out; return out;
    })
    .catch(()=>{ spriteCache[key]=null; return null; });
}
function preloadChars(){ return Promise.all(Object.keys(CHARS).map(k=>loadChar(k))); }

function makeActor(key, extraClass){
  const c=CHARS[key];
  const el=document.createElement('div'); el.className='actor '+(extraClass||'');
  el.style.width=c.size+'px'; el.style.height=c.size+'px';
  el.innerHTML='<span class="actor-emoji" style="font-size:'+Math.round(c.size*0.74)+'px">'+c.emoji+'</span><img class="actor-img" alt="" draggable="false">';
  el.addEventListener('dragstart',e=>e.preventDefault());
  return { key, el, img:el.querySelector('.actor-img'), emoji:el.querySelector('.actor-emoji'),
           anim:null, frames:null, fi:0, t:0, fps:12, loop:true, then:null, _to:0 };
}
function actorPlay(a, logical, opts){
  opts=opts||{};
  const loop = opts.loop!==undefined ? opts.loop : true;
  const then = opts.then||null;
  a.anim=logical; a.loop=loop; a.then=then; a.fps=opts.fps||12;
  const sp=spriteCache[a.key];
  const frames = sp && sp.anims && sp.anims[logical];
  if(a._to){ clearTimeout(a._to); a._to=0; }
  if(frames && frames.length){
    a.frames=frames; a.fi=0; a.t=0;
    a.img.style.display='block'; a.emoji.style.display='none'; a.img.src=frames[0].src;
  } else {
    a.frames=null;
    if(sp && sp.static && (logical==='idle'||logical==='fly')){
      a.img.style.display='block'; a.emoji.style.display='none'; a.img.src=sp.static.src;
    } else {
      a.img.style.display='none'; a.emoji.style.display='flex';
    }
    a.emoji.className='actor-emoji emo-'+logical;
    a.emoji.style.fontSize=Math.round(CHARS[a.key].size*0.74)+'px';
    if(!loop && then){ a._to=setTimeout(()=>{ if(a.anim===logical) actorPlay(a, then, {loop:true}); }, opts.dur||450); }
  }
}
function stepActor(a, dt){
  if(!a.frames) return;
  a.t+=dt; const spf=1/(a.fps||12);
  while(a.t>=spf){
    a.t-=spf; a.fi++;
    if(a.fi>=a.frames.length){
      if(a.loop){ a.fi=0; }
      else { const then=a.then; a.frames=null; if(then) actorPlay(a, then, {loop:true}); return; }
    }
    if(a.frames) a.img.src=a.frames[a.fi].src;
  }
}

/* lecteur de frames générique pour un <img> (objets non-acteurs : chaudron, boule de feu) */
function playImgFrames(img, frames, opts){
  opts=opts||{}; const fps=opts.fps||10, loop=!!opts.loop;
  if(img._frT){ clearInterval(img._frT); img._frT=0; }
  let i=0; img.src=frames[0];
  img._frT=setInterval(()=>{
    i++;
    if(i>=frames.length){
      if(loop){ i=0; }
      else { clearInterval(img._frT); img._frT=0; if(opts.then) img.src=opts.then; if(opts.onEnd) opts.onEnd(); return; }
    }
    img.src=frames[i];
  }, 1000/fps);
}
function stopImgFrames(img){ if(img&&img._frT){ clearInterval(img._frT); img._frT=0; } }

function bossLoop(ts){
