<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Traitement de texte — Atelier informatique</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#22303f; --muted:#5a6b7b;
    --blue:#2563eb; --blue-d:#1d4ed8;
    --amber:#f59e0b; --amber-d:#b45309;
    --green:#16a34a; --green-d:#15803d;
    --red:#ef4444; --red-d:#b91c1c;
    --paper:#ffffff; --line:#d7e0ea; --line-2:#e7eef6;
    --shell:#e9eff7; --canvas:#dde6f1;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:"Nunito",system-ui,sans-serif;color:var(--ink);
    background:var(--shell);min-height:100vh;display:flex;flex-direction:column;
  }
  button{font-family:inherit;cursor:pointer;}
  .display{font-family:"Fredoka",sans-serif;}

  /* ---------- Top bar ---------- */
  .topbar{
    background:#fff;border-bottom:2px solid var(--line);
    display:flex;align-items:center;gap:16px;padding:10px 18px;flex-wrap:wrap;
  }
  .back{
    display:inline-flex;align-items:center;gap:7px;text-decoration:none;color:var(--blue-d);
    font-weight:800;font-size:.98rem;padding:8px 12px;border-radius:10px;
  }
  .back:hover{background:#eef4ff;}
  .topbar h1{font-family:"Fredoka",sans-serif;font-weight:600;font-size:1.15rem;margin:0;flex:1;}
  .topbar h1 .dot{color:var(--blue);}
  .step-count{font-weight:800;color:var(--muted);font-size:.95rem;}
  .reset-btn{
    border:2px solid var(--line);background:#fff;color:var(--muted);font-weight:700;
    border-radius:10px;padding:7px 11px;font-size:.85rem;
  }
  .reset-btn:hover{border-color:var(--red);color:var(--red-d);}

  /* ---------- Progress ---------- */
  .progress-wrap{background:#fff;padding:8px 18px 14px;border-bottom:2px solid var(--line);}
  .track{display:flex;gap:6px;align-items:center;max-width:1000px;margin:0 auto;}
  .seg{position:relative;flex:1;height:14px;border-radius:8px;background:var(--line-2);overflow:visible;}
  .seg.done{background:var(--green);}
  .seg.current{background:var(--blue);box-shadow:0 0 0 3px #bcd2ff;}
  .seg.milestone{flex:1;height:20px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1rem;background:#fdebc4;}
  .seg.milestone.done{background:#facc15;}
  .seg.milestone.current{background:var(--amber);box-shadow:0 0 0 3px #fde2a8;}
  .seg.clickable{cursor:pointer;transition:transform .12s ease, filter .12s ease, box-shadow .12s ease;}
  .seg.clickable:hover{filter:brightness(1.07);transform:translateY(-2px);}
  .seg.clickable.done:hover{box-shadow:0 0 0 3px #b9eccd;}
  /* étape « en cours » à laquelle on peut revenir quand on révise un exercice précédent */
  .seg.return{box-shadow:0 0 0 3px rgba(245,158,11,.55);animation:segReturn 1.1s ease-in-out infinite;}
  @keyframes segReturn{0%,100%{box-shadow:0 0 0 3px rgba(245,158,11,.55);}50%{box-shadow:0 0 0 7px rgba(245,158,11,.12);}}
  /* exercice actuellement révisé */
  .seg.viewing{box-shadow:0 0 0 3px #bcd2ff;}

  /* ---------- Mission banner ---------- */
  .banner{
    max-width:1000px;margin:12px auto 0;width:calc(100% - 36px);
    background:#fff;border:2px solid var(--line);border-left:7px solid var(--blue);
    border-radius:14px;padding:12px 16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;
  }
  .banner.test{border-left-color:var(--amber);}
  .banner.replay{border-left-color:var(--green);}
  .banner .b-emoji{font-size:1.8rem;line-height:1;}
  .banner .b-txt{flex:1;min-width:200px;}
  .banner .b-title{font-family:"Fredoka",sans-serif;font-weight:600;font-size:1.08rem;}
  .banner .b-sub{color:#3a4a59;font-weight:700;font-size:1rem;margin-top:4px;line-height:1.45;}
  .banner .b-goal-label{font-weight:800;color:var(--blue-d);margin-right:3px;}
  .banner.test .b-goal-label{color:var(--amber-d);}
  .mini-task{display:inline-block;background:#fff6e6;border:1.5px solid #f6d68a;color:#7a5300;
    border-radius:999px;padding:3px 11px;margin:5px 5px 0 0;font-size:.9rem;font-weight:700;line-height:1.25;}
  .mini-task b{color:var(--amber-d);font-weight:800;}
  .banner .b-btn{
    border:2px solid var(--line);background:#f5f9ff;color:var(--blue-d);font-weight:800;
    border-radius:10px;padding:8px 13px;font-size:.9rem;white-space:nowrap;
  }
  .banner .b-btn:hover{border-color:var(--blue);}
  .banner .b-btn.ghost{background:#fff;color:var(--muted);}

  /* ---------- Editor ---------- */
  .editor-wrap{max-width:1000px;margin:12px auto;width:calc(100% - 36px);
    background:#fff;border:2px solid var(--line);border-radius:16px;overflow:hidden;
    box-shadow:0 18px 40px -28px rgba(34,48,63,.5);}
  .toolbar{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:9px 12px;
    background:linear-gradient(#fbfcfe,#eef3fa);border-bottom:2px solid var(--line);}
  .tgroup{display:flex;align-items:center;gap:5px;}
  .divider{width:2px;height:30px;background:var(--line);margin:0 5px;border-radius:2px;}
  .t-btn{
    min-width:38px;height:38px;padding:0 9px;border:2px solid #d4ddea;background:#fff;border-radius:9px;
    font-size:1.05rem;font-weight:700;color:var(--ink);display:inline-flex;align-items:center;justify-content:center;
    transition:border-color .12s,background .12s,transform .08s;
  }
  .t-btn:hover{background:#f1f6ff;border-color:#b9cbe6;}
  .t-btn:active{transform:translateY(1px);}
  .t-btn:disabled{opacity:.38;cursor:default;background:#fff;border-color:#e2e8f0;}
  .t-btn:disabled:hover{background:#fff;border-color:#e2e8f0;}
  .t-btn:focus-visible, .t-sel:focus-visible{outline:3px solid var(--blue);outline-offset:2px;}
  .t-btn.bold{font-weight:800;}
  .t-btn.italic{font-style:italic;font-family:Georgia,serif;}
  .t-btn.under{text-decoration:underline;}
  .t-btn.active{background:#dbeafe;border-color:var(--blue);color:var(--blue);box-shadow:inset 0 2px 5px -2px rgba(37,99,235,.5);}
  .t-btn.active:hover{background:#cfe0ff;}
  .t-sel.active{border-color:var(--blue);background:#eff5ff;color:var(--blue);}
  .t-btn svg{width:20px;height:20px;}
  .t-sel{height:38px;border:2px solid #d4ddea;border-radius:9px;background:#fff;font-family:inherit;
    font-weight:700;font-size:.95rem;color:var(--ink);padding:0 8px;cursor:pointer;}
  .t-label{font-size:.7rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-right:2px;}
  .color-wrap{position:relative;}
  .t-btn.color .bar{display:block;width:20px;height:5px;border-radius:2px;margin-top:-3px;}
  .swatches{position:absolute;top:46px;left:0;z-index:30;background:#fff;border:2px solid var(--line);
    border-radius:12px;padding:10px;display:none;grid-template-columns:repeat(3,1fr);gap:8px;
    box-shadow:0 14px 30px -16px rgba(34,48,63,.5);}
  .swatches.open{display:grid;}
  .swatch{width:34px;height:34px;border-radius:8px;border:2px solid #fff;box-shadow:0 0 0 2px var(--line);cursor:pointer;}
  .swatch:hover{transform:scale(1.08);}

  /* glow on hint */
  .glow{position:relative;z-index:25;animation:glowpulse 1s ease-in-out infinite;border-color:var(--amber)!important;}
  @keyframes glowpulse{0%,100%{box-shadow:0 0 0 0 rgba(245,158,11,.55);}50%{box-shadow:0 0 0 9px rgba(245,158,11,0);}}

  .canvas{background:var(--canvas);padding:18px 16px;display:flex;justify-content:center;}
  .page{
    background:#fff;width:100%;max-width:640px;min-height:200px;border-radius:6px;
    box-shadow:0 8px 26px -14px rgba(34,48,63,.55);padding:30px 40px;
  }
  #editor{outline:none;-webkit-user-select:text;user-select:text;caret-color:var(--blue);}
  #editor .para{white-space:pre-wrap;line-height:1.7;margin:0 0 12px;word-wrap:break-word;}
  #editor .para:last-child{margin-bottom:0;}
  #editor .ch{border-radius:2px;}
  #editor .para.li{padding-top:1px;padding-bottom:1px;}
  #editor .li-marker{display:inline-block;min-width:1.4em;margin-right:.35em;text-indent:0;
    font-weight:700;color:var(--blue-d);user-select:none;-webkit-user-select:none;}
  #editor ::selection{background:#bcd4ff;}
  #editor .ch::selection{background:#bcd4ff;}
  #editor .ch.flash-bad{animation:flashbad 1.5s ease;}
  @keyframes flashbad{0%,100%{background:transparent;}20%,60%{background:#ffd0d0;}}

  /* ---------- Action bar ---------- */
  .actions{max-width:1000px;margin:10px auto 22px;width:calc(100% - 36px);display:flex;gap:12px;justify-content:space-between;flex-wrap:wrap;}
  .btn{border:none;border-radius:13px;padding:14px 22px;font-weight:800;font-size:1.05rem;display:inline-flex;align-items:center;gap:9px;}
  .btn:active{transform:translateY(1px);}
  .btn-hint{background:#fff;color:var(--amber-d);border:2px solid var(--amber);}
  .btn-hint:hover{background:#fff8ec;}
  .btn-restart{background:#fff;color:var(--muted);border:2px solid var(--line);font-size:.95rem;padding:12px 16px;}
  .btn-restart:hover{border-color:var(--red);color:var(--red-d);}
  .btn-validate{background:var(--green);color:#fff;box-shadow:0 10px 22px -12px rgba(22,163,74,.9);}
  .btn-validate:hover{background:var(--green-d);}

  /* ---------- Modal ---------- */
  .overlay{position:fixed;inset:0;background:rgba(20,30,42,.55);backdrop-filter:blur(2px);
    display:none;align-items:center;justify-content:center;z-index:100;padding:18px;}
  .overlay.open{display:flex;}
  .modal{background:#fff;border-radius:22px;max-width:520px;width:100%;padding:22px 26px 20px;
    box-shadow:0 30px 70px -30px rgba(0,0,0,.6);animation:pop .22s ease;max-height:92vh;overflow:auto;}
  @keyframes pop{from{transform:scale(.92);opacity:0;}to{transform:scale(1);opacity:1;}}
  .modal .m-emoji{font-size:2.5rem;line-height:1;display:block;margin-bottom:4px;}
  .modal h2{font-family:"Fredoka",sans-serif;font-weight:600;font-size:1.45rem;margin:0 0 9px;}
  .modal p{font-size:1.03rem;line-height:1.5;margin:0 0 12px;color:var(--ink);}
  .modal .kicker{font-weight:800;letter-spacing:.05em;text-transform:uppercase;font-size:.78rem;color:var(--blue-d);}
  .modal.test-modal .kicker{color:var(--amber-d);}
  .howto{background:#f4f8ff;border:2px solid #dbe7ff;border-radius:14px;padding:12px 14px;margin:0 0 14px;}
  .howto .h-head{font-weight:800;margin:0 0 6px;color:var(--blue-d);}
  .howto ol{margin:0;padding-left:22px;}
  .howto li{margin:5px 0;font-size:1.0rem;line-height:1.4;}
  .howto.test{background:#fffaf0;border-color:#fbe2b0;}
  .howto.test .h-head{color:var(--amber-d);}
  .tasklist{list-style:none;margin:0;padding:0;}
  .tasklist li{display:flex;gap:10px;align-items:flex-start;margin:9px 0;font-size:1.05rem;}
  .tasklist li::before{content:"▢";color:var(--amber-d);font-weight:800;}
  .modal .m-actions{display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap;margin-top:6px;
    position:sticky;bottom:-20px;background:#fff;padding-top:8px;}
  .m-btn{border:none;border-radius:13px;padding:13px 22px;font-weight:800;font-size:1.05rem;}
  .m-btn.primary{background:var(--blue);color:#fff;}
  .m-btn.primary:hover{background:var(--blue-d);}
  .m-btn.primary.test{background:var(--amber);}
  .m-btn.primary.test:hover{background:var(--amber-d);}
  .m-btn.primary.green{background:var(--green);}
  .m-btn.primary.green:hover{background:var(--green-d);}
  .m-btn.ghost{background:#eef2f7;color:var(--muted);}
  .m-btn.ghost:hover{background:#e2e8f0;}

  .modal.good{border-top:8px solid var(--green);}
  .modal.bad{border-top:8px solid var(--red);}
  .modal.warn{border-top:8px solid var(--amber);}

  /* replay panel */
  .replay-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:6px 0 18px;}
  .replay-card{display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center;
    border:2px solid var(--line);background:#fbfdff;border-radius:14px;padding:14px 10px;font-weight:800;color:var(--ink);}
  .replay-card .rc-emoji{font-size:2rem;}
  .replay-card .rc-title{font-size:.95rem;line-height:1.2;}
  .replay-card:hover{border-color:var(--green);background:#f1fbf4;transform:translateY(-2px);}

  /* hint popup pointer text */
  .hint-target{font-weight:800;color:var(--amber-d);}

  /* confetti */
  .confetti{position:fixed;inset:0;pointer-events:none;z-index:99;overflow:hidden;}
  .confetti i{position:absolute;top:-10px;width:10px;height:14px;opacity:.9;animation:fall linear forwards;}
  @keyframes fall{to{transform:translateY(110vh) rotate(540deg);}}

  /* toast */
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;font-weight:700;padding:12px 18px;border-radius:12px;
    opacity:0;transition:.25s;z-index:120;max-width:90%;text-align:center;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* ---------- Intro de niveau : nouveaux outils ---------- */
  .newtools{list-style:none;margin:0 0 16px;padding:0;display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .newtools li{display:flex;align-items:center;gap:9px;background:#f4f8ff;border:2px solid #dbe7ff;
    border-radius:12px;padding:9px 11px;font-weight:700;font-size:.95rem;color:var(--ink);}
  .ni-glyph{display:inline-flex;align-items:center;justify-content:center;min-width:30px;height:30px;
    background:#fff;border:2px solid #c7d8f2;border-radius:8px;font-weight:800;color:var(--blue-d);flex:0 0 auto;}

  /* ---------- Sélecteur de niveaux ---------- */
  .lvl-grid{display:grid;gap:12px;margin:6px 0 18px;}
  .lvl-card{display:grid;grid-template-columns:auto 1fr;grid-template-rows:auto auto;column-gap:14px;align-items:center;
    text-align:left;border:2px solid var(--line);background:#fbfdff;border-radius:14px;padding:14px 16px;color:var(--ink);}
  .lvl-card .lc-badge{grid-row:1 / span 2;font-size:1.6rem;width:44px;height:44px;display:flex;align-items:center;justify-content:center;
    background:#eef4ff;border-radius:12px;}
  .lvl-card .lc-n{font-family:"Fredoka",sans-serif;font-weight:700;font-size:1.05rem;}
  .lvl-card .lc-t{color:var(--muted);font-weight:700;font-size:.9rem;}
  .lvl-card:not(.locked):hover{border-color:var(--blue);background:#f1f6ff;transform:translateY(-2px);}
  .lvl-card.current{border-color:var(--green);background:#f1fbf4;}
  .lvl-card.current .lc-badge{background:#d8f5e3;}
  .lvl-card.locked{opacity:.6;cursor:not-allowed;filter:grayscale(.3);}

  /* ---------- Animation cadenas (déblocage) ---------- */
  .lock-stage{position:fixed;inset:0;z-index:130;display:flex;align-items:center;justify-content:center;
    background:rgba(20,30,42,.72);backdrop-filter:blur(3px);transition:opacity .35s;}
  .lock-stage.fade{opacity:0;}
  .lock-box{position:relative;display:flex;flex-direction:column;align-items:center;gap:10px;animation:lockIn .35s ease;}
  .lock-emoji{position:relative;z-index:2;font-size:6rem;line-height:1;filter:drop-shadow(0 14px 24px rgba(0,0,0,.4));}
  .lock-burst{position:absolute;left:50%;top:40px;width:64px;height:64px;margin:-32px 0 0 -32px;border-radius:50%;
    border:7px solid #ffd76a;opacity:0;pointer-events:none;z-index:1;}
  .lock-burst.go{animation:lockBurst .7s ease-out forwards;}
  @keyframes lockBurst{0%{opacity:.95;transform:scale(.3);}100%{opacity:0;transform:scale(6);}}
  .lock-cap{font-family:"Fredoka",sans-serif;font-weight:700;font-size:1.5rem;color:#fff;
    background:var(--amber);padding:6px 20px;border-radius:999px;box-shadow:0 8px 20px -8px rgba(0,0,0,.6);}
  @keyframes lockIn{from{transform:scale(.4);opacity:0;}to{transform:scale(1);opacity:1;}}
  .lock-box.shake{animation:lockShake .42s ease-in-out 3;}
  @keyframes lockShake{0%,100%{transform:rotate(0) translateX(0);}20%{transform:rotate(-9deg) translateX(-6px);}
    40%{transform:rotate(8deg) translateX(6px);}60%{transform:rotate(-6deg) translateX(-4px);}80%{transform:rotate(5deg) translateX(4px);}}
  .lock-box.pop{animation:lockPop .6s cubic-bezier(.18,.9,.32,1.4);}
  @keyframes lockPop{0%{transform:scale(1);}35%{transform:scale(1.35) rotate(-6deg);}100%{transform:scale(1.12) rotate(0);}}

  @media (max-width:560px){
    .page{padding:28px 22px;}
    .btn{flex:1;justify-content:center;}
    .replay-grid{grid-template-columns:1fr;}
  }
  @media (prefers-reduced-motion: reduce){
    .glow{animation:none;border-color:var(--amber)!important;box-shadow:0 0 0 5px rgba(245,158,11,.4);}
    .confetti i{animation:none;display:none;}
    .modal{animation:none;}
    .lock-box,.lock-box.shake,.lock-box.pop{animation:none;}
    .lock-burst,.seg.return{animation:none;}
  }
</style>
</head>
<body>
  <div class="topbar">
    <a class="back" href="index.html">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M11 6l-6 6 6 6"/></svg>
      Accueil
    </a>
    <h1 class="display" id="lvlTitle">Traitement de texte <span class="dot">·</span> les bases</h1>
    <span class="step-count" id="stepCount">Niveau 1 · Étape 1 / 9</span>
    <button class="reset-btn" id="levelBtn" title="Voir les niveaux / changer de niveau">🗺️ Niveau 1/3</button>
    <button class="reset-btn" id="resetBtn" title="Recommencer ce niveau">↺ Recommencer</button>
  </div>

  <div class="progress-wrap">
    <div class="track" id="track"></div>
  </div>

  <div class="banner" id="banner">
    <span class="b-emoji" id="bEmoji">📝</span>
    <div class="b-txt">
      <div class="b-title" id="bTitle">Mission</div>
      <div class="b-sub" id="bSub"></div>
    </div>
    <button class="b-btn" id="seeMission">📋 Voir la mission</button>
    <button class="b-btn ghost" id="backToTest" style="display:none">← Revenir au test</button>
  </div>

  <div class="editor-wrap">
    <div class="toolbar" id="toolbar">
      <div class="tgroup">
        <button class="t-btn" id="btn-undo" title="Annuler (Ctrl+Z)">↶</button>
        <button class="t-btn" id="btn-redo" title="Rétablir (Ctrl+Y)">↷</button>
      </div>
      <span class="divider"></span>
      <div class="tgroup">
        <span class="t-label">Police</span>
        <select class="t-sel" id="sel-font" title="Police d'écriture">
          <option value="Arial">Arial</option>
          <option value="Georgia">Georgia</option>
          <option value="Times New Roman">Times New Roman</option>
          <option value="Comic Sans MS">Comic Sans MS</option>
          <option value="Verdana">Verdana</option>
        </select>
        <select class="t-sel" id="sel-size" title="Taille du texte">
          <option value="12">12</option>
          <option value="14">14</option>
          <option value="16" selected>16</option>
          <option value="18">18</option>
          <option value="22">22</option>
          <option value="28">28</option>
          <option value="36">36</option>
        </select>
      </div>
      <span class="divider"></span>
      <div class="tgroup">
        <button class="t-btn bold" id="btn-bold" title="Gras">G</button>
        <button class="t-btn italic" id="btn-italic" title="Italique">I</button>
        <button class="t-btn under" id="btn-underline" title="Souligné">S</button>
      </div>
      <span class="divider"></span>
      <div class="tgroup color-wrap">
        <button class="t-btn color" id="btn-color" title="Couleur du texte">A<span class="bar" id="colorBar" style="background:#2563eb"></span></button>
        <div class="swatches" id="swatches"></div>
      </div>
      <span class="divider"></span>
      <div class="tgroup">
        <button class="t-btn" id="btn-align-left" title="Aligner à gauche"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M3 5h18M3 10h11M3 15h18M3 20h11"/></svg></button>
        <button class="t-btn" id="btn-align-center" title="Centrer"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M3 5h18M6 10h12M3 15h18M6 20h12"/></svg></button>
      </div>

      <!-- ===== NIVEAU 2 ===== -->

<script>
/* =========================================================
   1. DOCUMENT MODEL  (verified logic)
   ========================================================= */
let PARAS = [];          // texte du niveau courant (réaffecté par loadLevel)
let FULL = '';
const DEFAULT = {
  b:false,i:false,u:false,size:16,color:'#22303f',font:'Arial',align:'left',
  /* attributs paragraphe (Niveaux 2 & 3) — valeurs neutres par défaut */
  lh:1, spb:0, spa:0, indl:0, indr:0, ind1:0, hl:'transparent',
  list:'none', lvl:0, bul:'disc'
};

function buildDoc(){
  const arr=[];
  for(const ch of FULL){ arr.push(Object.assign({c:ch}, DEFAULT)); }
  return arr;
}
function clone(d){ return d.map(o=>Object.assign({},o)); }
function paraRange(idx){
  let start=0,p=0;
  for(let i=0;i<FULL.length;i++){
    if(p===idx && FULL[i]==='\n') return [start,i];
    if(FULL[i]==='\n'){ p++; if(p===idx) start=i+1; }
  }
  return [start, FULL.length];
}
function paraIndexOf(i){ let p=0; for(let k=0;k<i;k++){ if(FULL[k]==='\n') p++; } return p; }
function findWord(word, occ=1){
  let from=0,count=0,idx;
  while((idx=FULL.indexOf(word,from))!==-1){ count++; if(count===occ) return [idx, idx+word.length]; from=idx+1; }
  throw new Error('mot introuvable: '+word);
}
function rangeOf(op){
  if(op.range==='title') return paraRange(0);
  if(typeof op.para==='number') return paraRange(op.para);
  if(op.word) return findWord(op.word, op.occ||1);
  return op.range;
}
// types d'op « paragraphe » : appliqués à toute la plage du paragraphe → clé du modèle
const PARA_OPS = {align:'align', lh:'lh', spb:'spb', spa:'spa', indl:'indl', indr:'indr',
                  ind1:'ind1', list:'list', bullet:'bul'};
const LEVEL_BULLETS=['disc','circle','square'];   // puce automatique selon le niveau d'imbrication
function applyOps(d, ops){
  ops.forEach(op=>{
    const [a,b]=rangeOf(op);
    // niveau de liste : change aussi automatiquement le style de puce (comme Word / LibreOffice)
    if(op.type==='listlevel'){
      for(let k=a;k<b;k++){ d[k].lvl=op.value; if(d[k].list==='bullet') d[k].bul=LEVEL_BULLETS[op.value]||'disc'; }
      return;
    }
    const pkey=PARA_OPS[op.type];
    if(pkey){ for(let k=a;k<b;k++) d[k][pkey]=op.value; return; }
    for(let k=a;k<b;k++){
      const ch=d[k];
      if(op.type==='bold') ch.b=true;
      else if(op.type==='italic') ch.i=true;
      else if(op.type==='underline') ch.u=true;
      else if(op.type==='size') ch.size=op.value;
      else if(op.type==='color') ch.color=op.value;
      else if(op.type==='font') ch.font=op.value;
      else if(op.type==='pbg') ch.hl=op.value;   // surlignage = vrai surligneur, par caractère
    }
  });
  return d;
}
function aeq(x,y){ return x.b===y.b&&x.i===y.i&&x.u===y.u&&x.size===y.size&&x.color===y.color&&x.font===y.font&&x.align===y.align
  &&x.lh===y.lh&&x.spb===y.spb&&x.spa===y.spa&&x.indl===y.indl&&x.indr===y.indr&&x.ind1===y.ind1&&x.hl===y.hl
  &&x.list===y.list&&x.lvl===y.lvl&&x.bul===y.bul; }
function isSpace(c){ return c===' '; }
function evaluate(start, goal, cur){
  const missing=[], extra=[]; let startedTask=false;
  for(let i=0;i<cur.length;i++){
    if(cur[i].c==='\n' || isSpace(cur[i].c)) continue; // newline + space tolerance
    const g=goal[i], s=start[i], c=cur[i];
    const required=!aeq(g,s);
    if(required){ if(!aeq(c,s)) startedTask=true; if(!aeq(c,g)) missing.push(i); }
    else { if(!aeq(c,s)) extra.push(i); }
  }
  let status;
  if(missing.length===0 && extra.length===0) status='success';
  else if(missing.length===0) status='extra';
  else status='error';
  return {status, missing, extra, startedTask};
}

// Construit les STEPS d'un jeu de définitions (chaînage des docs start/goal)
let STEPS=[]; let MISSIONS={};
function buildSteps(defs){
  const steps=[], missions={};
  const base=buildDoc(); let prevGoal=clone(base);
  defs.forEach(def=>{
    const from = def.kind==='test' ? clone(base) : clone(prevGoal);
    const goal = applyOps(clone(from), def.ops);
    const step = Object.assign({}, def, {startDoc:from, goalDoc:goal});
    steps.push(step);
    if(def.kind==='mission') missions[def.id]=step;
    prevGoal = goal;
  });
  return {steps, missions};
}

/* =========================================================
   4. RENDER
   ========================================================= */
function render(){
  editor.innerHTML='';
  let counters=[];                    // compteurs de numérotation par niveau d'imbrication
  let para=document.createElement('div'); para.className='para';
  let firstCharOfPara=null;
  function flush(){
    if(firstCharOfPara===null){ para.style.textAlign='left'; editor.appendChild(para); counters=[]; return; }
    const a=doc[firstCharOfPara];
    para.style.textAlign=a.align;
    para.style.lineHeight=a.lh;
    para.style.marginTop=a.spb+'px';
    para.style.marginBottom=(a.spa||12)+'px';
    para.style.paddingRight=a.indr+'px';
    para.style.textIndent=a.ind1+'px';
    let padLeft=a.indl;
    if(a.list!=='none'){
      para.classList.add('li');
      padLeft += 6 + a.lvl*26;
      const mk=document.createElement('span'); mk.className='li-marker'; mk.setAttribute('contenteditable','false');
      if(a.list==='number'){ counters[a.lvl]=(counters[a.lvl]||0)+1; counters.length=a.lvl+1; mk.textContent=counters[a.lvl]+'.'; }
      else { counters=[]; mk.textContent=(BULLETS[a.bul]||'•'); }
      para.insertBefore(mk, para.firstChild);
    } else {
      counters=[];
    }
    para.style.paddingLeft=padLeft+'px';
    editor.appendChild(para);
  }
  for(let i=0;i<doc.length;i++){
    if(doc[i].c==='\n'){ flush(); para=document.createElement('div'); para.className='para'; firstCharOfPara=null; continue; }
    const sp=document.createElement('span'); sp.className='ch'; sp.dataset.i=i; sp.textContent=doc[i].c;
    const a=doc[i];
    sp.style.fontWeight=a.b?'700':'400';
    sp.style.fontStyle=a.i?'italic':'normal';
    sp.style.textDecoration=a.u?'underline':'none';
    sp.style.fontSize=a.size+'px';
    sp.style.color=a.color;
    sp.style.fontFamily=a.font;
    sp.style.background=(a.hl && a.hl!=='transparent')?a.hl:'';   // surlignage par caractère
    if(firstCharOfPara===null) firstCharOfPara=i;
    para.appendChild(sp);
  }
  flush();
}

/* =========================================================
   5. CURSEUR & SÉLECTION (modèle « traitement de texte »)
   ========================================================= */
const colorBar=document.getElementById('colorBar');
function spanOf(i){ return editor.querySelector('.ch[data-i="'+i+'"]'); }
function paraAlign(p){ if(p==null||p<0) return 'left'; const [s]=paraRange(p); return (doc[s]&&doc[s].align)||'left'; }

/* DOM (node,offset) -> position curseur dans le modèle (0..doc.length), index du caractère à droite */
function pointToCaret(node, offset){
  if(node.nodeType===3){
    const sp=node.parentElement;
    if(sp && sp.classList && sp.classList.contains('ch')){ const i=+sp.dataset.i; return offset<=0? i : i+1; }
    node = sp || node;
  }
  if(node.nodeType===1){
    const el=node;
    if(el.classList && el.classList.contains('ch')){ const i=+el.dataset.i; return offset<=0? i : i+1; }
    if(el.classList && el.classList.contains('para')){
      const kids=el.querySelectorAll('.ch');
      if(!kids.length) return null;
      // l'offset compte tous les enfants (marqueur de liste inclus) -> on le ramène aux .ch
      const hasMarker = el.firstChild && el.firstChild.classList && el.firstChild.classList.contains('li-marker');
      let off = offset - (hasMarker?1:0);
      if(off<=0) return +kids[0].dataset.i;
      if(off>=kids.length) return (+kids[kids.length-1].dataset.i)+1;
      return +kids[off].dataset.i;
    }
    if(el===editor){
      const paras=el.querySelectorAll('.para');
      if(!paras.length) return 0;
      if(offset<=0){ const f=paras[0].querySelector('.ch'); return f? +f.dataset.i : 0; }
      if(offset>=paras.length){ const last=paras[paras.length-1].querySelectorAll('.ch'); return last.length? (+last[last.length-1].dataset.i)+1 : doc.length; }
      const f=paras[offset].querySelector('.ch'); return f? +f.dataset.i : 0;
    }
  }
  return null;
}

/* Lit la sélection native -> curSel ({type:'caret',pos} ou {type:'range',a,b}) */
function readDomSelection(){
  const s=window.getSelection();
  if(!s || s.rangeCount===0) return;
  const r=s.getRangeAt(0);
  if(!editor.contains(r.commonAncestorContainer)) return;
  const p1=pointToCaret(r.startContainer, r.startOffset);
  const p2=pointToCaret(r.endContainer, r.endOffset);
  if(p1==null || p2==null) return;
  const a=Math.min(p1,p2), b=Math.max(p1,p2);
  curSel = (a===b) ? {type:'caret', pos:a} : {type:'range', a, b};
}

/* Position curseur (modèle) -> [node, offset] pour reconstruire la sélection native */
function caretBoundary(pos){
  let sp=(pos<doc.length)? spanOf(pos) : null;
  if(sp) return [sp.firstChild||sp, 0];
  let j=pos-1;
  while(j>=0 && !spanOf(j)) j--;
  if(j>=0){ const psp=spanOf(j); return [psp.firstChild||psp, 1]; }
  return [editor, 0];
}
function restoreDomSelection(){
  if(!curSel) return;
  const s=window.getSelection(); if(!s) return;
  const r=document.createRange();
  if(curSel.type==='caret'){
    const [n,o]=caretBoundary(curSel.pos); r.setStart(n,o); r.setEnd(n,o);
  }else{
    const [n1,o1]=caretBoundary(curSel.a); const [n2,o2]=caretBoundary(curSel.b);
    r.setStart(n1,o1); r.setEnd(n2,o2);
  }
  try{ s.removeAllRanges(); s.addRange(r); }catch(e){}
}

document.addEventListener('selectionchange', ()=>{
  const s=window.getSelection();
  if(!s || s.rangeCount===0) return;
  if(!editor.contains(s.getRangeAt(0).commonAncestorContainer)) return;
  readDomSelection();
  updateToolbar();
});

/* ---- Reflet de la mise en forme dans la barre d'outils ---- */
function setBtnActive(id,on){ const el=document.getElementById(id); if(el) el.classList.toggle('active',!!on); }
function setSelVal(id,val){
  const el=document.getElementById(id); if(!el) return;
  let found=false;
  for(const o of el.options){ if(o.value===val){ found=true; break; } }
  if(found){ el.value=val; el.classList.add('active'); }
  else { el.selectedIndex=-1; el.classList.remove('active'); }
}
function clearToolbarActive(){
  ['btn-bold','btn-italic','btn-underline','btn-align-left','btn-align-center','btn-align-right','btn-align-justify',
   'btn-indent-first','btn-indent-right','btn-list-bullet','btn-list-number']
    .forEach(id=>setBtnActive(id,false));
}
function updateToolbar(){
  let idxs=[], paraForAlign=null;
  if(curSel && curSel.type==='range'){
    for(let k=curSel.a;k<curSel.b;k++){ if(doc[k] && doc[k].c!=='\n') idxs.push(k); }
    paraForAlign=paraIndexOf(Math.min(curSel.a, doc.length-1));
  }else if(curSel && curSel.type==='caret'){
    let p=curSel.pos, ref=p-1;
    if(ref<0 || !doc[ref] || doc[ref].c==='\n') ref=p;          // début de ligne -> caractère de droite
    if(doc[ref] && doc[ref].c!=='\n') idxs.push(ref);
    paraForAlign=paraIndexOf(Math.min(p, doc.length-1));
  }else{
    clearToolbarActive(); return;
  }
  const consider=idxs.filter(k=>!isSpace(doc[k].c));
  const set=consider.length?consider:idxs;
  const all=attr=> set.length>0 && set.every(k=>doc[k][attr]);
  const common=attr=>{ if(!set.length) return null; const v=doc[set[0]][attr]; return set.every(k=>doc[k][attr]===v)?v:null; };
  setBtnActive('btn-bold', all('b'));
  setBtnActive('btn-italic', all('i'));
  setBtnActive('btn-underline', all('u'));
  const sz=common('size'); setSelVal('sel-size', sz==null?'':String(sz));
  const ft=common('font'); setSelVal('sel-font', ft==null?'':ft);
  const col=common('color'); if(col){ colorBar.style.background=col; pickedColor=col; }
  const al=paraAlign(paraForAlign);
  ['left','center','right','justify'].forEach(a=>setBtnActive('btn-align-'+a, a===al));
  // Reflets paragraphe (Niveaux 2 & 3) : on lit le premier paragraphe touché
  const pp=paraForAlign;
  const pAttr=(k)=>{ if(pp==null) return null; const [s]=paraRange(pp); return doc[s]?doc[s][k]:null; };
  const lh=pAttr('lh'); setSelVal('sel-linespacing', lh==null?'':String(lh));
  const sb=pAttr('spb'); setSelVal('sel-space-before', sb==null?'':String(sb));
  const sa=pAttr('spa'); setSelVal('sel-space-after', sa==null?'':String(sa));
  setBtnActive('btn-indent-first', pAttr('ind1'));
  setBtnActive('btn-indent-right', pAttr('indr'));
  const lst=pAttr('list');
  setBtnActive('btn-list-bullet', lst==='bullet');
  setBtnActive('btn-list-number', lst==='number');
  const bl=pAttr('bul'); setSelVal('sel-bullet', bl||'disc');
  const ph=common('hl'); if(ph && ph!=='transparent'){ pbgBar.style.background=ph; pickedPbg=ph; }
}

   6. ACTIONS DE LA BARRE D'OUTILS
   ========================================================= */
function applyAndRestore(){ render(); editor.focus(); restoreDomSelection(); updateToolbar(); }

/* ---- Historique : Annuler (undo) / Rétablir (redo) ---- */
let undoStack=[], redoStack=[];
function updateUndoButtons(){
  const u=document.getElementById('btn-undo'), r=document.getElementById('btn-redo');
  if(u) u.disabled=!undoStack.length;
  if(r) r.disabled=!redoStack.length;
}
function pushHistory(){ undoStack.push(clone(doc)); if(undoStack.length>120) undoStack.shift(); redoStack.length=0; updateUndoButtons(); }
function resetHistory(){ undoStack.length=0; redoStack.length=0; updateUndoButtons(); }
function undo(){ if(!undoStack.length) return; redoStack.push(clone(doc)); doc=undoStack.pop(); curSel=null; render(); updateToolbar(); updateUndoButtons(); }
function redo(){ if(!redoStack.length) return; undoStack.push(clone(doc)); doc=redoStack.pop(); curSel=null; render(); updateToolbar(); updateUndoButtons(); }

function needRange(){
  if(!curSel || curSel.type!=='range'){ toast("Sélectionne d'abord du texte : double-clic sur un mot, ou clique-glisse 🖱️"); return true; }
  return false;
}
function toggleAttr(attr){
  if(needRange()) return;
  pushHistory();
  const {a,b}=curSel; let allOn=true;
  for(let k=a;k<b;k++){ if(doc[k].c==='\n'||isSpace(doc[k].c)) continue; if(!doc[k][attr]){ allOn=false; break; } }
  const val=!allOn;
  for(let k=a;k<b;k++){ if(doc[k].c==='\n') continue; doc[k][attr]=val; }
  applyAndRestore();
}
function setValue(attr,value){
  if(needRange()) return;
  pushHistory();
  const {a,b}=curSel;
  for(let k=a;k<b;k++){ if(doc[k].c==='\n') continue; doc[k][attr]=value; }
  applyAndRestore();
}
function setAlign(value){
  const paras=new Set();
  if(curSel && curSel.type==='range'){
    for(let k=curSel.a;k<curSel.b;k++){ if(doc[k] && doc[k].c!=='\n') paras.add(paraIndexOf(k)); }
    if(!paras.size) paras.add(paraIndexOf(Math.min(curSel.a, doc.length-1)));
  }else if(curSel && curSel.type==='caret'){
    paras.add(paraIndexOf(Math.min(curSel.pos, doc.length-1)));
  }else{
    toast("Place ton curseur dans le texte : clique dessus 🖱️"); return;
  }
  pushHistory();
  paras.forEach(p=>{ const [s,e]=paraRange(p); for(let k=s;k<e;k++) if(doc[k]) doc[k].align=value; });
  applyAndRestore();
}

/* ---- Actions paragraphe (Niveaux 2 & 3) ---- */
function collectParas(){
  const paras=new Set();
  if(curSel && curSel.type==='range'){
    for(let k=curSel.a;k<curSel.b;k++){ if(doc[k] && doc[k].c!=='\n') paras.add(paraIndexOf(k)); }
    if(!paras.size) paras.add(paraIndexOf(Math.min(curSel.a, doc.length-1)));
  }else if(curSel && curSel.type==='caret'){
    paras.add(paraIndexOf(Math.min(curSel.pos, doc.length-1)));
  }else{
    toast("Place ton curseur dans le texte : clique dessus 🖱️"); return null;
  }
  return paras;
}
function setParaAttr(attr, value){
  const paras=collectParas(); if(!paras) return;
  pushHistory();
  paras.forEach(p=>{ const [s,e]=paraRange(p); for(let k=s;k<e;k++) if(doc[k]) doc[k][attr]=value; });
  applyAndRestore();
}
function changeIndent(attr, delta){
  const paras=collectParas(); if(!paras) return;
  pushHistory();
  paras.forEach(p=>{ const [s,e]=paraRange(p);
    const cur=doc[s]?doc[s][attr]:0; const nv=Math.max(0, Math.min(96, cur+delta));
    for(let k=s;k<e;k++) if(doc[k]) doc[k][attr]=nv; });
  applyAndRestore();
}
function toggleParaPx(attr, on){      // bascule 0 <-> on (retrait 1ʳᵉ ligne / droite)
  const paras=collectParas(); if(!paras) return;
  pushHistory();
  paras.forEach(p=>{ const [s,e]=paraRange(p);
    const nv=(doc[s] && doc[s][attr])?0:on;
    for(let k=s;k<e;k++) if(doc[k]) doc[k][attr]=nv; });
  applyAndRestore();
}
function toggleList(type){            // (ré)activer une liste, ou la retirer si déjà du même type
  const paras=collectParas(); if(!paras) return;
  pushHistory();
  paras.forEach(p=>{ const [s,e]=paraRange(p);
    const cur=doc[s]?doc[s].list:'none';
    const nv=(cur===type)?'none':type;
    for(let k=s;k<e;k++) if(doc[k]) doc[k].list=nv; });
  applyAndRestore();
}
function setBullet(style){
  const paras=collectParas(); if(!paras) return;
  pushHistory();
  paras.forEach(p=>{ const [s,e]=paraRange(p); for(let k=s;k<e;k++) if(doc[k]) doc[k].bul=style; });
  applyAndRestore();
}
function changeListLevel(delta){
  const paras=collectParas(); if(!paras) return;
  pushHistory();
  paras.forEach(p=>{ const [s,e]=paraRange(p);
    if(!doc[s] || doc[s].list==='none') return;
    const cur=doc[s].lvl||0; const nv=Math.max(0, Math.min(2, cur+delta));
    // comme Word/LibreOffice : la puce suit automatiquement le niveau d'imbrication
    const autoBul=(doc[s].list==='bullet') ? (LEVEL_BULLETS[nv]||'disc') : doc[s].bul;
    for(let k=s;k<e;k++) if(doc[k]){ doc[k].lvl=nv; doc[k].bul=autoBul; } });
  applyAndRestore();
}
// Boutons « retrait » : sur une liste → change le niveau d'imbrication ; sinon → retrait gauche classique
function smartIndent(dir){
  const paras=collectParas(); if(!paras) return;
  let isList=false;
  paras.forEach(p=>{ const [s]=paraRange(p); if(doc[s] && doc[s].list!=='none') isList=true; });
  if(isList) changeListLevel(dir);
  else changeIndent('indl', dir*24);
}

    const k=e.key.toLowerCase();

function startStep(idx){
  stepIndex=idx; replayState=null;
  currentStep=STEPS[idx];
  doc=clone(currentStep.startDoc);
  curSel=null;
  resetHistory();
  resetToolbarDefaults();
  render(); updateProgress(); updateBanner();
  store.set('tt_step_l'+currentLevel, String(idx));
  openMissionPopup();
}
function resetToolbarDefaults(){
  document.getElementById('sel-size').value='16';
  document.getElementById('sel-font').value='Arial';
  document.getElementById('sel-size').classList.remove('active');
  document.getElementById('sel-font').classList.remove('active');
  clearToolbarActive();
  colorBar.style.background='#2563eb'; pickedColor='#2563eb';
  // Niveaux 2 & 3
  [['sel-linespacing','1'],['sel-space-before','0'],['sel-space-after','0'],['sel-bullet','disc']]
    .forEach(([id,v])=>{ const el=document.getElementById(id); if(el){ el.value=v; el.classList.remove('active'); } });
  if(pbgBar){ pbgBar.style.background='#ffef5c'; } pickedPbg='#ffef5c';
}
function updateProgress(){
  const track=document.getElementById('track'); track.innerHTML='';
  const real = replayState ? replayState.returnIndex : stepIndex;   // l'étape réellement « en cours »
  const viewed = STEPS.indexOf(currentStep);                        // l'étape affichée (révision incluse)
  STEPS.forEach((st,i)=>{
    const d=document.createElement('div');
    const isMile = st.kind==='test';
    d.className='seg'+(isMile?' milestone':'');
    if(i<stepIndex) d.classList.add('done');
    if(i===real) d.classList.add('current');
    if(replayState && i===real) d.classList.add('return');     // « reviens à ton étape en cours »
    if(replayState && i===viewed && i!==real) d.classList.add('viewing'); // étape en cours de révision
    if(isMile) d.textContent = (replayState && i===real) ? '↩' : (i<stepIndex ? '🏆' : '🚩');
    // Navigation : missions déjà atteintes (révision) + l'étape en cours (exercice OU jalon), pour y revenir
    const reachable = i<=stepIndex;
    if(reachable && (st.kind==='mission' || i===real)){
      d.classList.add('clickable');
      if(replayState && i===real) d.title='↩ Revenir à ton étape en cours';
      else if(i===real) d.title=(st.kind==='test'?'Revoir les consignes de ce jalon':'Revoir '+st.label+' : '+st.title);
      else d.title='Revenir à '+st.label+' : '+st.title+' (ta progression est gardée)';
      d.onclick=()=>onSegClick(i);
    }
    track.appendChild(d);
  });
  const shown=Math.min(real+1, STEPS.length);
  document.getElementById('stepCount').textContent='Niveau '+currentLevel+' · Étape '+shown+' / '+STEPS.length;
}
function onSegClick(i){
  if(i>stepIndex) return;                                   // pas encore débloqué
  const real = replayState ? replayState.returnIndex : stepIndex;
  if(i===real){ if(replayState) exitReplay(); else openMissionPopup(); return; }
  if(STEPS[i].kind!=='mission') return;                     // on ne « rejoue » pas un ancien jalon
  visitStep(i);
}
function visitStep(i){
  // Sauvegarde l'état réel une seule fois : préserve le travail en cours sur l'étape actuelle
  if(!replayState) replayState={ savedDoc: clone(doc), returnIndex: stepIndex };
  currentStep=STEPS[i];
  doc=clone(currentStep.startDoc); curSel=null; resetHistory(); resetToolbarDefaults();
  render(); updateProgress(); updateBanner(); openMissionPopup();
}
function updateBanner(){
  const banner=document.getElementById('banner');
  banner.className='banner'+(currentStep.kind==='test'?' test':'')+(replayState?' replay':'');
  document.getElementById('bEmoji').textContent=currentStep.icon;
  document.getElementById('seeMission').style.display='';
  const backBtn=document.getElementById('backToTest');
  backBtn.style.display = replayState ? '' : 'none';
  const bSub=document.getElementById('bSub');
  if(replayState){
    const back=STEPS[replayState.returnIndex];
    const where = back.kind==='test' ? 'au test' : ('à '+back.label);
    backBtn.textContent='← Revenir '+where;
    document.getElementById('bTitle').textContent='Révision : '+currentStep.title;
    bSub.innerHTML='Refais cet exercice tranquillement, puis reviens '+where+'. <b>Ta progression est gardée.</b>';
  }else{
    document.getElementById('bTitle').textContent=currentStep.label+' : '+currentStep.title;
    if(currentStep.kind==='test'){
      const chips=currentStep.tasks.map(t=>`<span class="mini-task">${t}</span>`).join('');
      bSub.innerHTML='<span class="b-goal-label">Tes '+currentStep.tasks.length+' objectifs :</span> '+chips;
    }else{
      bSub.innerHTML='<span class="b-goal-label">Ta mission :</span> '+stripTags(currentStep.expect)+'.';
    }
  }
}

function onValidate(){
  const res=evaluate(currentStep.startDoc, currentStep.goalDoc, doc);
  if(res.status==='success') return onSuccess();
  if(res.status==='extra')  return onExtra(res);
  return onError(res);
}
function flashBad(indices){
  indices.forEach(i=>{ const sp=editor.querySelector('.ch[data-i="'+i+'"]'); if(sp){ sp.classList.add('flash-bad'); setTimeout(()=>sp.classList.remove('flash-bad'),1500); } });
}
function onError(res){
  if(res.extra.length){
    // Modifications non demandées ET tâche non finie → "Oh oh"
    flashBad(res.extra);
    modal.className='modal warn';
    modal.innerHTML=`
      <span class="m-emoji">😬</span>
      <h2>Oh oh, tu as modifié autre chose !</h2>
      <p>Tu as changé des choses qui n'étaient <b>pas demandées</b>. Il faut faire <b>seulement</b> ce qui est demandé dans la mission.</p>
      <p>Besoin d'aide ? Clique sur <b>💡 Indice</b>.</p>
      <div class="m-actions"><button class="m-btn primary test" id="retry">↺ Je réessaie</button></div>`;
    openOverlay();
    document.getElementById('retry').onclick=()=>{ closeOverlay(); restartCurrent(); };
    return;
  }
  // Rien de fait ou tâche incomplète, sans modifications parasites
  flashBad(res.missing);
  let body=`Ta mission : <b>${currentStep.expect}</b>.`;
  if(!res.startedTask) body+=` Tu n'as pas encore commencé : <b>sélectionne le texte</b> avec la souris, puis clique sur le bon bouton.`;
  body+=` Besoin d'aide ? Clique sur <b>💡 Indice</b>.`;
  modal.className='modal bad';
  modal.innerHTML=`
    <span class="m-emoji">🧐</span>
    <h2>Pas encore…</h2>
    <p>${body}</p>
    <div class="m-actions"><button class="m-btn primary" id="retry">Je réessaie</button></div>`;
  openOverlay();
  document.getElementById('retry').onclick=()=>{ closeOverlay(); restartCurrent(); };
}
function onExtra(res){
  flashBad(res.extra);
  modal.className='modal warn';
  modal.innerHTML=`
    <span class="m-emoji">🤏</span>
    <h2>Presque !</h2>
    <p>Tu as bien réussi la mission… mais tu as aussi modifié <b>quelque chose qui n'était pas demandé</b>.</p>
    <p>La règle d'or : <b>on fait seulement ce que la mission demande</b>. On recommence cette mission, tu vas y arriver !</p>

  document.getElementById('redo').onclick=()=>{ closeOverlay(); restartCurrent(); };
}
function restartCurrent(){

function onSuccess(){
  if(replayState){
    const back=STEPS[replayState.returnIndex];

    <p>Choisis un exercice à <b>refaire</b> pour te rappeler comment faire. Tu reviendras ensuite au test, sans rien perdre.</p>
    <div class="replay-grid" id="replayGrid"></div>
    <div class="m-actions"><button class="m-btn ghost" id="closeHint">Non merci, je continue le test</button></div>`;
  openOverlay();
  const grid=document.getElementById('replayGrid');
  refs.forEach(m=>{
    const b=document.createElement('button');
    b.className='replay-card';
    b.innerHTML=`<span class="rc-emoji">${m.icon}</span><span class="rc-title">${m.title}</span>`;
    b.onclick=()=>{ closeOverlay(); startReplay(m); };
    grid.appendChild(b);
  });
  document.getElementById('closeHint').onclick=closeOverlay;
}
function startReplay(mission){
  replayState={ savedDoc: clone(doc), returnIndex: stepIndex };
  currentStep=mission;
  doc=clone(mission.startDoc); curSel=null; resetHistory(); resetToolbarDefaults();
  render(); updateProgress(); updateBanner(); openMissionPopup();
}
function exitReplay(){
  if(!replayState) return;
  doc=replayState.savedDoc; currentStep=STEPS[replayState.returnIndex]; replayState=null;
  curSel=null; resetHistory(); render(); updateProgress(); updateBanner();
}
document.getElementById('backToTest').onclick=exitReplay;
document.getElementById('seeMission').onclick=openMissionPopup;

/* =========================================================
   9. OVERLAY / TOAST / CONFETTI
   ========================================================= */
function openOverlay(){ overlay.classList.add('open'); }
function closeOverlay(){ overlay.classList.remove('open'); }

let toastTimer=null;
function toast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2200);
}
function confetti(){
  const wrap=document.createElement('div'); wrap.className='confetti';
  const cols=['#2563eb','#f59e0b','#16a34a','#e11d48','#7c3aed'];
  for(let i=0;i<70;i++){
    const p=document.createElement('i');
    p.style.left=Math.random()*100+'%';
    p.style.background=cols[i%cols.length];
    p.style.animationDuration=(2.4+Math.random()*1.6)+'s';
    p.style.animationDelay=(Math.random()*.5)+'s';
    p.style.transform='rotate('+Math.random()*360+'deg)';
    wrap.appendChild(p);
  }
  document.body.appendChild(wrap);
  setTimeout(()=>wrap.remove(),4200);
}

/* =========================================================
   10. NIVEAUX : chargement, intro, déblocage, navigation
   ========================================================= */
function getUnlocked(){ let u=parseInt(store.get('tt_unlocked')||'1',10); if(isNaN(u)||u<1) u=1; return Math.min(u, LEVELS.length); }
function getSavedStep(n){ let s=parseInt(store.get('tt_step_l'+n)||'0',10); return (isNaN(s)||s<0)?0:s; }

function loadLevel(n, stepIdx, showIntro){
  n=Math.max(1, Math.min(LEVELS.length, n));
  const lvl=LEVELS[n-1];
  currentLevel=n;
  PARAS=lvl.paras.slice(); FULL=PARAS.join('\n');
  const built=buildSteps(lvl.defs); STEPS=built.steps; MISSIONS=built.missions;
  applyToolbarForLevel(n);
  document.getElementById('lvlTitle').innerHTML='Traitement de texte <span class="dot">·</span> '+lvl.subtitle;
  store.set('tt_curlevel', String(n));
  refreshLevelBtn();
  let idx=(typeof stepIdx==='number')?stepIdx:getSavedStep(n);
  if(isNaN(idx)||idx<0||idx>=STEPS.length) idx=0;
  if(showIntro && idx===0){ openLevelIntro(n, ()=>startStep(0)); }
  else startStep(idx);
}

function openLevelIntro(n, cont){
  const lvl=LEVELS[n-1];
  const tools=lvl.newTools.map(t=>`<li><span class="ni-glyph">${t.g}</span> ${t.n}</li>`).join('');
  modal.className='modal';
  modal.innerHTML=`
    <span class="m-emoji">🎁</span>
    <div class="kicker">Niveau ${n}</div>
    <h2>${lvl.title}</h2>
    <p>Bienvenue au <b>Niveau ${n}</b> ! Voici les <b>nouveaux boutons</b> que tu viens de débloquer :</p>
    <ul class="newtools">${tools}</ul>
    <p style="font-size:.95rem;color:var(--muted)">Ils sont apparus dans ta barre d'outils, tout en haut. À toi de jouer !</p>
    <div class="m-actions"><button class="m-btn primary green" id="lvlGo">C'est parti ! 🚀</button></div>`;
  openOverlay();
  document.getElementById('lvlGo').onclick=()=>{ closeOverlay(); cont&&cont(); };
}

function refreshLevelBtn(){
  const b=document.getElementById('levelBtn'); if(b) b.textContent='🗺️ Niveau '+currentLevel+'/'+LEVELS.length;
}
function openLevelSelector(){
  const unlocked=getUnlocked();
  modal.className='modal';
  const cards=LEVELS.map(lv=>{
    const locked=lv.n>unlocked, cur=lv.n===currentLevel;
    const badge=locked?'🔒':(lv.n<currentLevel?'✓':'▶');
    return `<button class="lvl-card${locked?' locked':''}${cur?' current':''}" data-n="${lv.n}" ${locked?'disabled':''}>
      <span class="lc-badge">${badge}</span>
      <span class="lc-n">Niveau ${lv.n}</span>
      <span class="lc-t">${lv.title}</span>
    </button>`;
  }).join('');
  modal.innerHTML=`
    <span class="m-emoji">🗺️</span>
    <h2>Choisis ton niveau</h2>
    <p>Reviens sur un niveau déjà débloqué quand tu veux : ta progression dans chaque niveau est <b>gardée</b>.</p>
    <div class="lvl-grid">${cards}</div>
    <div class="m-actions"><button class="m-btn ghost" id="closeLvls">Fermer</button></div>`;
  openOverlay();
  modal.querySelectorAll('.lvl-card:not(.locked)').forEach(c=>{
    c.onclick=()=>{ const n=+c.getAttribute('data-n'); closeOverlay(); loadLevel(n, undefined, n!==currentLevel); };
  });
  document.getElementById('closeLvls').onclick=closeOverlay;
}
document.getElementById('levelBtn').onclick=openLevelSelector;

// Animation du cadenas qui se déverrouille
function playUnlock(nextN, done){
  const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const stage=document.createElement('div'); stage.className='lock-stage';
  stage.innerHTML=`<div class="lock-box"><div class="lock-burst"></div><div class="lock-emoji">🔒</div><div class="lock-cap">Niveau ${nextN}</div></div>`;
  document.body.appendChild(stage);
  const box=stage.querySelector('.lock-box'), emoji=stage.querySelector('.lock-emoji'), burst=stage.querySelector('.lock-burst');
  if(reduce){
    emoji.textContent='🔓'; confetti();
    setTimeout(()=>{ stage.remove(); done&&done(); }, 800);
    return;
  }
  // 1) le cadenas fermé est secoué plusieurs fois…
  box.classList.add('shake');
  // 2) …puis d'un coup il s'ouvre avec un éclat lumineux + confettis
  setTimeout(()=>{
    box.classList.remove('shake'); box.classList.add('pop');
    emoji.textContent='🔓'; burst.classList.add('go'); confetti();
  }, 1350);
  setTimeout(()=>{ stage.classList.add('fade'); }, 2350);
  setTimeout(()=>{ stage.remove(); done&&done(); }, 2750);
}

/* ---- recommence le niveau courant ---- */
document.getElementById('resetBtn').onclick=()=>{
  modal.className='modal warn';
  modal.innerHTML=`
    <span class="m-emoji">↺</span>
    <h2>Recommencer ce niveau ?</h2>
    <p>Tu vas repartir de la <b>première mission du Niveau ${currentLevel}</b>. Les autres niveaux et tes déblocages ne changent pas.</p>
    <div class="m-actions">
      <button class="m-btn ghost" id="cancelReset">Annuler</button>
      <button class="m-btn primary" id="doReset">Oui, recommencer</button>
    </div>`;
  openOverlay();
  document.getElementById('cancelReset').onclick=closeOverlay;
  document.getElementById('doReset').onclick=()=>{ closeOverlay(); store.set('tt_step_l'+currentLevel,'0'); startStep(0); };
};

/* =========================================================
   11. INIT
   ========================================================= */
(function init(){
  // migration douce de l'ancienne clé mono-niveau
  const old=store.get('tt_step'); if(old!=null && store.get('tt_step_l1')==null) store.set('tt_step_l1', old);
  let lvl=parseInt(store.get('tt_curlevel')||'1',10);
  if(isNaN(lvl)||lvl<1||lvl>LEVELS.length) lvl=1;
  lvl=Math.min(lvl, getUnlocked());
  loadLevel(lvl, getSavedStep(lvl), true);
})();
</script>
