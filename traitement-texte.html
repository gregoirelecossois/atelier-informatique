/* =========================================================
   10bis. ÉDITEUR DE TABLEAUX (Niveau 6)
   ========================================================= */
let TABLE_MODE=false;
let T=null;                 // modèle de table courant (null = aucune table)
let tSel=null;              // sélection rectangulaire {r0,c0,r1,c1}
let tFill='#ffef5c';        // couleur de fond choisie
let tHist=[], tRedoStack=[];// historique annuler / rétablir
const tableArea=document.getElementById('tableArea');
const tableToolbar=document.getElementById('table-toolbar');

function newTable(rows,cols){
  const cells={};
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++)
    cells[r+','+c]={text:'',b:false,i:false,u:false,color:'#22303f',hl:'transparent',font:'Arial',size:16,align:'left',
                    bg:'transparent',bord:'thin',colspan:1,rowspan:1,covered:false,nowrap:true};
  return {rows,cols,colW:Array(cols).fill(120),rowH:Array(rows).fill(40),cells};
}
function cloneTable(t){ return t?JSON.parse(JSON.stringify(t)):null; }
function cellAt(t,r,c){ return t.cells[r+','+c]; }
function tPush(){ if(T) tHist.push(cloneTable(T)); if(tHist.length>80) tHist.shift(); tRedoStack.length=0; }
function tUndo(){ if(!tHist.length) return; tRedoStack.push(cloneTable(T)); T=tHist.pop(); tSel=null; tableRender(); }
function tRedo(){ if(!tRedoStack.length) return; tHist.push(cloneTable(T)); T=tRedoStack.pop(); tSel=null; tableRender(); }

function normSel(r0,c0,r1,c1){ return {r0:Math.min(r0,r1),c0:Math.min(c0,c1),r1:Math.max(r0,r1),c1:Math.max(c0,c1)}; }
function inSel(r,c){ return tSel && r>=tSel.r0 && r<=tSel.r1 && c>=tSel.c0 && c<=tSel.c1; }
function selCells(){ const out=[]; if(!tSel||!T) return out;
  for(let r=tSel.r0;r<=tSel.r1;r++) for(let c=tSel.c0;c<=tSel.c1;c++){ const cl=cellAt(T,r,c); if(cl&&!cl.covered) out.push(cl); } return out; }
function cellBorderCss(b){ return b==='thick'?'3px solid #22303f':b==='none'?'1px dashed #dde5ee':'1px solid #5a6b7b'; }

/* ---- rendu ---- */
function tableRender(){
  tableArea.innerHTML='';
  if(!T){
    tableArea.innerHTML='<div class="tbl-empty"><div class="tbl-empty-ic">▦</div><p>Il n\'y a pas encore de tableau.</p><p>Clique sur <b>➕ Tableau</b> tout en haut pour en insérer un.</p></div>';
    return;
  }
  const wrap=document.createElement('div'); wrap.className='gwrap';
  const gut=document.createElement('div'); gut.className='rgutter'; wrap.appendChild(gut);
  const tbl=document.createElement('table'); tbl.className='gtable';
  tbl.style.width=T.colW.reduce((a,b)=>a+b,0)+'px';   // largeur explicite : table-layout:fixed honore alors les colonnes
  const cg=document.createElement('colgroup');
  for(let c=0;c<T.cols;c++){ const col=document.createElement('col'); col.style.width=T.colW[c]+'px'; cg.appendChild(col); }
  tbl.appendChild(cg);
  for(let r=0;r<T.rows;r++){
    const tr=document.createElement('tr'); tr.style.height=T.rowH[r]+'px';
    for(let c=0;c<T.cols;c++){
      const cl=cellAt(T,r,c); if(cl.covered) continue;
      const td=document.createElement('td'); td.dataset.r=r; td.dataset.c=c;
      if(cl.colspan>1) td.colSpan=cl.colspan;
      if(cl.rowspan>1) td.rowSpan=cl.rowspan;
      if(cl.bg&&cl.bg!=='transparent') td.style.background=cl.bg;
      td.style.border=cellBorderCss(cl.bord);
      if(inSel(r,c)) td.classList.add('sel');
      const cin=document.createElement('div'); cin.className='cell-in'; cin.contentEditable='true'; cin.textContent=cl.text;
      cin.style.fontWeight=cl.b?'700':'400';
      cin.style.fontStyle=cl.i?'italic':'normal';
      cin.style.textDecoration=cl.u?'underline':'none';
      cin.style.color=cl.color||'#22303f';
      cin.style.fontFamily=cl.font||'Arial';
      cin.style.fontSize=(cl.size||16)+'px';
      cin.style.textAlign=cl.align||'left';
      if(cl.hl&&cl.hl!=='transparent') cin.style.background=cl.hl;
      cin.style.whiteSpace=cl.nowrap===false?'normal':'nowrap';
      cin.style.overflow='hidden';
      let hsum=0; for(let k=0;k<cl.rowspan;k++) hsum+=T.rowH[r+k]||0; cin.style.maxHeight=hsum+'px';
      cin.addEventListener('input', ()=>{ cl.text=cin.textContent; });
      cin.addEventListener('focus', ()=>{ if(!tDragging){ tSel=normSel(r,c,r,c); paintSel(); } });
      td.appendChild(cin);
      const gc=document.createElement('div'); gc.className='col-grip'; gc.addEventListener('mousedown', e=>startColResize(e, c+cl.colspan-1)); td.appendChild(gc);
      const gr=document.createElement('div'); gr.className='row-grip'; gr.addEventListener('mousedown', e=>startRowResize(e, r+cl.rowspan-1)); td.appendChild(gr);
      td.addEventListener('mousedown', e=>onCellDown(e,r,c));
      tr.appendChild(td);
    }
    tbl.appendChild(tr);
  }
  wrap.appendChild(tbl);
  tableArea.appendChild(wrap);
  // gouttière de sélection de ligne (alignée sur la hauteur réelle de chaque ligne)
  tbl.querySelectorAll('tr').forEach((tr,r)=>{
    const hd=document.createElement('div'); hd.className='rowhandle'+( tSel && r>=tSel.r0 && r<=tSel.r1 && tSel.c0===0 && tSel.c1===T.cols-1 ?' on':'' );
    hd.style.height=tr.offsetHeight+'px'; hd.title='Cliquer pour sélectionner toute la ligne';
    hd.addEventListener('mousedown', e=>{ e.preventDefault(); tSel={r0:r,c0:0,r1:r,c1:T.cols-1}; tDragging=false; tAnchor=null; paintSel(); });
    gut.appendChild(hd);
  });
}
function paintSel(){
  tableArea.querySelectorAll('td').forEach(td=>{ td.classList.toggle('sel', inSel(+td.dataset.r,+td.dataset.c)); });
  tableArea.querySelectorAll('.rowhandle').forEach((hd,r)=>{ hd.classList.toggle('on', tSel && r>=tSel.r0 && r<=tSel.r1 && tSel.c0===0 && tSel.c1===T.cols-1); });
  if(tSel && T){ const cl=cellAt(T,tSel.r0,tSel.c0); if(cl&&!cl.covered){ const bs=document.getElementById('tb-border'); if(bs) bs.value=cl.bord||'thin'; } }
}

/* ---- sélection à la souris : clic = curseur, glissé = plusieurs cases ---- */
let tAnchor=null, tDragging=false;
function cellUnder(target){ const td=target && target.closest && target.closest('td'); return (td && td.dataset && td.dataset.r!=null)?{r:+td.dataset.r,c:+td.dataset.c}:null; }
function onCellDown(e,r,c){
  if(e.target.classList.contains('col-grip')||e.target.classList.contains('row-grip')) return;
  tAnchor={r,c}; tDragging=false;
}
document.addEventListener('mousemove', e=>{
  if(!tAnchor || tResize || e.buttons!==1) return;
  const cell=cellUnder(document.elementFromPoint(e.clientX, e.clientY)); if(!cell) return;
  if(!tDragging && (cell.r!==tAnchor.r || cell.c!==tAnchor.c)){ tDragging=true; tableArea.style.userSelect='none'; }
  if(tDragging){ e.preventDefault(); tSel=normSel(tAnchor.r,tAnchor.c,cell.r,cell.c); paintSel();
    const s=window.getSelection&&window.getSelection(); if(s) s.removeAllRanges(); }
});
document.addEventListener('mouseup', ()=>{ if(tDragging) tableArea.style.userSelect=''; tAnchor=null; setTimeout(()=>{ tDragging=false; },0); });

/* ---- redimensionnement au glissé ---- */
let tResize=null;
function startColResize(e, c){ e.preventDefault(); e.stopPropagation(); tResize={kind:'col',idx:c,start:e.clientX,w:T.colW[c]}; tPush(); }
function startRowResize(e, r){ e.preventDefault(); e.stopPropagation(); tResize={kind:'row',idx:r,start:e.clientY,h:T.rowH[r]}; tPush(); }
document.addEventListener('mousemove', e=>{
  if(!tResize) return;
  if(tResize.kind==='col'){ const w=Math.max(36, tResize.w+(e.clientX-tResize.start)); T.colW[tResize.idx]=Math.round(w); }
  else { const h=Math.max(22, tResize.h+(e.clientY-tResize.start)); T.rowH[tResize.idx]=Math.round(h); }
  tableRender();
});
document.addEventListener('mouseup', ()=>{ tResize=null; });

/* ---- opérations sur les cases sélectionnées ---- */
function needCells(){ const cells=selCells(); if(!cells.length){ toast('Choisis d\'abord une ou des cases 🖱️ (clique, ou glisse pour en sélectionner plusieurs).'); return null; } return cells; }
function tFormat(attr){ const cells=needCells(); if(!cells) return; tPush();
  const allOn=cells.every(c=>c[attr]); cells.forEach(c=>c[attr]=!allOn); tableRender(); }
function tCellSet(attr,value){ const cells=needCells(); if(!cells) return; tPush(); cells.forEach(c=>c[attr]=value); tableRender(); }
function tApplyFill(hex){ const cells=needCells(); if(!cells) return; tPush(); cells.forEach(c=>c.bg=hex); tableRender(); }
function tApplyBorder(v){ const cells=needCells(); if(!cells) return; tPush(); cells.forEach(c=>c.bord=v); tableRender(); }
function tMerge(){ if(!tSel){ toast('Sélectionne plusieurs cases à fusionner (glisse la souris) 🖱️'); return; }
  if(tSel.r0===tSel.r1 && tSel.c0===tSel.c1){ toast('Sélectionne au moins 2 cases : glisse la souris d\'une case à l\'autre.'); return; }
  tPush();
  const top=cellAt(T,tSel.r0,tSel.c0);
  let txt=[];
  for(let r=tSel.r0;r<=tSel.r1;r++) for(let c=tSel.c0;c<=tSel.c1;c++){ const cl=cellAt(T,r,c);
    if(!(r===tSel.r0&&c===tSel.c0)){ if(cl.text) txt.push(cl.text); cl.covered=true; cl.colspan=1; cl.rowspan=1; } }
  top.colspan=tSel.c1-tSel.c0+1; top.rowspan=tSel.r1-tSel.r0+1; top.covered=false;
  if(!top.text && txt.length) top.text=txt[0];
  tSel=normSel(tSel.r0,tSel.c0,tSel.r0,tSel.c0); tableRender();
}
function rangeN(a,b){ const o=[]; for(let i=a;i<=b;i++) o.push(i); return o; }
function partition(total,parts){ const base=Math.floor(total/parts); const rem=total-base*parts; const out=[]; for(let i=0;i<parts;i++) out.push(base+(i<rem?1:0)); return out; }
function openSplitDialog(){
  const cl=selCells()[0];
  if(!cl || (cl.colspan===1 && cl.rowspan===1)){ toast('Choisis d\'abord une grande case fusionnée à fractionner.'); return; }
  const cs=cl.colspan, rs=cl.rowspan;
  modal.className='modal';
  modal.innerHTML=`<span class="m-emoji">⤲</span><h2>Fractionner la case</h2>
    <p>En combien de <b>colonnes</b> et de <b>lignes</b> veux-tu couper cette case ?</p>
    <div style="display:flex;gap:18px;justify-content:center;align-items:center;margin:8px 0 16px;font-weight:800;color:var(--ink)">
      <label>Colonnes <select id="spCols" class="t-sel">${rangeN(1,cs).map(n=>`<option${n===cs?' selected':''}>${n}</option>`).join('')}</select></label>
      <label>Lignes <select id="spRows" class="t-sel">${rangeN(1,rs).map(n=>`<option${n===rs?' selected':''}>${n}</option>`).join('')}</select></label>
    </div>
    <div class="m-actions"><button class="m-btn ghost" id="spCancel">Annuler</button><button class="m-btn primary green" id="spGo">Fractionner</button></div>`;
  openOverlay();
  document.getElementById('spCancel').onclick=closeOverlay;
  document.getElementById('spGo').onclick=()=>{ const nc=+document.getElementById('spCols').value, nr=+document.getElementById('spRows').value; closeOverlay(); splitCell(nc,nr); };
}
function splitCell(nc,nr){
  const cl=selCells()[0]; if(!cl) return;
  const r0=tSel.r0, c0=tSel.c0, cs=cl.colspan, rs=cl.rowspan; const keep=cl.text;
  nc=Math.max(1,Math.min(cs,nc)); nr=Math.max(1,Math.min(rs,nr));
  tPush();
  for(let r=r0;r<r0+rs;r++) for(let c=c0;c<c0+cs;c++){ const x=cellAt(T,r,c); x.covered=false; x.colspan=1; x.rowspan=1; x.text=(r===r0&&c===c0)?keep:''; }
  const colS=partition(cs,nc), rowS=partition(rs,nr);
  let rr=r0;
  for(let gi=0;gi<nr;gi++){ let cc=c0;
    for(let gj=0;gj<nc;gj++){ const top=cellAt(T,rr,cc); top.colspan=colS[gj]; top.rowspan=rowS[gi]; top.covered=false;
      for(let r=rr;r<rr+rowS[gi];r++) for(let c=cc;c<cc+colS[gj];c++){ if(r===rr&&c===cc) continue; cellAt(T,r,c).covered=true; }
      cc+=colS[gj]; }
    rr+=rowS[gi]; }
  tableRender();
}

/* ---- insertion (démarre à 1 colonne × 1 ligne : l'enfant choisit lui-même) ---- */
function openTableInsert(){
  modal.className='modal';
  modal.innerHTML=`<span class="m-emoji">➕</span><h2>Insérer un tableau</h2>
    <p>Choisis le nombre de <b>colonnes</b> et de <b>lignes</b>, puis clique sur <b>Insérer</b>.</p>
    <div style="display:flex;gap:18px;justify-content:center;align-items:center;margin:8px 0 16px;font-weight:800;color:var(--ink)">
      <label>Colonnes <select id="tiCols" class="t-sel">${[1,2,3,4,5,6].map(n=>`<option${n===1?' selected':''}>${n}</option>`).join('')}</select></label>
      <label>Lignes <select id="tiRows" class="t-sel">${[1,2,3,4,5,6,7,8].map(n=>`<option${n===1?' selected':''}>${n}</option>`).join('')}</select></label>
    </div>
    <div class="m-actions"><button class="m-btn ghost" id="tiCancel">Annuler</button><button class="m-btn primary green" id="tiGo">Insérer</button></div>`;
  openOverlay();
  document.getElementById('tiCancel').onclick=closeOverlay;
  document.getElementById('tiGo').onclick=()=>{ const c=+document.getElementById('tiCols').value, r=+document.getElementById('tiRows').value;
    tPush(); T=newTable(r,c); tSel=null; closeOverlay(); tableRender(); };
}

/* ---- validation ---- */
function tableSig(t){ if(!t) return 'null';
  const cells={};
  for(let r=0;r<t.rows;r++) for(let c=0;c<t.cols;c++){ const x=cellAt(t,r,c);
    cells[r+','+c]={t:(x.text||'').trim(),b:!!x.b,i:!!x.i,u:!!x.u,color:x.color||'#22303f',hl:x.hl||'transparent',
      font:x.font||'Arial',size:x.size||16,align:x.align||'left',bg:x.bg||'transparent',bord:x.bord||'thin',
      cs:x.colspan||1,rs:x.rowspan||1,cv:!!x.covered}; }
  return JSON.stringify({rows:t.rows,cols:t.cols,cells});
}
function colNotTruncated(c){ const tds=tableArea.querySelectorAll('td[data-c="'+c+'"]');
  if(!tds.length) return false; for(const td of tds){ const cin=td.querySelector('.cell-in'); if(cin && cin.scrollWidth>cin.clientWidth+1) return false; } return true; }
function rowNotTruncated(r){ const tds=tableArea.querySelectorAll('td[data-r="'+r+'"]');
  if(!tds.length) return false; for(const td of tds){ const cin=td.querySelector('.cell-in'); if(cin && cin.scrollHeight>cin.clientHeight+1) return false; } return true; }
// Lecture normalisée des attributs d'une cellule (mêmes règles que tableSig)
const CELL_ATTRS=[
  x=>(x.text||'').trim(), x=>!!x.b, x=>!!x.i, x=>!!x.u, x=>x.color||'#22303f', x=>x.hl||'transparent',
  x=>x.font||'Arial', x=>x.size||16, x=>x.align||'left', x=>x.bg||'transparent', x=>x.bord||'thin',
  x=>x.colspan||1, x=>x.rowspan||1, x=>!!x.covered ];
function tableMkStatus(missing,extra){
  let status;
  if(missing===0 && extra===0) status='success';
  else if(missing===0)         status='extra';        // mission OK + modifs en trop → "Presque"
  else if(extra>0)             status='error';        // mission incomplète + modifs en trop → "Oh oh"
  else                         status='incomplete';   // mission incomplète, rien d'autre → "Pas encore"
  return {status,missing,extra};
}
// Évalue un tableau comme le moteur texte : compte ce qui manque (missing) et ce qui a été modifié sans être demandé (extra)
function tableEvaluate(){
  const st=currentStep;
  let missing=0, extra=0;
  // redimensionnement = action requise (jamais "en trop")
  let resizeOk=true;
  if(st.resize){ resizeOk = st.resize.type==='col'?colNotTruncated(st.resize.index):rowNotTruncated(st.resize.index); }
  if(st.resizeMin){ const m=st.resizeMin; const v=(m.type==='col')?(T&&T.colW[m.index]):(T&&T.rowH[m.index]); if(!(v>=m.min)) resizeOk=false; }
  if(!resizeOk) missing++;

  if(!st.goalTable) return tableMkStatus(missing,extra);
  if(!T) return {status:'incomplete', missing:missing+1, extra:0};
  const goal=st.goalTable;
  // mauvaise taille de tableau → il faut d'abord la bonne structure (incomplet, jamais "en trop")
  if(T.rows!==goal.rows || T.cols!==goal.cols) return {status:'incomplete', missing:missing+1, extra:0};

  // référence de départ : startTable si fourni, sinon un tableau vide de la bonne taille (jalons « à partir de zéro »)
  const start = st.startTable || newTable(goal.rows, goal.cols);
  for(let r=0;r<goal.rows;r++) for(let c=0;c<goal.cols;c++){
    const gc=cellAt(goal,r,c), sc0=cellAt(start,r,c), cc=cellAt(T,r,c);
    let miss=false, ext=false;
    for(const f of CELL_ATTRS){
      const gv=f(gc), sv=f(sc0), cv=f(cc);
      if(gv!==sv){ if(cv!==gv) miss=true; }    // attribut requis non atteint → manquant
      else { if(cv!==sv) ext=true; }           // attribut non demandé modifié → en trop
    }
    if(miss) missing++;
    if(ext) extra++;
  }
  return tableMkStatus(missing,extra);
}

/* ---- barre d'outils tableau (boutons NOUVEAUX : insertion, fond, fusion, fractionner, bordures) ---- */
document.getElementById('tb-insert').onclick=openTableInsert;
document.getElementById('tb-merge').onclick=tMerge;
document.getElementById('tb-split').onclick=openSplitDialog;
(function(){ const bs=document.getElementById('tb-border');
  bs.addEventListener('mousedown',()=>{ bs._pre=bs.value; bs.value=''; });
  bs.addEventListener('change',e=>{ if(e.target.value) tApplyBorder(e.target.value); else bs.value=bs._pre||'thin'; });
})();
(function(){ const sw=document.getElementById('tb-swatches');
  PBG_COLORS.forEach(c=>{ const b=document.createElement('button'); b.className='swatch'; b.title=c.name;
    if(c.hex==='transparent'){ b.style.background='#fff'; b.style.backgroundImage='linear-gradient(45deg,#e0e0e0 25%,transparent 25%,transparent 75%,#e0e0e0 75%),linear-gradient(45deg,#e0e0e0 25%,#fff 25%,#fff 75%,#e0e0e0 75%)'; b.style.backgroundSize='12px 12px'; b.style.backgroundPosition='0 0,6px 6px'; }
    else b.style.background=c.hex;
    b.addEventListener('mousedown', e=>e.preventDefault());
    b.onclick=(ev)=>{ ev.stopPropagation(); tFill=c.hex; document.getElementById('tbFillBar').style.background=(c.hex==='transparent'?'#fff':c.hex); document.getElementById('tb-swatches').classList.remove('open'); tApplyFill(c.hex); };
    sw.appendChild(b); });
})();
document.getElementById('tb-fill').onclick=(e)=>{ e.stopPropagation(); document.getElementById('tb-swatches').classList.toggle('open'); };
document.addEventListener('click',()=>document.getElementById('tb-swatches').classList.remove('open'));

/* ---- raccourcis clavier en mode tableau : annuler / rétablir (B/I/U passent par toggleAttr) ---- */
document.addEventListener('keydown', e=>{
  if(!TABLE_MODE) return;
  if(overlay.classList.contains('open')) return;
  if(!(e.ctrlKey||e.metaKey) || e.altKey) return;
  const k=e.key.toLowerCase();
  if(k==='z'){ e.preventDefault(); e.shiftKey?tRedo():tUndo(); }
  else if(k==='y'){ e.preventDefault(); tRedo(); }
});

/* ---- bascule mode tableau / texte : on GARDE la barre principale, on ajoute la barre tableau ---- */
function setTableMode(on){
  TABLE_MODE=on;
  tableToolbar.style.display = on?'':'none';
  editor.style.display = on?'none':'';
  tableArea.style.display = on?'':'none';
  // la barre principale (#toolbar) reste visible : tous les boutons débloqués avant restent disponibles
}
function startTableStep(){
  T=cloneTable(currentStep.startTable); tSel=null; tHist=[]; tRedoStack=[];
  tableRender();
}

/* =========================================================
   11. INIT
   ========================================================= */
(function init(){
  // migration douce de l'ancienne clé mono-niveau
  const old=store.get('tt_step'); if(old!=null && store.get('tt_step_l1')==null) store.set('tt_step_l1', old);
  // saut développeur via URL : ?go=L ou ?go=L.S (tout ce qui précède est réputé réussi)
  const go=/[?&]go=(\d+)(?:[.\-_](\d+))?/.exec(location.search);
  if(go){
    const L=Math.max(1,Math.min(LEVELS.length, parseInt(go[1],10)));
    store.set('tt_unlocked', String(Math.max(getUnlocked(), L)));
    store.set('tt_curlevel', String(L));
    if(go[2]!=null) store.set('tt_step_l'+L, String(Math.max(0, parseInt(go[2],10))));
  }
  let lvl=parseInt(store.get('tt_curlevel')||'1',10);
  if(isNaN(lvl)||lvl<1||lvl>LEVELS.length) lvl=1;
  lvl=Math.min(lvl, getUnlocked());
  loadLevel(lvl, getSavedStep(lvl), !go);   // pas d'intro de niveau lors d'un saut direct
})();

/* =========================================================
   12. ACCÈS DÉVELOPPEUR — sauter à n'importe quel exercice
   ========================================================= */
(function devkit(){
  function steps(lv){ return lv.defs; }
  const UNLOCK='tt_unlocked', CUR='tt_curlevel', STEP='tt_step_l', HOME='traitement-texte.html';

  const css=`
  #devkit{position:fixed;right:14px;bottom:14px;z-index:300;font-family:"Nunito",system-ui,sans-serif;}
  #devkit .dk-toggle{display:inline-flex;align-items:center;gap:6px;background:#1e2733;color:#e7eef6;border:none;
    border-radius:999px;padding:9px 14px;font-weight:800;font-size:.85rem;cursor:pointer;box-shadow:0 6px 18px rgba(0,0,0,.28);}
  #devkit .dk-toggle:hover{background:#2a3645;}
  #devkit .dk-panel{display:none;position:absolute;right:0;bottom:48px;width:312px;max-height:72vh;overflow:auto;
    background:#1e2733;color:#e7eef6;border-radius:14px;padding:12px 12px 14px;box-shadow:0 16px 40px rgba(0,0,0,.42);}
  #devkit.open .dk-panel{display:block;}
  #devkit .dk-head{font-weight:800;font-size:.95rem;margin:0 0 2px;}
  #devkit .dk-note{color:#9fb0c4;font-size:.72rem;margin:0 0 6px;line-height:1.35;}
  #devkit .dk-lv{font-weight:800;color:#9fc3ff;margin:11px 0 4px;font-size:.78rem;text-transform:uppercase;letter-spacing:.04em;}
  #devkit .dk-step{display:block;width:100%;text-align:left;background:#2b3949;color:#e7eef6;border:1px solid #3a4a5c;
    border-radius:8px;padding:6px 9px;margin:3px 0;cursor:pointer;font-size:.78rem;line-height:1.3;}
  #devkit .dk-step:hover{background:#37485c;border-color:#5a7088;}
  #devkit .dk-step.jalon{border-color:#f6b73c;}
  #devkit .dk-step b{color:#ffd479;}
  #devkit .dk-actions{display:flex;gap:6px;margin-top:12px;}
  #devkit .dk-act{flex:1;background:#33455a;color:#e7eef6;border:1px solid #44586e;border-radius:8px;padding:7px;
    font-weight:700;font-size:.74rem;cursor:pointer;}
  #devkit .dk-act:hover{background:#3d5167;}`;
  const style=document.createElement('style'); style.textContent=css; document.head.appendChild(style);

  const root=document.createElement('div'); root.id='devkit';
  let html='<button class="dk-toggle" id="dkToggle">🛠️ Dev</button>'
    +'<div class="dk-panel"><p class="dk-head">🛠️ Accès développeur</p>'
    +'<p class="dk-note">Saute à un exercice : tout ce qui précède est considéré comme réussi.</p>';
  LEVELS.forEach(lv=>{
    html+='<div class="dk-lv">Niveau '+lv.n+' — '+lv.title+'</div>';
    steps(lv).forEach((d,i)=>{
      const isJ=(d.kind==='test'||d.kind==='jalon');
      html+='<button class="dk-step'+(isJ?' jalon':'')+'" data-l="'+lv.n+'" data-s="'+i+'">'
        +'<b>'+(d.label||('Étape '+(i+1)))+'</b> · '+(d.title||'')+'</button>';
    });
  });
  html+='<div class="dk-actions"><button class="dk-act" id="dkUnlockAll">🔓 Tout débloquer</button>'
    +'<button class="dk-act" id="dkReset">🧹 Reset complet</button></div></div>';
  root.innerHTML=html;
  document.body.appendChild(root);

  function devJump(L,S){
    L=Math.max(1,Math.min(LEVELS.length,L));
    const maxS=steps(LEVELS[L-1]).length-1; S=Math.max(0,Math.min(maxS, S||0));
    store.set(UNLOCK, String(Math.max(getUnlocked(), L)));
    store.set(CUR, String(L));
    store.set(STEP+L, String(S));
    if(typeof closeOverlay==='function') closeOverlay();
    loadLevel(L, S, false);
  }

  document.getElementById('dkToggle').onclick=()=>root.classList.toggle('open');
  root.querySelectorAll('.dk-step').forEach(b=>{
    b.onclick=()=>{ root.classList.remove('open'); devJump(+b.getAttribute('data-l'), +b.getAttribute('data-s')); };
  });
  document.getElementById('dkUnlockAll').onclick=()=>{ store.set(UNLOCK, String(LEVELS.length)); refreshLevelBtn(); };
  document.getElementById('dkReset').onclick=()=>{
    const keys=[UNLOCK,CUR,'tt_step'];
    for(let i=1;i<=LEVELS.length;i++) keys.push(STEP+i);
    keys.forEach(k=>{ try{ localStorage.removeItem(k); }catch(e){} });
    location.href=HOME;
  };
  // (Le saut par URL ?go=L.S est traité dans init, pour éviter un double chargement.)
})();
</script>
